name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build output (all 13 HTML entrypoints + assets)
        run: |
          # Product pages (2)
          test -f dist/page/index.html || (echo "MISSING: dist/page/index.html" && exit 1)
          test -f dist/viewer/index.html || (echo "MISSING: dist/viewer/index.html" && exit 1)
          # Dev/diagnostic pages (11)
          test -f dist/page/test.html || (echo "MISSING: dist/page/test.html" && exit 1)
          test -f dist/page/test-rollback.html || (echo "MISSING: dist/page/test-rollback.html" && exit 1)
          test -f dist/page/test-worker.html || (echo "MISSING: dist/page/test-worker.html" && exit 1)
          COUNT=$(ls dist/page/bench/bench-*.html | wc -l | tr -d ' ')
          [ "$COUNT" -eq 8 ] || (echo "Expected 8 bench pages, found $COUNT" && exit 1)
          # Total: 2 product + 3 test + 8 bench = 13
          TOTAL=$(find dist -name "*.html" | wc -l | tr -d ' ')
          [ "$TOTAL" -eq 13 ] || (echo "Expected 13 HTML entrypoints, found $TOTAL" && exit 1)
          # Static assets
          test -f dist/structures/library/manifest.json || (echo "MISSING: manifest.json" && exit 1)
          ls dist/assets/tersoff-*.wasm >/dev/null 2>&1 || (echo "MISSING: Wasm binary" && exit 1)
          echo "Build output verified: $TOTAL HTML entrypoints, manifest, wasm"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Deploy smoke check
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/page/ > /dev/null 2>&1; then
              echo "Server ready after ~$((i / 2))s"
              break
            fi
            sleep 0.5
          done
          if ! curl -sf http://127.0.0.1:4173/page/ > /dev/null 2>&1; then
            echo "ERROR: Vite preview server failed to become ready within 15s"
            exit 1
          fi
          bash scripts/deploy-smoke.sh

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=atomdojo

      - name: Post-deploy smoke check (live URL)
        run: |
          # Wait for deployment to propagate (Cloudflare edge cache)
          sleep 10
          bash scripts/deploy-smoke.sh https://atomdojo.pages.dev
