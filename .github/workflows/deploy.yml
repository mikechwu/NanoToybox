name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build output (all 12 HTML entrypoints + assets)
        run: |
          # Product pages (2)
          test -f dist/page/index.html || (echo "MISSING: dist/page/index.html" && exit 1)
          test -f dist/viewer/index.html || (echo "MISSING: dist/viewer/index.html" && exit 1)
          # Dev/diagnostic pages (10)
          test -f dist/page/test.html || (echo "MISSING: dist/page/test.html" && exit 1)
          test -f dist/page/test-rollback.html || (echo "MISSING: dist/page/test-rollback.html" && exit 1)
          COUNT=$(ls dist/page/bench/bench-*.html | wc -l | tr -d ' ')
          [ "$COUNT" -eq 8 ] || (echo "Expected 8 bench pages, found $COUNT" && exit 1)
          # Total: 2 product + 2 test + 8 bench = 12
          TOTAL=$(find dist -name "*.html" | wc -l | tr -d ' ')
          [ "$TOTAL" -eq 12 ] || (echo "Expected 12 HTML entrypoints, found $TOTAL" && exit 1)
          # Static assets
          test -f dist/structures/library/manifest.json || (echo "MISSING: manifest.json" && exit 1)
          ls dist/assets/tersoff-*.wasm >/dev/null 2>&1 || (echo "MISSING: Wasm binary" && exit 1)
          echo "Build output verified: $TOTAL HTML entrypoints, manifest, wasm"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Deploy smoke check
        run: |
          npx vite preview --base /NanoToybox/ --host 127.0.0.1 --port 4173 --strictPort &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/NanoToybox/page/ > /dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          bash scripts/deploy-smoke.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
