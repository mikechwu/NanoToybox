name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build output (per-route checks + assets)
        run: |
          # Root redirect
          test -f dist/index.html || (echo "MISSING: dist/index.html (root redirect)" && exit 1)
          # Product pages
          test -f dist/lab/index.html || (echo "MISSING: dist/lab/index.html" && exit 1)
          test -f dist/viewer/index.html || (echo "MISSING: dist/viewer/index.html" && exit 1)
          test -f dist/watch/index.html || (echo "MISSING: dist/watch/index.html" && exit 1)
          # Policy + account pages (Phase 7 plan). Per-route checks, not a
          # global TOTAL == N: every future route addition would otherwise
          # churn this guard for no diagnostic benefit.
          test -f dist/privacy/index.html || (echo "MISSING: dist/privacy/index.html" && exit 1)
          test -f dist/terms/index.html || (echo "MISSING: dist/terms/index.html" && exit 1)
          test -f dist/account/index.html || (echo "MISSING: dist/account/index.html" && exit 1)
          test -f dist/privacy-request/index.html || (echo "MISSING: dist/privacy-request/index.html" && exit 1)
          # Dev/diagnostic pages
          test -f dist/lab/test.html || (echo "MISSING: dist/lab/test.html" && exit 1)
          test -f dist/lab/test-rollback.html || (echo "MISSING: dist/lab/test-rollback.html" && exit 1)
          test -f dist/lab/test-worker.html || (echo "MISSING: dist/lab/test-worker.html" && exit 1)
          # Bench cohort: the count IS diagnostic — the bench pages are a
          # known set of 8.
          COUNT=$(ls dist/lab/bench/bench-*.html | wc -l | tr -d ' ')
          [ "$COUNT" -eq 8 ] || (echo "Expected 8 bench pages, found $COUNT" && exit 1)
          # Static assets
          test -f dist/structures/library/manifest.json || (echo "MISSING: manifest.json" && exit 1)
          ls dist/assets/tersoff-*.wasm >/dev/null 2>&1 || (echo "MISSING: Wasm binary" && exit 1)
          echo "Build output verified: per-route checks + bench cohort + assets"

      # See ci.yml for the rationale behind the cached / no-deps install.
      # Same pattern: cache the chromium binary by resolved @playwright/test
      # version, skip --with-deps because the runner image already ships
      # every required system library and the missing packages are i18n
      # fonts our English-only UI doesn't exercise. Saves ~30–60s per deploy.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Deploy smoke check
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/lab/ > /dev/null 2>&1; then
              echo "Server ready after ~$((i / 2))s"
              break
            fi
            sleep 0.5
          done
          if ! curl -sf http://127.0.0.1:4173/lab/ > /dev/null 2>&1; then
            echo "ERROR: Vite preview server failed to become ready within 15s"
            exit 1
          fi
          bash scripts/deploy-smoke.sh

      # D1 migrations must land BEFORE the Pages deploy so new code
      # never hits a schema it assumes. wrangler tracks applied migrations
      # in a d1_migrations table; this step is idempotent — it only
      # applies what hasn't already been applied, so repeated runs are
      # cheap no-ops. Requires CLOUDFLARE_API_TOKEN to have D1:Edit scope.
      #
      # Safety: only additive migrations are safe to auto-apply here.
      # Destructive changes (DROP, column removal, data loss) must be
      # rolled out manually via a separate operator workflow after
      # review — never add one to migrations/ and let CI auto-apply it.
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply atomdojo-capsules --remote

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=atomdojo

      - name: Post-deploy smoke check (live URL)
        run: |
          # Wait for deployment to propagate (Cloudflare edge cache)
          sleep 10
          bash scripts/deploy-smoke.sh https://atomdojo.pages.dev
