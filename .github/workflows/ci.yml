name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      # Cache the chromium binary (~150 MB) keyed by the resolved
      # @playwright/test version in package-lock.json. A cache hit skips
      # the binary download entirely; a cache miss runs `playwright install`
      # without `--with-deps` because the GitHub-hosted ubuntu-latest runner
      # image already ships every Playwright system library (libnss3, libnspr4,
      # libgbm1, libcairo2, libxkbcommon0, libdrm2, ...). The packages
      # `--with-deps` would otherwise install are international font sets
      # (fonts-ipafont-gothic, fonts-wqy-zenhei, fonts-tlwg-loma-otf, etc.)
      # that the English-only Lab UI does not exercise. Saves ~30–60s per run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Deploy smoke check
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # Readiness loop — poll until server responds (max 15s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/lab/ > /dev/null 2>&1; then
              echo "Server ready after ~$((i / 2))s"
              break
            fi
            sleep 0.5
          done
          if ! curl -sf http://127.0.0.1:4173/lab/ > /dev/null 2>&1; then
            echo "ERROR: Vite preview server failed to become ready within 15s"
            exit 1
          fi

          bash scripts/deploy-smoke.sh

  physics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install numpy numba pytest

      - name: Run physics tests
        # Excluded: test_zero_k_stability / test_perturbation (fixture issues),
        # test_loading (requires generated data/ directory not in repo).
        run: python -m pytest tests/test_*.py -v -k "not test_zero_k_stability and not test_perturbation and not test_loading"
