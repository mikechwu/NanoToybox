name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Deploy smoke check
        run: |
          npx vite preview --base /NanoToybox/ --host 127.0.0.1 --port 4173 --strictPort &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # Readiness loop — poll until server responds (max 15s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/NanoToybox/page/ > /dev/null 2>&1; then
              echo "Server ready after ~$((i / 2))s"
              break
            fi
            sleep 0.5
          done

          bash scripts/deploy-smoke.sh

  physics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install numpy numba pytest

      - name: Run physics tests
        # Excluded: test_zero_k_stability / test_perturbation (fixture issues),
        # test_loading (requires generated data/ directory not in repo).
        run: python -m pytest tests/test_*.py -v -k "not test_zero_k_stability and not test_perturbation and not test_loading"
