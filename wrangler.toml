# Cloudflare Pages configuration for atomdojo
# Deploy: npx wrangler pages deploy dist --project-name=atomdojo
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "atomdojo"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"

# ── Public OAuth client IDs ─────────────────────────────────────────────────
# These are NOT secrets. Google and GitHub expose them publicly in consent
# URLs and OAuth responses — the identifiers are safe to commit. Only the
# corresponding *_CLIENT_SECRET values (and SESSION_SECRET, CRON_SECRET) are
# stored as encrypted Pages secrets via `wrangler pages secret put`.
#
# Cloudflare Pages now treats wrangler.toml as the source of truth for vars
# and bindings. Dashboard-based env-var editing is disabled when wrangler.toml
# is present; only Secrets remain editable in the dashboard. This block is
# the expected home for public, non-secret config.
[vars]
GOOGLE_CLIENT_ID = "102343813766-55tmhfvapk1naibhpc214b3hrgjpauif.apps.googleusercontent.com"
GITHUB_CLIENT_ID = "Ov23liucwJPJKHZEnwtJ"

# Capsule preview V1 dynamic-fallback flag (spec §7).
# "on"  → /api/capsules/:code/preview/poster generates a PNG for accessible
#         capsules without a stored asset; /c/:code emits og:image for every
#         accessible capsule.
# "off" → pre-V1 behavior (404 unless preview_status=ready + poster_key set).
# Rollback: edit this value and redeploy via
#   npx wrangler pages deploy dist --project-name=atomdojo
CAPSULE_PREVIEW_DYNAMIC_FALLBACK = "on"

[[d1_databases]]
binding = "DB"
database_name = "atomdojo-capsules"
database_id = "29c6b244-8dba-49b6-8883-fc490eb3e07d"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "atomdojo-capsules-prod"

# ── Scheduled cleanup (Phase 5) ──────────────────────────────────────────────
# Pages Functions cannot register scheduled handlers directly. The companion
# Worker at `workers/cron-sweeper/` handles this — see its README.
#
# Deployment steps:
#   1. cd workers/cron-sweeper
#   2. wrangler secret put CRON_SECRET                     # in the Worker
#   3. wrangler pages secret put CRON_SECRET --project-name=atomdojo  # in Pages
#      (SAME value in both; they must match byte-for-byte for X-Cron-Secret.)
#   4. wrangler deploy  (or: `npm run cron:deploy` from repo root)
#
# The Worker runs:
#   "0 */6 * * *"  → POST /api/admin/sweep/sessions
#   "30 3 * * *"   → POST /api/admin/sweep/orphans
# with X-Cron-Secret header. The admin-gate in functions/admin-gate.ts
# accepts this as the production automation path.
#
# Never commit CRON_SECRET. In local dev the sweep endpoints are also
# reachable via the DEV_ADMIN_ENABLED + localhost path.
#
# ── Per-IP rate limiting (Phase 5) ───────────────────────────────────────────
# Per-IP rate limits on publish and resolve are enforced by Cloudflare WAF at
# the edge, not by application code. Configure in the Cloudflare dashboard:
#
#   Security → WAF → Rate limiting rules
#     Rule: "Publish per IP"
#       When: hostname eq atomdojo.pages.dev AND path eq /api/capsules/publish
#       Rate: 30 requests per 1 minute per IP
#       Action: block for 10 minutes
#     Rule: "Resolve per IP"
#       When: hostname eq atomdojo.pages.dev AND path contains /api/capsules/
#       Rate: 300 requests per 1 minute per IP
#       Action: challenge (managed challenge)
#     Rule: "Age-intent signing per IP" (D120)
#       When: hostname eq atomdojo.pages.dev AND path eq /api/account/age-confirmation/intent
#       Rate: 30 requests per 1 minute per IP
#       Action: managed challenge (or block for 5 minutes)
#       Rationale: this endpoint is unauthenticated and signs a fresh
#       HMAC token on every POST. The token does NOT expose data, but
#       the endpoint is a cheap CPU-amplification target for an
#       attacker looking to burn Workers CPU on crypto.subtle.sign.
#       Managed challenge is sufficient — real users hit it at most
#       twice (once per sign-in surface in a session) so the rate cap
#       is generous from the user's perspective.
#
#       Layer 2 (app-level, always-on): the Worker itself also caps
#       each per-isolate, per-hashed-IP bucket at 60 req/60s in
#       `functions/api/account/age-confirmation/intent.ts`. This is
#       not a substitute for the WAF rule above — a determined
#       cross-IP attacker needs WAF at the edge — but it guarantees
#       that an incorrectly-configured dashboard cannot expose the
#       endpoint to unlimited single-isolate amplification. The WAF
#       rule still matters because Cloudflare multiplexes many
#       requests into one isolate; without the edge cap an attacker
#       can still burn isolate CPU under the 60/min ceiling.
#
#       Release-readiness: `docs/contributing.md` Doc-drift release
#       check links to the WAF-verification step that must run
#       before every production deploy.
#
# Per-user quotas (10 publishes/24h) are enforced inside publish.ts via the
# publish_quota_window D1 table — see src/share/rate-limit.ts.

