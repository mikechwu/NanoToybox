<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NanoToybox — Interactive Carbon Playground</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Static tokens (theme-independent) ── */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-xs: 12px;
  --font-sm: 14px;
  --font-base: 16px;
  --tap-target: 44px;
  --glass-blur: 8px;
  --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1.0);
  --duration-fast: 0.15s;
  --duration-normal: 0.3s;
  --duration-sheet: 0.45s;
  /* Safe-area insets as readable CSS vars (for JS layout computation) */
  --safe-left: env(safe-area-inset-left, 0px);
  --dock-mode-max-width: 180px;
  --dock-slot-action: 56px;
}
/* Text size: :root defines Normal defaults; Large overrides via data attribute */
[data-text-size="large"] {
  --font-xs: 14px;
  --font-sm: 16px;
  --font-base: 18px;
  --dock-mode-max-width: 200px;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --duration-fast: 0s;
    --duration-normal: 0s;
    --duration-sheet: 0s;
  }
}

/* Performance: reduced effects — disables blur entirely for weak GPUs.
   Activated automatically by FPS gate (hysteresis in frameLoop when glass UI is visible)
   or manually via _setUiEffectsMode('reduced') in console. */
[data-ui-effects="reduced"] {
  --glass-blur: 0px;
}
[data-ui-effects="reduced"] .panel,
[data-ui-effects="reduced"] .react-info,
[data-ui-effects="reduced"] .react-fps,
[data-ui-effects="reduced"] .dock-bar,
[data-ui-effects="reduced"] .sheet {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

html, body {
  height: 100%;
  background: var(--page-bg);
  color: var(--color-text);
  font-family: var(--font-family);
  overflow: hidden;
}
#container {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  position: relative;
}
canvas { display: block; touch-action: none; }

#hint {
  position: absolute; bottom: var(--hint-bottom, 70px); left: 50%; transform: translateX(-50%);
  background: var(--color-hint-bg); color: var(--color-accent-text);
  padding: 8px 20px; border-radius: 20px; font-size: var(--font-sm);
  z-index: 10; pointer-events: none;
  opacity: 1; transition: opacity 1.5s ease-out;
}
#hint.fade { opacity: 0; }

.drawer-item {
  padding: var(--space-sm) 10px; cursor: pointer; color: var(--color-text);
  border-radius: var(--radius-sm);
  margin-bottom: 2px; touch-action: manipulation;
}
.drawer-item:hover { background: var(--color-surface-hover); }
.chooser-recent {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: var(--space-sm) 10px; margin-bottom: var(--space-sm);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer; border-radius: var(--radius-sm);
  color: var(--color-text); touch-action: manipulation;
}
.chooser-recent:hover { background: var(--color-surface-hover); }
.chooser-recent-label {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.chooser-recent-name { font-weight: 500; color: var(--color-accent-text); }

/* ── Panel shared styles (extracted from inline) ── */
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-size: 12px;
}
.panel-heading {
  font-weight: 600; font-size: var(--font-sm);
  color: var(--color-text);
}
.panel-label {
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.panel-value {
  color: var(--color-accent-text);
  font-size: var(--font-xs);
  font-variant-numeric: tabular-nums;
}
.panel-btn {
  background: var(--color-btn); color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 4px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-xs);
  font-family: inherit;
}
.panel-btn.active {
  background: var(--color-surface-hover);
  color: var(--color-text);
}
.panel-btn-accent {
  background: var(--color-accent-soft); color: var(--color-accent-text);
  border: 1px solid var(--color-accent);
  padding: var(--space-sm) 20px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-sm); font-weight: 600;
  font-family: inherit;
}
.panel-slider {
  width: 100%; accent-color: var(--color-accent); touch-action: auto;
}
.panel-helper {
  color: var(--color-text-secondary); font-size: 9px;
}
/* Atom count in settings sheet Scene section — styled via .group-value */

/* ── Help modal ── */
#help {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 30; max-width: 400px; width: 90%;
  padding: var(--space-xl); line-height: 1.7;
}
.help-section-title {
  margin-top: var(--space-md); margin-bottom: var(--space-sm);
  color: var(--color-accent-text);
  font-size: var(--font-xs); text-transform: uppercase; letter-spacing: 1px;
}

/* ══════════════════════════════════════════════════════════
   Layout primitives: dock, sheet, grouped list, segmented control
   ══════════════════════════════════════════════════════════ */

/* ── Dock region (measurement root for overlay-layout.ts) ── */
.dock-region {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 205; /* Above backdrop (200) so dock stays interactive while sheets are open */
}
/* ── Dock bar (visual toolbar) ──
   Uses CSS grid with stable slot widths so Pause↔Resume label changes
   do not rebalance the layout. Mode slot is wider for the segmented control. */
.dock-bar {
  display: grid;
  grid-template-columns: var(--dock-slot-action) 1fr var(--dock-slot-action) var(--dock-slot-action);
  align-items: center;
  justify-items: center;
  height: calc(var(--tap-target) + var(--space-lg) + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border-top: 1px solid var(--color-border);
}
.dock-slot { display: flex; align-items: center; justify-content: center; }
.dock-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: var(--tap-target);
  min-height: var(--tap-target);
  padding: var(--space-xs) var(--space-sm);
  background: none;
  border: none;
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color var(--duration-fast);
}
.dock-item.active { color: var(--color-accent-text); }
.dock-item:disabled { opacity: 0.3; cursor: default; }
.review-locked { opacity: 0.35; cursor: not-allowed; }
/* review-locked-trigger uses display:contents so the wrapper does not disrupt
   dock/chooser flex layout. The trigger itself is the interactive hit target for
   ActionHint hover/focus; children are visually dimmed and pointer-events:none.
   Deliberate structural dependency — do not remove without verifying dock layout,
   accessibility tree, and focus-outline behavior across browsers. */
.review-locked-trigger { display: contents; cursor: not-allowed; }
.review-locked-trigger > * { opacity: 0.35; pointer-events: none; }
/* Segmented disabled: dim the label inside the stable wrapper, not the wrapper itself
   (keeps ActionHint tooltips at full contrast). Consolidated here — no other .seg-disabled rules. */
.segmented .seg-item--disabled .seg-label { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
/* Row-safe locked list item — position:relative for tooltip, no display override.
   Content is dimmed via inner .review-locked-content; tooltip stays full-contrast.
   Do not use .timeline-hint-anchor on list rows — it sets display:inline-flex. */
.review-locked-list-item { position: relative; cursor: not-allowed; }
.review-locked-content { opacity: 0.35; pointer-events: none; }

@media (min-width: 768px) {
  .dock-region {
    left: 50%; transform: translateX(-50%);
    /* Fixed-width pill: stable across all timeline states (no shrink-wrap).
       Uses min() so the region never exceeds the viewport on narrow tablets. */
    width: min(480px, calc(100vw - 2 * var(--space-lg)));
    bottom: calc(var(--space-lg) + env(safe-area-inset-bottom, 0px));
  }
  .dock-bar {
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    /* Safe-area clearance moved from internal padding to external position,
       so the pill content stays vertically centered. */
    height: calc(var(--tap-target) + var(--space-lg));
    padding-bottom: 0;
  }
}

/* ── Sheet backdrop ── */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  opacity: 0; pointer-events: none;
  transition: opacity var(--duration-sheet) var(--ease-spring);
  z-index: 200;
}
.sheet-backdrop.visible {
  opacity: 1; pointer-events: auto;
}
/* Desktop: no backdrop (non-modal side panel) */
[data-device-mode="desktop"] .sheet-backdrop { display: none; }

/* ── Sheet ── */
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-height: 85vh;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  border-bottom: none;
  transform: translateY(100%);
  transition: transform var(--duration-sheet) var(--ease-spring);
  z-index: 210;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  color: var(--color-text);
  font-family: var(--font-family);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 5px;
  background: var(--color-surface-hover);
  border-radius: 3px;
  margin: var(--space-sm) auto;
}
.sheet-header {
  padding: var(--space-sm) var(--space-lg);
  font-size: var(--font-base);
  font-weight: 600;
  color: var(--color-text);
  border-bottom: 1px solid var(--color-border);
}

/* Tablet + desktop: side sheet */
@media (min-width: 768px) {
  .sheet {
    top: 0; bottom: 0; left: auto; right: 0;
    width: 340px; max-height: none;
    border-radius: 0;
    border-left: 1px solid var(--color-border);
    border-top: none;
    transform: translateX(100%);
  }
  .sheet.open { transform: translateX(0); }
  .sheet-handle { display: none; }
}

/* ── Grouped list ── */
.group { margin-bottom: var(--space-xl); }
.group-header {
  padding: var(--space-xs) var(--space-lg);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.group-list {
  list-style: none; margin: 0; padding: 0;
  background: var(--color-surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--color-border);
}
.group-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: var(--tap-target);
  padding: var(--space-sm) var(--space-lg);
  border-bottom: 1px solid var(--color-border);
  font-size: var(--font-sm);
  color: var(--color-text);
}
.group-item:last-child { border-bottom: none; }
.group-item:active { background: var(--color-surface-hover); }
.group-action { color: var(--color-danger); cursor: pointer; }
.group-value {
  color: var(--color-text-secondary);
  display: flex; align-items: center; gap: var(--space-xs);
  font-variant-numeric: tabular-nums;
}
.group-footer {
  padding: var(--space-xs) var(--space-lg);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
}

/* ── Segmented control ── */
/* Segmented control — uses CSS custom properties for positioning.
   Set --seg-count (number of segments) and --seg-active (0-indexed active segment)
   on the .segmented element. No child indicator div needed. */
fieldset.segmented {
  border: none;
  margin: 0;
}
.segmented {
  display: flex;
  position: relative;
  background: var(--color-btn);
  border-radius: var(--radius-sm);
  padding: 2px;
  align-self: center;
  --seg-count: 3;
  --seg-active: 0;
}
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0;
  margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
}
/* Indicator via ::before — no extra DOM element, no grid interference */
.segmented::before {
  content: '';
  position: absolute;
  top: 2px; bottom: 2px; left: 2px;
  width: calc((100% - 4px) / var(--seg-count));
  background: var(--color-surface-active);
  border-radius: calc(var(--radius-sm) - 2px);
  transform: translateX(calc(var(--seg-active) * 100%));
  transition: transform var(--duration-normal) var(--ease-spring);
  pointer-events: none;
  z-index: 1;
}
.segmented input[type="radio"] {
  /* Absolute-fill inside label: invisible but actionable for accessibility/testing */
  position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%;
  margin: 0; cursor: pointer;
}
/* .seg-item is the stable flex child — identical in live and review modes.
   Layout contract lives here, not on the label, so ActionHint wrappers
   inside disabled items do not change the flex child structure. */
.seg-item {
  flex: 1 1 0%;
  min-width: 0;
  display: flex;
  z-index: 2;
}
/* seg-item__content fills the slot; display:contents flattens it so the
   label (or ActionHint > label) participates directly in seg-item's flex. */
.seg-item__content { display: contents; }
.segmented .seg-label {
  position: relative; /* anchor for absolute-fill radio */
  text-align: center;
  padding: var(--space-sm) var(--space-sm);
  font-size: var(--font-sm);
  font-family: var(--font-family);
  color: var(--color-text-secondary);
  cursor: pointer; z-index: 2;
  min-height: 28px;
  display: flex; align-items: center; justify-content: center;
  transition: color var(--duration-fast);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
  flex: 1;
}
.segmented .seg-label.active { color: var(--color-text); }
.segmented .seg-label:has(input:focus-visible) {
  outline: 2px solid var(--color-accent-text);
  outline-offset: -2px;
}

/* ── Dock extras ── */
.dock-icon { font-size: 18px; line-height: 1; }
.dock-label { font-size: var(--font-xs); }
.dock-mode { max-width: var(--dock-mode-max-width); }
/* Placement surface styling — structure handled by JSX conditional rendering */
.dock-add-btn.dock-placement-accent { color: var(--color-accent-text); }

/* ── Bonded groups side panel ── */
.bonded-groups-panel {
  position: fixed;
  /* top set per-side below (secondary slot, offset below primary overlays) */
  z-index: 150;
  pointer-events: auto;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  user-select: none;
  -webkit-user-select: none;
  min-width: 80px;
  max-height: 60vh;
  overflow-y: auto;
  font-size: var(--font-sm);
  color: var(--color-text);
  transition: max-height 0.2s ease;
}
.bonded-groups-header {
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  font: inherit;
  width: 100%;
  text-align: left;
}
.bonded-groups-count {
  font-weight: 400;
  opacity: 0.7;
}
.bonded-groups-list {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bonded-groups-row {
  /* Row spans all columns of the parent list grid, then uses subgrid
     to share column tracks — this is the only way to get true cross-row
     column alignment while keeping the row box for hover/selected bg. */
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  align-items: center;
  padding: 2px 0;
  font-size: var(--font-xs);
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
  border-radius: 3px;
}
.bonded-groups-row:hover { background: var(--color-surface-hover); }
.bonded-groups-selected { background: var(--color-accent-soft) !important; }
.bonded-groups-label { opacity: 0.7; }
.bonded-groups-atoms { font-variant-numeric: tabular-nums; }
.bonded-groups-small-toggle {
  opacity: 0.8;
}
.bonded-groups-hovered { background: var(--color-surface-hover); }
.bonded-groups-small-row { opacity: 0.7; }
.bonded-groups-clear {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 4px 0;
  background: none;
  border: 1px solid var(--color-border);
  border-radius: 3px;
  color: var(--color-accent-text);
  font: inherit;
  font-size: var(--font-xs);
  cursor: pointer;
}
.bonded-groups-clear:hover { background: var(--color-surface-hover); }
.bonded-groups-follow-indicator {
  display: flex; align-items: center; gap: 4px;
  width: 100%; padding: 4px 8px; margin-bottom: 4px;
  background: var(--color-accent-soft, rgba(100,160,255,0.15));
  border: 1px solid var(--color-accent-text);
  border-radius: 3px;
  color: var(--color-accent-text); font: inherit; font-size: var(--font-xs);
  font-weight: 600; cursor: pointer;
  box-shadow: inset 0 0 0 1px var(--color-accent-text);
}
.bonded-groups-follow-indicator:hover { opacity: 0.8; }
/* Color chip — sits directly in grid cell, plain solid fill with no visible border */
.bonded-groups-color-chip {
  width: 16px; height: 16px; border-radius: 50%; border: none;
  background: var(--atom-base-color, #444); cursor: pointer; padding: 0;
  transition: transform 0.15s;
  justify-self: center;
}
.bonded-groups-color-chip:hover { transform: scale(1.15); }
/* Transparent backdrop — closes popover on outside click */
.bonded-groups-color-backdrop {
  position: fixed; inset: 0; z-index: 199;
}
/* Portalled color popover — escapes panel overflow, positioned via inline style.
   Honeycomb layout: default in center, 6 presets in hex ring around it. */
.bonded-groups-color-popover {
  z-index: 200;
  padding: 8px;
  background: var(--panel-bg); backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
}
.bonded-groups-color-hex {
  position: relative; width: 72px; height: 72px;
}
.bonded-groups-hex-slot {
  position: absolute; transform: translate(-50%, -50%);
}
/* Soften selected-row highlight when color popover is open */
.bonded-groups-color-open.bonded-groups-selected { background: var(--color-surface-hover) !important; }
.bonded-groups-swatch {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  padding: 0;
}
.bonded-groups-swatch:hover { transform: scale(1.15); }
.bonded-groups-swatch.active {
  transform: scale(1.3);
  border-color: transparent;
  box-shadow: none;
}
/* Original-color swatch — uses base atom color, visually consistent with presets */
.bonded-groups-swatch-original {
  background: var(--atom-base-color, #444);
}
/* Bonded-group list is a single 5-column grid. Header and rows all participate
   in the same column tracks via subgrid, so columns align perfectly regardless
   of atom-count digit width.
   Columns: color-chip | label | atoms | center | follow */
.bonded-groups-list {
  display: grid;
  grid-template-columns: 24px 1fr max-content max-content max-content;
  column-gap: 6px;
  padding: 0 8px;
}
/* Column header spans all 5 columns, subgrid aligns its children */
.bonded-groups-col-header {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  align-items: center;
  padding: 0 0 2px;
}
.bonded-groups-col-header > span {
  font-size: 9px; color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6;
  text-align: center; padding: 0 2px;
}
.bonded-groups-col-header > span:nth-child(2) { text-align: left; }
.bonded-groups-atoms { text-align: right; padding: 0 6px; font-variant-numeric: tabular-nums; }
.bonded-groups-action-btn {
  background: none; border: 1px solid transparent; color: var(--color-accent-text);
  cursor: pointer; padding: 3px; line-height: 1; display: flex; align-items: center; justify-content: center;
  opacity: 0.5; transition: opacity 0.15s, border-color 0.15s;
  border-radius: 3px;
}
.bonded-groups-action-btn:hover { opacity: 1; }
.bonded-groups-action-btn.active {
  opacity: 1;
  background: var(--color-accent-soft, rgba(100,160,255,0.15));
  border-color: var(--color-accent-text);
  box-shadow: inset 0 0 0 1px var(--color-accent-text);
}
/* Top-overlay layout contract:
 *   top-left primary:  .react-info (status)
 *   top-right primary: .react-fps (FPS display)
 *   top-left secondary: bonded-groups panel (offset below status)
 *   top-right secondary: bonded-groups panel (offset below FPS) */
.bonded-groups-panel.side-left { left: 12px; top: 48px; }
.bonded-groups-panel.side-right { right: 12px; top: 48px; }

/* ── Camera controls overlay (object-view panel below status block) ── */
.camera-controls {
  position: fixed;
  top: var(--cam-ctrl-top, 48px);
  left: var(--cam-ctrl-left, 12px);
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 150;
  pointer-events: auto;
}
.camera-action {
  min-width: 28px;
  min-height: 28px;
  padding: 4px 8px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  color: var(--color-text-secondary);
  font-size: var(--font-sm);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 4px;
}
.camera-action svg { flex-shrink: 0; }
.camera-action-active {
  color: var(--color-accent-text);
  border-color: var(--color-accent-text);
}
.camera-action-label {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.camera-action-hint {
  font-size: var(--font-xxs, 9px);
  opacity: 0.6;
}
/* Hide secondary hints on desktop (title tooltips handle discoverability) */
@media (hover: hover) and (pointer: fine) {
  .camera-action-hint { display: none; }
}

/* ── Onboarding overlay ── */
/* --onboarding-sink-duration is set from JS (OnboardingOverlay.tsx SINK_DURATION_MS).
   CSS fallback 0.95s is used only if JS hasn't run yet — keep in sync with SINK_DURATION_MS. */

.onboarding-backdrop {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.5);
  opacity: 1;
  transition: opacity 0.3s ease-out;
}
.onboarding-backdrop.onboarding-exit {
  opacity: 0;
  transition: opacity var(--onboarding-sink-duration, 0.95s) ease-out;
}
.onboarding-card {
  max-width: 320px;
  width: 90%;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  text-align: center;
}
/* Two-phase exit: distort/compress (0–50%) then translate/absorb (50–100%) */
.onboarding-card.onboarding-card-exit {
  --sink-x: 0px;
  --sink-y: 100px;
  animation: onboarding-sink var(--onboarding-sink-duration, 0.95s) ease-in forwards;
}
@keyframes onboarding-sink {
  0%   { opacity: 1; transform: scale(1, 1) translate(0, 0); border-radius: var(--radius-md); }
  25%  { opacity: 0.9; transform: scale(0.85, 0.6) translate(0, 0); border-radius: 16px; }
  50%  { opacity: 0.6; transform: scale(0.35, 0.25) translate(calc(var(--sink-x) * 0.3), calc(var(--sink-y) * 0.3)); border-radius: 50%; }
  80%  { opacity: 0.2; transform: scale(0.12, 0.12) translate(var(--sink-x), var(--sink-y)); border-radius: 50%; }
  100% { opacity: 0; transform: scale(0.05, 0.05) translate(var(--sink-x), var(--sink-y)); border-radius: 50%; }
}
/* Sink destination highlight on Settings button */
.onboarding-sink-target {
  animation: onboarding-absorb var(--onboarding-sink-duration, 0.95s) ease-out;
}
@keyframes onboarding-absorb {
  0%   { box-shadow: none; }
  40%  { box-shadow: none; }
  60%  { box-shadow: 0 0 12px 3px var(--color-accent-text); }
  80%  { box-shadow: 0 0 6px 1px var(--color-accent-text); }
  100% { box-shadow: none; }
}
.onboarding-title {
  font-size: var(--font-md);
  font-weight: bold;
  color: var(--color-text);
  margin-bottom: var(--space-md);
}
.onboarding-body {
  font-size: var(--font-sm);
  color: var(--color-text-secondary);
  line-height: 1.8;
  margin-bottom: var(--space-md);
}
.onboarding-body b {
  color: var(--color-text);
}
.onboarding-hint {
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  opacity: 0.7;
}

/* ── Sheet pages (drill-in navigation) ── */
.sheet-page { /* default visible */ }
.sheet-visible { display: block; }
.sheet-page-hidden { display: none; }
.row-hidden { display: none; }

/* ── React-authoritative components (Milestone D) ── */
/* Mirror ID-based styles so React components match imperative originals */
.react-info {
  position: absolute; top: 12px; left: 12px;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; font-size: var(--font-xs); line-height: 1.7;
  border-radius: var(--radius-sm); z-index: 10;
  border: 1px solid var(--color-border);
}
.react-info .title { display: none; }
.react-info .status-text { color: var(--color-text-secondary); font-size: var(--font-xs); }
.react-info .reconciliation-text { color: var(--color-accent-text); font-size: var(--font-xs); }
.react-fps {
  position: absolute; top: 12px; right: 12px;
  color: var(--color-fps-text); font-size: var(--font-sm); z-index: 10;
  font-variant-numeric: tabular-nums;
  background: var(--color-surface);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  line-height: 1.4; cursor: pointer;
}

/* ── Timeline bar (inside dock-region, normal flow above dock-bar) ── */
/* ── Timeline bar: 2-row CSS grid ──
   Row 1: badge | time | track  — track width is stable across all modes
   Row 2: meta  | meta | actions — actions never compete with track for space
   The track column always gets minmax(80px, 1fr) regardless of how many
   buttons appear in the actions area. */
/* Row 1 is a 3-column grid (badge | time | track) with all fixed or 1fr columns.
   Row 2 is a plain flex row (meta + actions) OUTSIDE the grid, so its variable-
   width buttons never affect track width. This is the only way to guarantee
   the track column is identical across off/ready/active/review states. */
.timeline-bar {
  display: flex; flex-direction: column;
  padding: 2px var(--space-md) 4px;
  font-family: var(--font-family);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  touch-action: none;
  user-select: none;
}
.timeline-bar + .dock-bar { border-top: none; }
.timeline-row1 {
  display: grid; align-items: center; gap: var(--space-sm);
  grid-template-columns: 80px 60px 1fr;
  height: 28px;
}
.timeline-row2 {
  display: flex; align-items: center; gap: var(--space-sm);
  min-height: 18px;
}
.timeline-lane-meta { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.timeline-lane-actions { flex: 0 0 auto; }
.timeline-badge {
  display: inline-block;
  text-align: center;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.timeline-badge--live {
  background: rgba(80, 200, 80, 0.15); color: var(--color-accent-text);
}
.timeline-badge--review {
  background: rgba(255, 180, 60, 0.15); color: var(--color-text);
}
.timeline-badge--off {
  background: var(--color-border); color: var(--color-text-secondary);
}
.timeline-badge--ready {
  background: rgba(80, 160, 255, 0.15); color: var(--color-accent-text);
}
.timeline-time {
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.timeline-track {
  position: relative;
  height: 6px; border-radius: 3px;
  background: var(--color-border);
  cursor: pointer;
}
.timeline-track::before {
  content: ''; position: absolute;
  inset: -18px 0;
  cursor: pointer;
}
.timeline-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  border-radius: 3px;
  background: var(--color-accent-text);
  pointer-events: none;
}
.timeline-thumb {
  position: absolute; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-accent-text);
  border: 2px solid var(--panel-bg);
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: transform 0.1s ease;
}
.timeline-track:active .timeline-thumb { transform: translate(-50%, -50%) scale(1.2); }
.timeline-actions {
  display: flex; align-items: center; gap: 4px;
  justify-content: flex-end;
}
.timeline-restart-target {
  font-variant-numeric: tabular-nums;
  font-size: 10px; opacity: 0.7;
}
.timeline-action {
  padding: 4px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: none; color: var(--color-text);
  font-family: var(--font-family); font-size: var(--font-xs);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.timeline-action:disabled { opacity: 0.45; cursor: default; pointer-events: none; }
.timeline-action:hover { background: var(--color-border); }
.timeline-action--restart {
  border-color: var(--color-accent-text);
  color: var(--color-accent-text);
}
.timeline-action--destructive {
  border-color: rgba(220, 80, 60, 0.5);
  color: rgba(220, 80, 60, 0.9);
}
.timeline-action--destructive:hover { background: rgba(220, 80, 60, 0.1); }
.timeline-bar--disabled { opacity: 0.7; }
.timeline-track--disabled { pointer-events: none; cursor: default; }
.timeline-helper {
  font-style: italic; font-size: var(--font-xs); opacity: 0.6;
}
/* Compact: narrower fixed columns on small screens */
@media (max-width: 599px) {
  .timeline-bar { --timeline-compact: 1; }
  .timeline-row1 { grid-template-columns: 64px 50px 1fr; }
  .timeline-row2 { flex-wrap: wrap; justify-content: center; }
}
/* ── Action hints — shared hover/focus tooltips (used by TimelineBar + CameraControls) ──
   Class family .timeline-hint-* is retained as shared infrastructure despite the name. */
.timeline-hint-anchor { position: relative; display: inline-flex; }
.timeline-hint {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  min-width: 140px;
  max-width: 220px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(20, 20, 24, 0.96);
  color: #fff;
  font-size: 11px;
  line-height: 1.35;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
  opacity: 0;
  pointer-events: none;
  transition: opacity 140ms ease, transform 140ms ease;
  z-index: 40;
  white-space: normal;
}
.timeline-hint--visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.timeline-hint-arrow {
  position: absolute;
  top: 100%;
  left: 50%;
  width: 8px;
  height: 8px;
  transform: translateX(-50%) translateY(-50%) rotate(45deg);
  background: rgba(20, 20, 24, 0.96);
}
/* Right-aligned placement for rightmost actions near viewport edge */
.timeline-hint--top-end {
  left: auto;
  right: 0;
  transform: translateY(4px);
}
.timeline-hint--top-end.timeline-hint--visible {
  transform: translateY(0);
}
.timeline-hint--top-end .timeline-hint-arrow {
  left: auto;
  right: 12px;
  transform: translateY(-50%) rotate(45deg);
}
/* Right-side placement for left-edge controls (Object View panel) */
.timeline-hint--right {
  bottom: auto;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%) translateX(-4px);
  min-width: 120px;
}
.timeline-hint--right.timeline-hint--visible {
  transform: translateY(-50%) translateX(0);
}
.timeline-hint--right .timeline-hint-arrow {
  top: 50%;
  left: auto;
  right: 100%;
  transform: translateY(-50%) translateX(50%) rotate(45deg);
}
/* Bottom-start placement for settings list rows */
.timeline-hint--bottom-start {
  bottom: auto;
  top: calc(100% + 8px);
  left: 0;
  transform: translateY(-4px);
}
.timeline-hint--bottom-start.timeline-hint--visible {
  transform: translateY(0);
}
.timeline-hint--bottom-start .timeline-hint-arrow {
  top: auto;
  bottom: 100%;
  left: 16px;
  transform: translateY(50%) rotate(45deg);
}
@media (hover: none), (pointer: coarse) {
  .timeline-hint { display: none; }
}
</style>
</head>

  <!-- React mount point (Milestone D) — display:contents so children position independently -->
  <div id="react-root" style="display:contents"></div>
  <div id="hint">Click or tap an atom to interact</div>

  <!-- Dock rendered by React Dock component -->
</div>

<script type="module" src="js/main"></script>
