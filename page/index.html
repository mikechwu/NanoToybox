<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NanoToybox — Interactive Carbon Playground</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Static tokens (theme-independent) ── */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-xs: 12px;
  --font-sm: 14px;
  --font-base: 16px;
  --tap-target: 44px;
  --glass-blur: 8px;
  --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1.0);
  --duration-fast: 0.15s;
  --duration-normal: 0.3s;
  --duration-sheet: 0.45s;
  /* Safe-area insets as readable CSS vars (for JS layout computation) */
  --safe-left: env(safe-area-inset-left, 0px);
  --dock-mode-max-width: 180px;
}
/* Text size: :root defines Normal defaults; Large overrides via data attribute */
[data-text-size="large"] {
  --font-xs: 14px;
  --font-sm: 16px;
  --font-base: 18px;
  --dock-mode-max-width: 200px;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --duration-fast: 0s;
    --duration-normal: 0s;
    --duration-sheet: 0s;
  }
}

/* Performance: reduced effects — disables blur entirely for weak GPUs.
   Activated automatically by FPS gate (hysteresis in frameLoop when glass UI is visible)
   or manually via _setUiEffectsMode('reduced') in console. */
[data-ui-effects="reduced"] {
  --glass-blur: 0px;
}
[data-ui-effects="reduced"] .panel,
[data-ui-effects="reduced"] .react-info,
[data-ui-effects="reduced"] .react-fps,
[data-ui-effects="reduced"] .dock-bar,
[data-ui-effects="reduced"] .sheet {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

html, body {
  height: 100%;
  background: var(--page-bg);
  color: var(--color-text);
  font-family: var(--font-family);
  overflow: hidden;
}
#container {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  position: relative;
}
canvas { display: block; touch-action: none; }

#hint {
  position: absolute; bottom: var(--hint-bottom, 70px); left: 50%; transform: translateX(-50%);
  background: var(--color-hint-bg); color: var(--color-accent-text);
  padding: 8px 20px; border-radius: 20px; font-size: var(--font-sm);
  z-index: 10; pointer-events: none;
  opacity: 1; transition: opacity 1.5s ease-out;
}
#hint.fade { opacity: 0; }

.drawer-item {
  padding: var(--space-sm) 10px; cursor: pointer; color: var(--color-text);
  border-radius: var(--radius-sm);
  margin-bottom: 2px; touch-action: manipulation;
}
.drawer-item:hover { background: var(--color-surface-hover); }
.chooser-recent {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: var(--space-sm) 10px; margin-bottom: var(--space-sm);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer; border-radius: var(--radius-sm);
  color: var(--color-text); touch-action: manipulation;
}
.chooser-recent:hover { background: var(--color-surface-hover); }
.chooser-recent-label {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.chooser-recent-name { font-weight: 500; color: var(--color-accent-text); }

/* ── Panel shared styles (extracted from inline) ── */
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-size: 12px;
}
.panel-heading {
  font-weight: 600; font-size: var(--font-sm);
  color: var(--color-text);
}
.panel-label {
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.panel-value {
  color: var(--color-accent-text);
  font-size: var(--font-xs);
  font-variant-numeric: tabular-nums;
}
.panel-btn {
  background: var(--color-btn); color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 4px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-xs);
  font-family: inherit;
}
.panel-btn.active {
  background: var(--color-surface-hover);
  color: var(--color-text);
}
.panel-btn-accent {
  background: var(--color-accent-soft); color: var(--color-accent-text);
  border: 1px solid var(--color-accent);
  padding: var(--space-sm) 20px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-sm); font-weight: 600;
  font-family: inherit;
}
.panel-slider {
  width: 100%; accent-color: var(--color-accent); touch-action: auto;
}
.panel-helper {
  color: var(--color-text-secondary); font-size: 9px;
}
/* Atom count in settings sheet Scene section — styled via .group-value */

/* ── Help modal ── */
#help {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 30; max-width: 400px; width: 90%;
  padding: var(--space-xl); line-height: 1.7;
}
.help-section-title {
  margin-top: var(--space-md); margin-bottom: var(--space-sm);
  color: var(--color-accent-text);
  font-size: var(--font-xs); text-transform: uppercase; letter-spacing: 1px;
}

/* ══════════════════════════════════════════════════════════
   Layout primitives: dock, sheet, grouped list, segmented control
   ══════════════════════════════════════════════════════════ */

/* ── Dock region (measurement root for overlay-layout.ts) ── */
.dock-region {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 205; /* Above backdrop (200) so dock stays interactive while sheets are open */
}
/* ── Dock bar (visual toolbar) ── */
.dock-bar {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: calc(var(--tap-target) + var(--space-lg) + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border-top: 1px solid var(--color-border);
}
.dock-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: var(--tap-target);
  min-height: var(--tap-target);
  padding: var(--space-xs) var(--space-sm);
  background: none;
  border: none;
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color var(--duration-fast);
}
.dock-item.active { color: var(--color-accent-text); }
.dock-item:disabled { opacity: 0.3; cursor: default; }

@media (min-width: 768px) {
  .dock-region {
    left: 50%; transform: translateX(-50%);
    width: auto; min-width: 320px; max-width: 480px;
    bottom: calc(var(--space-lg) + env(safe-area-inset-bottom, 0px));
  }
  .dock-bar {
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    /* Safe-area clearance moved from internal padding to external position,
       so the pill content stays vertically centered. */
    height: calc(var(--tap-target) + var(--space-lg));
    padding-bottom: 0;
  }
}

/* ── Sheet backdrop ── */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  opacity: 0; pointer-events: none;
  transition: opacity var(--duration-sheet) var(--ease-spring);
  z-index: 200;
}
.sheet-backdrop.visible {
  opacity: 1; pointer-events: auto;
}
/* Desktop: no backdrop (non-modal side panel) */
[data-device-mode="desktop"] .sheet-backdrop { display: none; }

/* ── Sheet ── */
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-height: 85vh;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  border-bottom: none;
  transform: translateY(100%);
  transition: transform var(--duration-sheet) var(--ease-spring);
  z-index: 210;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  color: var(--color-text);
  font-family: var(--font-family);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 5px;
  background: var(--color-surface-hover);
  border-radius: 3px;
  margin: var(--space-sm) auto;
}
.sheet-header {
  padding: var(--space-sm) var(--space-lg);
  font-size: var(--font-base);
  font-weight: 600;
  color: var(--color-text);
  border-bottom: 1px solid var(--color-border);
}

/* Tablet + desktop: side sheet */
@media (min-width: 768px) {
  .sheet {
    top: 0; bottom: 0; left: auto; right: 0;
    width: 340px; max-height: none;
    border-radius: 0;
    border-left: 1px solid var(--color-border);
    border-top: none;
    transform: translateX(100%);
  }
  .sheet.open { transform: translateX(0); }
  .sheet-handle { display: none; }
}

/* ── Grouped list ── */
.group { margin-bottom: var(--space-xl); }
.group-header {
  padding: var(--space-xs) var(--space-lg);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.group-list {
  list-style: none; margin: 0; padding: 0;
  background: var(--color-surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--color-border);
}
.group-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: var(--tap-target);
  padding: var(--space-sm) var(--space-lg);
  border-bottom: 1px solid var(--color-border);
  font-size: var(--font-sm);
  color: var(--color-text);
}
.group-item:last-child { border-bottom: none; }
.group-item:active { background: var(--color-surface-hover); }
.group-action { color: var(--color-danger); cursor: pointer; }
.group-value {
  color: var(--color-text-secondary);
  display: flex; align-items: center; gap: var(--space-xs);
  font-variant-numeric: tabular-nums;
}
.group-footer {
  padding: var(--space-xs) var(--space-lg);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
}

/* ── Segmented control ── */
/* Segmented control — uses CSS custom properties for positioning.
   Set --seg-count (number of segments) and --seg-active (0-indexed active segment)
   on the .segmented element. No child indicator div needed. */
fieldset.segmented {
  border: none;
  margin: 0;
}
.segmented {
  display: flex;
  position: relative;
  background: var(--color-btn);
  border-radius: var(--radius-sm);
  padding: 2px;
  align-self: center;
  --seg-count: 3;
  --seg-active: 0;
}
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0;
  margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
}
/* Indicator via ::before — no extra DOM element, no grid interference */
.segmented::before {
  content: '';
  position: absolute;
  top: 2px; bottom: 2px; left: 2px;
  width: calc((100% - 4px) / var(--seg-count));
  background: var(--color-surface-active);
  border-radius: calc(var(--radius-sm) - 2px);
  transform: translateX(calc(var(--seg-active) * 100%));
  transition: transform var(--duration-normal) var(--ease-spring);
  pointer-events: none;
  z-index: 1;
}
.segmented input[type="radio"] {
  /* Absolute-fill inside label: invisible but actionable for accessibility/testing */
  position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%;
  margin: 0; cursor: pointer;
}
.segmented label {
  position: relative; /* anchor for absolute-fill radio */
  flex: 1 1 0%;
  min-width: 0; /* Override intrinsic min-width so flex distributes equally regardless of text length */
  text-align: center;
  padding: var(--space-sm) var(--space-sm);
  font-size: var(--font-sm);
  font-family: var(--font-family);
  color: var(--color-text-secondary);
  cursor: pointer; z-index: 2;
  min-height: 28px;
  display: flex; align-items: center; justify-content: center;
  transition: color var(--duration-fast);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
}
.segmented label.active { color: var(--color-text); }
.segmented label:has(input:focus-visible) {
  outline: 2px solid var(--color-accent-text);
  outline-offset: -2px;
}
.seg-disabled { opacity: 0.4; pointer-events: none; }

/* ── Dock extras ── */
.dock-icon { font-size: 18px; line-height: 1; }
.dock-label { font-size: var(--font-xs); }
.dock-item.dock-text-only { justify-content: center; }
.dock-mode { max-width: var(--dock-mode-max-width); }
/* Placement surface styling — structure handled by JSX conditional rendering */
.dock-add-btn.dock-placement-accent { color: var(--color-accent-text); }

/* ── Bonded groups side panel ── */
.bonded-groups-panel {
  position: fixed;
  /* top set per-side below (secondary slot, offset below primary overlays) */
  z-index: 150;
  pointer-events: auto;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  user-select: none;
  -webkit-user-select: none;
  min-width: 80px;
  max-height: 60vh;
  overflow-y: auto;
  font-size: var(--font-sm);
  color: var(--color-text);
  transition: max-height 0.2s ease;
}
.bonded-groups-header {
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  font: inherit;
  width: 100%;
  text-align: left;
}
.bonded-groups-count {
  font-weight: 400;
  opacity: 0.7;
}
.bonded-groups-list {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bonded-groups-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 2px 0;
  font-size: var(--font-xs);
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  text-align: left;
  width: 100%;
  cursor: pointer;
  border-radius: 3px;
}
.bonded-groups-row:hover { background: var(--color-surface-hover); }
.bonded-groups-selected { background: var(--color-accent-soft) !important; }
.bonded-groups-label { opacity: 0.7; }
.bonded-groups-atoms { font-variant-numeric: tabular-nums; }
.bonded-groups-small-toggle {
  opacity: 0.8;
}
.bonded-groups-hovered { background: var(--color-surface-hover); }
.bonded-groups-small-row { opacity: 0.7; }
.bonded-groups-clear {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 4px 0;
  background: none;
  border: 1px solid var(--color-border);
  border-radius: 3px;
  color: var(--color-accent-text);
  font: inherit;
  font-size: var(--font-xs);
  cursor: pointer;
}
.bonded-groups-clear:hover { background: var(--color-surface-hover); }
/* Top-overlay layout contract:
 *   top-left primary:  .react-info (status)
 *   top-right primary: .react-fps (FPS display)
 *   top-left secondary: bonded-groups panel (offset below status)
 *   top-right secondary: bonded-groups panel (offset below FPS) */
.bonded-groups-panel.side-left { left: 12px; top: 48px; }
.bonded-groups-panel.side-right { right: 12px; top: 48px; }

/* ── Camera controls overlay (positioned by overlay-layout.ts) ── */
.camera-controls {
  position: fixed;
  bottom: var(--cam-ctrl-bottom, 80px);
  left: var(--cam-ctrl-left, 6px);
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 150;
  pointer-events: auto;
}
.camera-chip {
  display: flex;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
}
.camera-chip-body {
  min-width: 36px;
  min-height: 28px;
  padding: 2px 8px;
  border: none;
  background: none;
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.camera-chip-help {
  min-width: 28px;
  min-height: 28px;
  padding: 2px 6px;
  border: none;
  border-left: 1px solid var(--color-border);
  background: none;
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.camera-action {
  min-width: 28px;
  min-height: 28px;
  padding: 4px 8px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  color: var(--color-text-secondary);
  font-size: var(--font-sm);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
/* Suppress iOS Safari long-press text selection / callout on the ⊕/◎ button */
.camera-action-center {
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}
.quick-help-card {
  position: fixed;
  bottom: calc(var(--cam-ctrl-bottom, 80px) + 40px);
  left: var(--cam-ctrl-left, 6px);
  width: 220px;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  z-index: 210;
  font-size: var(--font-xs);
  line-height: 1.6;
}
.quick-help-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  margin-bottom: var(--space-sm);
}
.quick-help-close {
  background: none;
  border: none;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-size: var(--font-sm);
  padding: 2px 4px;
}
.quick-help-section {
  color: var(--color-accent-text);
  font-size: var(--font-xs);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: var(--space-xs);
}
.quick-help-row {
  color: var(--color-text-secondary);
}
.quick-help-row b {
  color: var(--color-text);
  display: inline-block;
  min-width: 80px;
}

.camera-action-pick {
  color: var(--color-accent-text);
  font-size: var(--font-xs);
}

/* ── Sheet pages (drill-in navigation) ── */
.sheet-page { /* default visible */ }
.sheet-visible { display: block; }
.sheet-page-hidden { display: none; }
.row-hidden { display: none; }

/* ── React-authoritative components (Milestone D) ── */
/* Mirror ID-based styles so React components match imperative originals */
.react-info {
  position: absolute; top: 12px; left: 12px;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; font-size: var(--font-xs); line-height: 1.7;
  border-radius: var(--radius-sm); z-index: 10;
  border: 1px solid var(--color-border);
}
.react-info .title { display: none; }
.react-info .status-text { color: var(--color-text-secondary); font-size: var(--font-xs); }
.react-info .reconciliation-text { color: var(--color-accent-text); font-size: var(--font-xs); }
.react-fps {
  position: absolute; top: 12px; right: 12px;
  color: var(--color-fps-text); font-size: var(--font-sm); z-index: 10;
  font-variant-numeric: tabular-nums;
  background: var(--color-surface);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  line-height: 1.4; cursor: pointer;
}

/* ── Timeline bar (inside dock-region, normal flow above dock-bar) ── */
.timeline-bar {
  display: flex; align-items: center; gap: var(--space-sm);
  height: 32px;
  padding: 0 var(--space-md);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  touch-action: none;
  user-select: none;
}
/* When timeline sits above dock-bar, use bottom border on timeline instead of
   top border on dock-bar to avoid doubling. The + combinator targets dock-bar
   that immediately follows timeline-bar. */
.timeline-bar + .dock-bar { border-top: none; }
.timeline-badge {
  flex: 0 0 48px; /* fixed width — Live and Review both fit */
  text-align: center;
  padding: 2px 0; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.timeline-badge--live {
  background: rgba(80, 200, 80, 0.15); color: var(--color-accent-text);
}
.timeline-badge--review {
  background: rgba(255, 180, 60, 0.15); color: var(--color-text);
}
.timeline-time {
  flex: 0 0 76px; /* fixed width — fits "999 fs" up to "9999.9 ps" */
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.timeline-track {
  flex: 1; position: relative;
  height: 6px; border-radius: 3px;
  background: var(--color-border);
  cursor: pointer;
}
/* Expanded touch hit area — meets 44px tap target via invisible ::before */
.timeline-track::before {
  content: ''; position: absolute;
  inset: -18px 0;
  cursor: pointer;
}
.timeline-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  border-radius: 3px;
  background: var(--color-accent-text);
  pointer-events: none;
}
.timeline-thumb {
  position: absolute; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-accent-text);
  border: 2px solid var(--panel-bg);
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: transform 0.1s ease;
}
.timeline-track:active .timeline-thumb { transform: translate(-50%, -50%) scale(1.2); }
.timeline-actions {
  flex: 0 0 140px; /* fixed width — immune to label length changes */
  display: flex; align-items: center; gap: 4px;
  justify-content: flex-end;
}
.timeline-restart-target {
  font-variant-numeric: tabular-nums;
  font-size: 10px; opacity: 0.7;
  min-width: 40px; text-align: right;
}
.timeline-action {
  padding: 4px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: none; color: var(--color-text);
  font-family: var(--font-family); font-size: var(--font-xs);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.timeline-action:disabled { opacity: 0; cursor: default; pointer-events: none; }
.timeline-action:hover { background: var(--color-border); }
.timeline-action--restart {
  border-color: var(--color-accent-text);
  color: var(--color-accent-text);
}
