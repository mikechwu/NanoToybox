<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NanoToybox — Spread-Domain Benchmark</title>
<style>
body { font-family: monospace; background: #1a1a2e; color: #e8e8e8; padding: 20px; max-width: 1200px; }
table { border-collapse: collapse; margin: 10px 0; }
th, td { border: 1px solid #444; padding: 4px 10px; text-align: right; }
th { background: #223; }
.label { text-align: left; }
button { background: #334; color: #ccc; border: 1px solid #555; padding: 8px 16px; cursor: pointer; margin: 4px; }
button:disabled { opacity: 0.4; }
</style>
</head>
<body>
<h2>Spread-Domain Benchmark</h2>
<p>Measures step-time breakdown across spread configurations.<br>
Fixed layouts (no integration) &mdash; calls <code>computeForces()</code> directly.<br>
Kernel: <span id="kernel-label">auto</span></p>
<div>
  <button id="btn-run">Run Benchmark</button>
</div>
<div id="status" style="color:#60a0ff;"></div>
<div id="results"></div>

<script type="module">
import { PhysicsEngine } from '../js/physics';
import { CONFIG } from '../js/config';
import { buildScene } from './bench-scenes';

const WARMUP = 50;
const MEASURED_STATIC = 200;
const MEASURED_DYNAMIC = 5000; // longer runs for dynamic cases to reach extreme spans

const status = document.getElementById('status');
const results = document.getElementById('results');
const kernelLabel = document.getElementById('kernel-label');

// ── Kernel detection from URL ──
const params = new URLSearchParams(location.search);
let kernelParam = params.get('kernel');
if (!kernelParam) kernelParam = 'js'; // default to js
kernelLabel.textContent = kernelParam;

// ── Spread scene builder ──
// Takes a template scene (atoms + bonds) and produces a new scene with
// positions scaled or replicated to achieve target spatial spread.

function buildSpreadScene(templateAtoms, templateBonds, opts) {
  const { copies = 1, separation = 0, scaleTo = null } = opts;

  // Compute bounding info of template
  let cx = 0, cy = 0, cz = 0;
  for (const a of templateAtoms) { cx += a.x; cy += a.y; cz += a.z; }
  cx /= templateAtoms.length; cy /= templateAtoms.length; cz /= templateAtoms.length;
  let maxR = 0;
  for (const a of templateAtoms) {
    const d = Math.sqrt((a.x - cx) ** 2 + (a.y - cy) ** 2 + (a.z - cz) ** 2);
    if (d > maxR) maxR = d;
  }
  const radius = maxR;

  // Single-molecule scaling: scale coordinates so bounding box reaches scaleTo
  if (copies === 1 && scaleTo !== null) {
    // Current diameter (bounding box span)
    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
    for (const a of templateAtoms) {
      if (a.x < minX) minX = a.x; if (a.x > maxX) maxX = a.x;
      if (a.y < minY) minY = a.y; if (a.y > maxY) maxY = a.y;
      if (a.z < minZ) minZ = a.z; if (a.z > maxZ) maxZ = a.z;
    }
    const span = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
    const scale = span > 0 ? scaleTo / span : 1;

    const atoms = templateAtoms.map(a => ({
      x: cx + (a.x - cx) * scale,
      y: cy + (a.y - cy) * scale,
      z: cz + (a.z - cz) * scale,
    }));
    // Bonds are index-based, topology preserved
    const bonds = templateBonds.map(b => [b[0], b[1], b[2]]);
    return { atoms, bonds };
  }

  // Multi-molecule: place copies along x-axis at given separation
  const allAtoms = [];
  const allBonds = [];
  for (let c = 0; c < copies; c++) {
    const ox = c * separation;
    const offset = allAtoms.length;
    for (const a of templateAtoms) {
      allAtoms.push({ x: a.x - cx + ox, y: a.y - cy, z: a.z - cz });
    }
    for (const b of templateBonds) {
      allBonds.push([b[0] + offset, b[1] + offset, b[2]]);
    }
  }
  return { atoms: allAtoms, bonds: allBonds };
}

// ── Benchmark cases ──
// Each case defines how to build its scene from the c60 template.
const CASES = [
  {
    label: 'C60 compact',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 1 }),
  },
  {
    label: 'C60 spread 50A',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 1, scaleTo: 50 }),
  },
  {
    label: 'C60 spread 100A',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 1, scaleTo: 100 }),
  },
  {
    label: 'C60 spread 200A',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 1, scaleTo: 200 }),
  },
  {
    label: '2xC60 compact',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 2, separation: 2 * r + 3 }),
  },
  {
    label: '2xC60 100A apart',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 2, separation: 100 }),
  },
  {
    label: '2xC60 500A apart',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 2, separation: 500 }),
  },
  {
    label: '~1020 compact',
    build: (tA, tB, r) => {
      // 17 copies on a grid, tangent+1A spacing
      const spacing = 2 * r + 1;
      const gridSize = Math.ceil(Math.cbrt(17));
      const allAtoms = [];
      const allBonds = [];
      // Center template
      let cx = 0, cy = 0, cz = 0;
      for (const a of tA) { cx += a.x; cy += a.y; cz += a.z; }
      cx /= tA.length; cy /= tA.length; cz /= tA.length;
      for (let c = 0; c < 17; c++) {
        const ix = c % gridSize;
        const iy = Math.floor(c / gridSize) % gridSize;
        const iz = Math.floor(c / (gridSize * gridSize));
        const ox = ix * spacing, oy = iy * spacing, oz = iz * spacing;
        const offset = allAtoms.length;
        for (const a of tA) {
          allAtoms.push({ x: a.x - cx + ox, y: a.y - cy + oy, z: a.z - cz + oz });
        }
        for (const b of tB) {
          allBonds.push([b[0] + offset, b[1] + offset, b[2]]);
        }
      }
      return { atoms: allAtoms, bonds: allBonds };
    },
  },
  {
    label: '~1020 spread',
    build: (tA, tB, r) => {
      // 17 copies on a grid, 200A spacing
      const spacing = 200;
      const gridSize = Math.ceil(Math.cbrt(17));
      const allAtoms = [];
      const allBonds = [];
      let cx = 0, cy = 0, cz = 0;
      for (const a of tA) { cx += a.x; cy += a.y; cz += a.z; }
      cx /= tA.length; cy /= tA.length; cz /= tA.length;
      for (let c = 0; c < 17; c++) {
        const ix = c % gridSize;
        const iy = Math.floor(c / gridSize) % gridSize;
        const iz = Math.floor(c / (gridSize * gridSize));
        const ox = ix * spacing, oy = iy * spacing, oz = iz * spacing;
        const offset = allAtoms.length;
        for (const a of tA) {
          allAtoms.push({ x: a.x - cx + ox, y: a.y - cy + oy, z: a.z - cz + oz });
        }
        for (const b of tB) {
          allBonds.push([b[0] + offset, b[1] + offset, b[2]]);
        }
      }
      return { atoms: allAtoms, bonds: allBonds };
    },
  },
  // ── Dynamic spread: positions drift apart each step ──
  {
    label: 'C60 dyn-spread',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 1, targetSpan: null }),
    dynamic: true,
    driftRate: 0.05,  // Å/step per atom, random direction
  },
  {
    label: '780 dyn-spread',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 13, separation: 2 * r + 1 }),
    dynamic: true,
    driftRate: 0.05,
  },
  {
    label: '780 dyn-spread fast',
    build: (tA, tB, r) => buildSpreadScene(tA, tB, { copies: 13, separation: 2 * r + 1 }),
    dynamic: true,
    driftRate: 0.2,  // faster expansion, simulates rotation fling
  },
];

function applyDrift(engine, rate) {
  const pos = engine.pos;
  const n = engine.n;
  for (let i = 0; i < n; i++) {
    const i3 = i * 3;
    // Drift each atom outward from COM
    const dx = pos[i3] - engine._comX;
    const dy = pos[i3+1] - engine._comY;
    const dz = pos[i3+2] - engine._comZ;
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    pos[i3]   += rate * dx / d;
    pos[i3+1] += rate * dy / d;
    pos[i3+2] += rate * dz / d;
  }
}

async function runBenchmark() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  results.innerHTML = '';

  // Load c60 template via buildScene (single copy)
  status.textContent = 'Loading C60 template...';
  await new Promise(r => setTimeout(r, 10));
  const base = await buildScene(60, 'compact');
  const tAtoms = base.atoms;
  const tBonds = base.bonds;

  // Compute template bounding radius
  let cx = 0, cy = 0, cz = 0;
  for (const a of tAtoms) { cx += a.x; cy += a.y; cz += a.z; }
  cx /= tAtoms.length; cy /= tAtoms.length; cz /= tAtoms.length;
  let maxR = 0;
  for (const a of tAtoms) {
    const d = Math.sqrt((a.x - cx) ** 2 + (a.y - cy) ** 2 + (a.z - cz) ** 2);
    if (d > maxR) maxR = d;
  }
  const templateRadius = maxR;

  // Build results table
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr>
    <th class="label">Case</th>
    <th>N</th>
    <th>iters</th>
    <th>computeForces<br>(ms/iter)</th>
    <th>nbrGrid<br>nCells</th>
    <th>bondGrid<br>nCells</th>
    <th>cellHead<br>clearMs/iter</th>
    <th>cellHead<br>insertMs/iter</th>
    <th>bondHead<br>clearMs/iter</th>
    <th>bondHead<br>insertMs/iter</th>
    <th>nbr<br>rebuilds</th>
    <th>bond<br>rebuilds</th>
    <th>cellHead<br>reallocs</th>
    <th>bCellHead<br>reallocs</th>
    <th>cellHead<br>growMs</th>
    <th>bCellHead<br>growMs</th>
    <th>finalSpan<br>(Å)</th>
  </tr>`;
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);
  results.appendChild(table);

  for (const cs of CASES) {
    status.textContent = `Running: ${cs.label}...`;
    await new Promise(r => setTimeout(r, 10));

    const scene = cs.build(tAtoms, tBonds, templateRadius);
    const engine = new PhysicsEngine();
    engine.init(scene.atoms, scene.bonds);

    // Force kernel via URL param (already handled by PhysicsEngine constructor
    // reading location.search, but we set it explicitly to be safe)
    engine._forceKernel = kernelParam;

    // Enable bench counters
    engine._bench = {};

    // Compute COM for dynamic drift
    let comX = 0, comY = 0, comZ = 0;
    for (let i = 0; i < engine.n; i++) {
      comX += engine.pos[i*3]; comY += engine.pos[i*3+1]; comZ += engine.pos[i*3+2];
    }
    engine._comX = comX / engine.n;
    engine._comY = comY / engine.n;
    engine._comZ = comZ / engine.n;

    // Warm-up: run computeForces with fixed positions
    for (let i = 0; i < WARMUP; i++) {
      if (cs.dynamic) applyDrift(engine, cs.driftRate);
      engine.stepCount++;
      engine.computeForces();
      if (engine.stepCount % 20 === 0) {
        engine.updateBondList();
        engine.rebuildComponents();
      }
    }

    // Reset bench counters for measurement
    engine._bench = {};
    let nbrRebuilds = 0;
    let bondRebuilds = 0;

    // Measured iterations — dynamic cases run longer to reach extreme spans
    const iters = cs.dynamic ? MEASURED_DYNAMIC : MEASURED_STATIC;
    const SNAPSHOT_INTERVAL = 500; // for dynamic cases, snapshot every 500 iters
    const snapshots = []; // periodic performance snapshots

    const t0 = performance.now();
    let windowStart = t0;
    let windowIters = 0;

    for (let i = 0; i < iters; i++) {
      if (cs.dynamic) applyDrift(engine, cs.driftRate);
      engine.stepCount++;
      if (engine.stepCount % 10 === 0) nbrRebuilds++;
      engine.computeForces();
      if (engine.stepCount % 20 === 0) {
        engine.updateBondList();
        engine.rebuildComponents();
        bondRebuilds++;
      }
      windowIters++;

      // Periodic snapshot for dynamic cases
      if (cs.dynamic && windowIters >= SNAPSHOT_INTERVAL) {
        const now = performance.now();
        const windowMs = now - windowStart;
        const msPerStep = windowMs / windowIters;
        // Compute span at this point
        let sMax = 0;
        if (engine.n > 0) {
          let sx0 = engine.pos[0], sx1 = sx0, sy0 = engine.pos[1], sy1 = sy0, sz0 = engine.pos[2], sz1 = sz0;
          for (let k = 1; k < engine.n; k++) {
            const x = engine.pos[k*3], y = engine.pos[k*3+1], z = engine.pos[k*3+2];
            if (x < sx0) sx0 = x; if (x > sx1) sx1 = x;
            if (y < sy0) sy0 = y; if (y > sy1) sy1 = y;
            if (z < sz0) sz0 = z; if (z > sz1) sz1 = z;
          }
          sMax = Math.max(sx1-sx0, sy1-sy0, sz1-sz0);
        }
        const nCellsNow = engine._cellHead_hashSize || 0;
        const bCellsNow = engine._bondCellHead_hashSize || 0;
        const simSpeed = (240 * 0.5 / 1000) / (msPerStep / 1000); // relative to 1x = 240 steps/sec
        const psPerSec = 240 * 0.5e-3 * (1 / msPerStep) * 1000; // ps/s
        snapshots.push({
          step: i + 1,
          msPerStep: msPerStep.toFixed(3),
          simX: simSpeed.toFixed(2),
          psPerSec: psPerSec.toFixed(3),
          span: sMax.toFixed(0),
          nbrCells: nCellsNow,
          bondCells: bCellsNow,
        });
        windowStart = now;
        windowIters = 0;
      }
    }
    const elapsed = performance.now() - t0;
    const msPerIter = elapsed / iters;

    // Compute final bounding span
    let spanMax = 0;
    if (engine.n > 0) {
      let minX = engine.pos[0], maxX = minX, minY = engine.pos[1], maxY = minY, minZ = engine.pos[2], maxZ = minZ;
      for (let i = 1; i < engine.n; i++) {
        const x = engine.pos[i*3], y = engine.pos[i*3+1], z = engine.pos[i*3+2];
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
        if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;
      }
      spanMax = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
    }

    // Read grid sizes from allocated arrays
    const nbrCells = engine._cellHead_hashSize || 0;
    const bondCells = engine._bondCellHead_hashSize || 0;

    // Read bench counters
    const b = engine._bench;
    const cellClear = (b._cellHead_clearMs || 0) / iters;
    const cellInsert = (b._cellHead_insertMs || 0) / iters;
    const bCellClear = (b._bondCellHead_clearMs || 0) / iters;
    const bCellInsert = (b._bondCellHead_insertMs || 0) / iters;
    const cellReallocs = b._cellHead_reallocCount || 0;
    const bCellReallocs = b._bondCellHead_reallocCount || 0;
    const cellGrowMs = (b._cellHead_growMs || 0);
    const bCellGrowMs = (b._bondCellHead_growMs || 0);

    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="label">${cs.label}</td>
      <td>${scene.atoms.length}</td>
      <td>${iters}</td>
      <td>${msPerIter.toFixed(3)}</td>
      <td>${nbrCells}</td>
      <td>${bondCells}</td>
      <td>${cellClear.toFixed(4)}</td>
      <td>${cellInsert.toFixed(4)}</td>
      <td>${bCellClear.toFixed(4)}</td>
      <td>${bCellInsert.toFixed(4)}</td>
      <td>${nbrRebuilds}</td>
      <td>${bondRebuilds}</td>
      <td>${cellReallocs}</td>
      <td>${bCellReallocs}</td>
      <td>${cellGrowMs.toFixed(3)}</td>
      <td>${bCellGrowMs.toFixed(3)}</td>
      <td>${spanMax.toFixed(1)}</td>`;
    tbody.appendChild(row);

    // For dynamic cases, output periodic snapshot table (pasteable text format)
    if (cs.dynamic && snapshots.length > 0) {
      const snapDiv = document.createElement('div');
      snapDiv.style.margin = '8px 0 16px 0';
      snapDiv.innerHTML = `<details><summary style="cursor:pointer;color:#60a0ff;">▸ ${cs.label} — periodic snapshots (${snapshots.length} windows)</summary>
<pre style="font-size:12px;line-height:1.4;margin:4px 0;">step | ms/step | simX | ps/s   | span(Å) | nbrCells    | bondCells
${snapshots.map(s =>
  `${String(s.step).padStart(5)} | ${s.msPerStep.padStart(7)} | ${s.simX.padStart(4)}x | ${s.psPerSec.padStart(6)} | ${String(s.span).padStart(7)} | ${String(s.nbrCells).padStart(11)} | ${String(s.bondCells).padStart(11)}`
).join('\n')}</pre></details>`;
      tbody.parentElement.parentElement.insertBefore(snapDiv, tbody.parentElement.nextSibling);
    }
  }

  status.textContent = `Done. ${WARMUP} warm-up. Static: ${MEASURED_STATIC} iters, Dynamic: ${MEASURED_DYNAMIC} iters.`;
  btn.disabled = false;
}

document.getElementById('btn-run').addEventListener('click', runBenchmark);
</script>
</body>
</html>
