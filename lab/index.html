<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>atomdojo — Atom Simulation Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Static tokens (theme-independent) ── */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  /* --font-family now in shared src/ui/core-tokens.css */
  /* --font-xs, --font-sm, --font-base: now in shared src/ui/text-size-tokens.css */
  /* --tap-target: now in shared src/ui/core-tokens.css */
  --glass-blur: 8px;
  --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1.0);
  --duration-fast: 0.15s;
  --duration-normal: 0.3s;
  --duration-sheet: 0.45s;
  /* Safe-area insets as readable CSS vars (for JS layout computation) */
  --safe-left: env(safe-area-inset-left, 0px);
  --dock-mode-max-width: 180px;
  /* --dock-slot-action: now in shared src/ui/core-tokens.css */
}
/* Text size: Normal defaults + Large overrides in shared src/ui/text-size-tokens.css.
   Lab-specific override below (dock mode width). */
[data-text-size="large"] {
  --dock-mode-max-width: 200px;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --duration-fast: 0s;
    --duration-normal: 0s;
    --duration-sheet: 0s;
  }
}

/* Performance: reduced effects — disables blur entirely for weak GPUs.
   Activated automatically by FPS gate (hysteresis in frameLoop when glass UI is visible)
   or manually via _setUiEffectsMode('reduced') in console. */
[data-ui-effects="reduced"] {
  --glass-blur: 0px;
}
[data-ui-effects="reduced"] .panel,
[data-ui-effects="reduced"] .react-info,
[data-ui-effects="reduced"] .react-fps,
[data-ui-effects="reduced"] .dock-bar,
[data-ui-effects="reduced"] .sheet {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

html, body {
  height: 100%;
  background: var(--page-bg);
  color: var(--color-text);
  font-family: var(--font-family);
  overflow: hidden;
}
#container {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  position: relative;
}
canvas { display: block; touch-action: none; }

/* Coachmark surface. Shared by placement / orbit / progressive
   coachmarks — managed exclusively by StatusController. The generic
   "tap an atom" onboarding hint that used to live here has been
   removed; the surface now only paints when a coachmark injects text.
   `:empty` gates visibility so there is no DOM or CSS state to flip —
   clearing textContent is the sole "hide" primitive. */
#hint {
  position: absolute; bottom: var(--hint-bottom, 70px); left: 50%; transform: translateX(-50%);
  background: var(--color-hint-bg); color: var(--color-accent-text);
  padding: 8px 20px; border-radius: 20px; font-size: var(--font-sm);
  z-index: 10; pointer-events: none;
}
#hint:empty { display: none; }

/* ──────────────────────────────────────────────────────────────────
   Atom-interaction hint — floating bubble that follows a boundary
   atom outside the 2D convex hull of the projected scene.

   Shape: a single rounded-rectangle pill (`.atom-hint__bubble`). No
   pointer / tail — the bubble's close proximity to its target atom
   communicates the referent. A prior iteration carried a speech-
   bubble tail (rotated triangular clip-path tracking the atom via
   per-frame `--tail-angle` updates); that shape and its helpers were
   removed for visual simplicity. See the historical note in
   `atom-interaction-hint.ts` for restoration pointers.

   Runtime contract
   ----------------
   Two CSS custom properties are written per-frame by
   `atom-interaction-hint.ts`:
     · `--atom-hint-x`, `--atom-hint-y`
         Page-space position of the bubble CENTER (in CSS px).

   Visibility is keyed off the host's `data-visible` attribute so the
   opacity fade doesn't fight the per-frame transform updates.
   ──────────────────────────────────────────────────────────────── */
#atom-hint {
  --atom-hint-x: 0px;
  --atom-hint-y: 0px;
  position: fixed; /* page-space coords (page, not canvas) */
  top: 0; left: 0;
  /* translate(-50%, -50%) then nudge to the CENTER coord, so the
     bubble is centered around the computed point. */
  transform: translate3d(calc(var(--atom-hint-x) - 50%), calc(var(--atom-hint-y) - 50%), 0);
  pointer-events: none;
  z-index: 12;
  will-change: transform;
}
#atom-hint:empty { display: none; }

/* ── Bubble body ──────────────────────────────────────────────────
   A tail-less pill that relies on proximity to the target atom to
   convey its referent (the runtime positions it just outside the 2D
   convex hull, `atomRadius + gap` away from the target atom's edge).
   If a future iteration wants a pointer, keep this bubble as-is and
   add the tail element back as a sibling; all positioning math is
   bubble-center-based and agnostic to decorations. */
.atom-hint__bubble {
  position: relative;
  padding: 10px 16px;
  background: color-mix(in oklab, var(--color-surface, #14141c) 94%, transparent);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border: 1px solid color-mix(in oklab, var(--color-accent, #6dc) 44%, transparent);
  border-radius: 16px;
  box-shadow:
    0 1px 0 color-mix(in oklab, var(--color-accent, #6dc) 26%, transparent) inset,
    0 10px 24px -14px rgba(0, 0, 0, 0.65),
    0 2px 6px -3px rgba(0, 0, 0, 0.4);
  color: var(--color-text);
  font-family: var(--font-family);
  font-size: var(--font-sm, 13px);
  font-weight: 500;
  letter-spacing: 0.012em;
  line-height: 1.3;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 240ms cubic-bezier(0.22, 0.9, 0.3, 1);
}

.atom-hint__text {
  display: inline-block;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Visibility gate ────────────────────────────────────────────── */
#atom-hint[data-visible="true"] .atom-hint__bubble { opacity: 1; }

/* ── Reduced motion: no fade, just instant show/hide ────────────── */
@media (prefers-reduced-motion: reduce) {
  .atom-hint__bubble { transition: none; }
}

/* ── Fallback for engines without backdrop-filter ───────────────── */
@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
  .atom-hint__bubble {
    background: var(--color-surface, #14141c);
  }
}

.drawer-item {
  padding: var(--space-sm) 10px; cursor: pointer; color: var(--color-text);
  border-radius: var(--radius-sm);
  margin-bottom: 2px; touch-action: manipulation;
}
.drawer-item:hover { background: var(--color-surface-hover); }
.chooser-recent {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: var(--space-sm) 10px; margin-bottom: var(--space-sm);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer; border-radius: var(--radius-sm);
  color: var(--color-text); touch-action: manipulation;
}
.chooser-recent:hover { background: var(--color-surface-hover); }
.chooser-recent-label {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.chooser-recent-name { font-weight: 500; color: var(--color-accent-text); }

/* ── Panel shared styles (extracted from inline) ── */
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-size: 12px;
}
.panel-heading {
  font-weight: 600; font-size: var(--font-sm);
  color: var(--color-text);
}
.panel-label {
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.panel-value {
  color: var(--color-accent-text);
  font-size: var(--font-xs);
  font-variant-numeric: tabular-nums;
}
.panel-btn {
  background: var(--color-btn); color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 4px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-xs);
  font-family: inherit;
}
.panel-btn.active {
  background: var(--color-surface-hover);
  color: var(--color-text);
}
.panel-btn-accent {
  background: var(--color-accent-soft); color: var(--color-accent-text);
  border: 1px solid var(--color-accent);
  padding: var(--space-sm) 20px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-sm); font-weight: 600;
  font-family: inherit;
}
.panel-slider {
  width: 100%; accent-color: var(--color-accent); touch-action: auto;
}
.panel-helper {
  color: var(--color-text-secondary); font-size: 9px;
}
/* Atom count in settings sheet Scene section — styled via .group-value */

/* ── Help modal ── */
#help {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 30; max-width: 400px; width: 90%;
  padding: var(--space-xl); line-height: 1.7;
}
.help-section-title {
  margin-top: var(--space-md); margin-bottom: var(--space-sm);
  color: var(--color-accent-text);
  font-size: var(--font-xs); text-transform: uppercase; letter-spacing: 1px;
}

/* ══════════════════════════════════════════════════════════
   Layout primitives: dock, sheet, grouped list, segmented control
   ══════════════════════════════════════════════════════════ */

/* ── Dock region (measurement root for overlay-layout.ts) ── */
.dock-region {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 205; /* Above backdrop (200) so dock stays interactive while sheets are open */
}
/* Dock shell (.dock-bar, .dock-slot, .dock-item, .dock-icon, .dock-label) now in shared src/ui/dock-shell.css.
   Lab-specific override: 4-column grid for simulation controls. */
.dock-bar {
  grid-template-columns: var(--dock-slot-action) 1fr var(--dock-slot-action) var(--dock-slot-action);
}
.review-locked { opacity: 0.35; cursor: not-allowed; }
/* review-locked-trigger uses display:contents so the wrapper does not disrupt
   dock/chooser flex layout. The trigger itself is the interactive hit target for
   ActionHint hover/focus; children are visually dimmed and pointer-events:none.
   Deliberate structural dependency — do not remove without verifying dock layout,
   accessibility tree, and focus-outline behavior across browsers. */
.review-locked-trigger { display: contents; cursor: not-allowed; }
.review-locked-trigger > * { opacity: 0.35; pointer-events: none; }
/* Segmented disabled: dim the label inside the stable wrapper, not the wrapper itself
   (keeps ActionHint tooltips at full contrast). Consolidated here — no other .seg-disabled rules. */
.segmented .seg-item--disabled .seg-label { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
/* Row-safe locked list item — position:relative for tooltip, no display override.
   Content is dimmed via inner .review-locked-content; tooltip stays full-contrast.
   Do not use .timeline-hint-anchor on list rows — it sets display:inline-flex. */
.review-locked-list-item { position: relative; cursor: not-allowed; }
.review-locked-content { opacity: 0.35; pointer-events: none; }

@media (min-width: 768px) {
  .dock-region {
    left: 50%; transform: translateX(-50%);
    /* Fixed-width pill: stable across all timeline states (no shrink-wrap).
       Uses min() so the region never exceeds the viewport on narrow tablets. */
    width: min(var(--bottom-region-width), calc(100vw - 2 * var(--space-lg)));
    bottom: calc(var(--space-lg) + env(safe-area-inset-bottom, 0px));
  }
  .dock-bar {
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    /* Safe-area clearance moved from internal padding to external position,
       so the pill content stays vertically centered. */
    height: calc(var(--tap-target) + var(--space-lg));
    padding-bottom: 0;
  }
}

/* ── Sheet backdrop ── */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  opacity: 0; pointer-events: none;
  transition: opacity var(--duration-sheet) var(--ease-spring);
  z-index: 200;
}
.sheet-backdrop.visible {
  opacity: 1; pointer-events: auto;
}
/* Desktop: no backdrop (non-modal side panel) */
[data-device-mode="desktop"] .sheet-backdrop { display: none; }

/* Sheet shell (.sheet, .sheet-handle, .sheet-header, .group, .group-list, .group-item, .group-value)
   now in shared src/ui/sheet-shell.css.
   Lab-specific additions below. */
.group-item:active { background: var(--color-surface-hover); }
.group-action { color: var(--color-danger); cursor: pointer; }
.group-footer {
  padding: var(--space-xs) var(--space-lg);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
}

/* Segmented control CSS now in shared src/ui/segmented.css.
   Lab-specific overrides below. */
.segmented .seg-label {
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
}
.segmented .seg-label.active { font-weight: 500; }
.segmented .seg-label:has(input:focus-visible) {
  outline: 2px solid var(--color-accent-text);
  outline-offset: -2px;
}

/* ── Dock extras (lab-specific; dock shell in shared src/ui/dock-shell.css) ── */
.dock-mode { max-width: var(--dock-mode-max-width); }
/* Placement surface styling — structure handled by JSX conditional rendering */
.dock-add-btn.dock-placement-accent { color: var(--color-accent-text); }

/* ── Bonded groups side panel ── */
/* Panel width: fixed for compact cluster labels (#N) plus action columns.
   Uses min-width so edge cases (large counts, long text) can still expand.
   --panel-width is the single tuning point for panel sizing. */
.bonded-groups-panel {
  --panel-width: 260px;
  position: fixed;
  /* top set per-side below (secondary slot, offset below primary overlays) */
  z-index: 150;
  pointer-events: auto;
  /* Surface tokens match the AccountControl chip + FPS display
   * (`--color-surface`, plain `blur(var(--glass-blur))`). The previous
   * `--panel-bg` + `saturate(180%)` rendered subtly grayer/glassier
   * than the two chrome cards in the same top-bar row, so the three
   * surfaces read as belonging to different visual systems. Aligning
   * the background tokens makes the row look like one family. */
  background: var(--color-surface);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  user-select: none;
  -webkit-user-select: none;
  /* Mobile safety: never wider than the viewport minus the side anchor.
   * Side anchors are 12 px (see `.bonded-groups-panel.side-*` rules); we
   * cap at viewport - 24 so the panel never bleeds off-screen on
   * narrow phones and the rules below don't need a media query. */
  width: min(var(--panel-width), calc(100vw - 24px));
  min-width: 0;
  max-height: 60vh;
  overflow-y: auto;
  /* Reserve scrollbar space permanently so content never shifts when scrollbar appears */
  scrollbar-gutter: stable;
  font-size: var(--font-sm);
  color: var(--color-text);
  transition: max-height 0.2s ease;
}
/* Header: two groups — label (title:count) left, toggle pill right.
   Uses justify-content: space-between so layout adapts to content width. */
.bonded-groups-header {
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  font: inherit;
  width: 100%;
  text-align: left;
}
.bonded-groups-header-label {
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bonded-groups-count { font-weight: 400; opacity: 0.7; }
/* Toggle pill — styled as a clickable affordance, not status text */
.bonded-groups-header-toggle {
  font-weight: 500; font-size: var(--font-xs);
  padding: 1px 8px;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  opacity: 0.7;
  white-space: nowrap;
  transition: opacity 0.15s, border-color 0.15s;
}
.bonded-groups-header:hover .bonded-groups-header-toggle {
  opacity: 1; border-color: var(--color-text);
}
.bonded-groups-list {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bonded-groups-row {
  /* Row spans all columns of the parent list grid, then uses subgrid
     to share column tracks — this is the only way to get true cross-row
     column alignment while keeping the row box for hover/selected bg. */
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  align-items: center;
  padding: 4px 2px;
  font-size: var(--font-xs);
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
  border-radius: 3px;
}
.bonded-groups-row:hover { background: var(--color-surface-hover); }
.bonded-groups-selected { background: var(--color-accent-soft) !important; }
.bonded-groups-label { opacity: 0.7; }
.bonded-groups-atoms { font-variant-numeric: tabular-nums; }
/* Small-clusters disclosure — matches main header's label + toggle pill pattern.
   Spans all grid columns so it acts as a section divider. */
.bonded-groups-small-toggle {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 8px 2px 4px; margin-top: 6px;
  border-top: 1px solid var(--color-border);
  background: none; border-left: none; border-right: none; border-bottom: none;
  color: inherit; font: inherit; font-size: var(--font-xs); font-weight: 500;
  cursor: pointer; width: 100%; text-align: left; opacity: 0.8;
}
.bonded-groups-small-toggle:hover { opacity: 1; }
.bonded-groups-small-toggle:hover .bonded-groups-header-toggle { opacity: 1; border-color: var(--color-text); }
.bonded-groups-small-label { white-space: nowrap; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.bonded-groups-hovered { background: var(--color-surface-hover); }
.bonded-groups-small-row { opacity: 0.7; }
.bonded-groups-clear {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 4px 0;
  background: none;
  border: 1px solid var(--color-border);
  border-radius: 3px;
  color: var(--color-accent-text);
  font: inherit;
  font-size: var(--font-xs);
  cursor: pointer;
}
.bonded-groups-clear:hover { background: var(--color-surface-hover); }
.bonded-groups-follow-indicator {
  display: flex; align-items: center; gap: 4px;
  width: 100%; padding: 4px 8px; margin-bottom: 4px;
  background: var(--color-accent-soft, rgba(100,160,255,0.15));
  border: 1px solid var(--color-accent-text);
  border-radius: 3px;
  color: var(--color-accent-text); font: inherit; font-size: var(--font-xs);
  font-weight: 600; cursor: pointer;
  box-shadow: inset 0 0 0 1px var(--color-accent-text);
}
.bonded-groups-follow-indicator:hover { opacity: 0.8; }
/* Color chip — sits directly in grid cell, plain solid fill with no visible border */
.bonded-groups-color-chip {
  width: 16px; height: 16px; border-radius: 50%; border: none;
  background: var(--atom-base-color, #444); cursor: pointer; padding: 0;
  transition: transform 0.15s;
  justify-self: center;
}
.bonded-groups-color-chip:hover { transform: scale(1.15); }
/* Color popover CSS (swatch, backdrop, popover) in src/ui/bonded-groups-parity.css (shared). */
/* Lab-specific popover state: soften selected-row highlight when color editor is open. */
.bonded-groups-color-open.bonded-groups-selected { background: var(--color-surface-hover) !important; }
/* Bonded-group list is a single 5-column grid. Header and rows all participate
   in the same column tracks via subgrid, so columns align perfectly regardless
   of atom-count digit width.
   Columns: color-chip | label | atoms | center | follow
   Atoms column fixed at 4ch — preallocated for up to 4-digit counts.
   Center/Follow fixed at 3em — fits both header text and icon buttons.
   All non-flex columns are fixed so layout never shifts with content. */
.bonded-groups-list {
  display: grid;
  grid-template-columns: 24px 1fr 4ch 3em 3em;
  column-gap: 6px;
  padding: 0 4px;
}
/* Column header spans all 5 columns; subgrid aligns its children with
 * the row content beneath. Headers stay CENTRED in each column track
 * — that's what gives the wider header words ("ATOMS", "CENTER") room
 * to breathe between adjacent columns. Per-column edge alignment
 * (right / left) caused the labels to butt up against each other.
 * The new bottom hairline reads the row as a header; that's separate
 * from alignment and is kept. */
.bonded-groups-col-header {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  align-items: center;
  padding: 4px 0 6px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--color-border);
}
.bonded-groups-col-header > span {
  font-size: 9px; color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6;
  text-align: center; padding: 0 2px;
}
/* "Cluster" header spans both color-chip + index columns when color
 * editing is enabled. */
.bonded-groups-col-cluster { grid-column: span 2; text-align: center; }
.bonded-groups-atoms { text-align: right; padding: 0 6px; font-variant-numeric: tabular-nums; }
.bonded-groups-action-btn {
  background: none; border: 1px solid transparent; color: var(--color-accent-text);
  cursor: pointer; padding: 3px; line-height: 1; display: flex; align-items: center; justify-content: center;
  opacity: 0.5; transition: opacity 0.15s, border-color 0.15s;
  border-radius: 3px;
}
.bonded-groups-action-btn:hover { opacity: 1; }
.bonded-groups-action-btn.active {
  opacity: 1;
  background: var(--color-accent-soft, rgba(100,160,255,0.15));
  border-color: var(--color-accent-text);
  box-shadow: inset 0 0 0 1px var(--color-accent-text);
}
/* Top-overlay layout contract:
 *   top-left primary:  .react-info (status)
 *   top-right primary: .topbar-right — flex row containing:
 *       .account-control  (Phase 6 Auth UX; sign-in / account chip)
 *       .react-fps        (FPS + speed display; viewport-right edge)
 *   top-left secondary:  bonded-groups panel (offset below status)
 *   top-right secondary: bonded-groups panel (offset below .topbar-right) */
.bonded-groups-panel.side-left { left: 12px; top: 48px; }
.bonded-groups-panel.side-right { right: 12px; top: 48px; }

/* ── Camera controls overlay (object-view panel below status block) ── */
.camera-controls {
  position: fixed;
  top: var(--cam-ctrl-top, 48px);
  left: var(--cam-ctrl-left, 12px);
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 150;
  pointer-events: auto;
}
.camera-action {
  min-width: 28px;
  min-height: 28px;
  padding: 4px 8px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  color: var(--color-text-secondary);
  font-size: var(--font-sm);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 4px;
}
.camera-action svg { flex-shrink: 0; }
.camera-action-active {
  color: var(--color-accent-text);
  border-color: var(--color-accent-text);
}
.camera-action-label {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.camera-action-hint {
  font-size: var(--font-xxs, 9px);
  opacity: 0.6;
}
/* Hide secondary hints on desktop (title tooltips handle discoverability) */
@media (hover: hover) and (pointer: fine) {
  .camera-action-hint { display: none; }
}

/* ── Onboarding overlay ── */
/* --onboarding-sink-duration is set from JS (OnboardingOverlay.tsx SINK_DURATION_MS).
   CSS fallback 0.95s is used only if JS hasn't run yet — keep in sync with SINK_DURATION_MS. */

.onboarding-backdrop {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.5);
  opacity: 1;
  transition: opacity 0.3s ease-out;
}
.onboarding-backdrop.onboarding-exit {
  opacity: 0;
  transition: opacity var(--onboarding-sink-duration, 0.95s) ease-out;
}
.onboarding-card {
  max-width: 320px;
  width: 90%;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  text-align: center;
}
/* Two-phase exit: distort/compress (0–50%) then translate/absorb (50–100%) */
.onboarding-card.onboarding-card-exit {
  --sink-x: 0px;
  --sink-y: 100px;
  animation: onboarding-sink var(--onboarding-sink-duration, 0.95s) ease-in forwards;
}
@keyframes onboarding-sink {
  0%   { opacity: 1; transform: scale(1, 1) translate(0, 0); border-radius: var(--radius-md); }
  25%  { opacity: 0.9; transform: scale(0.85, 0.6) translate(0, 0); border-radius: 16px; }
  50%  { opacity: 0.6; transform: scale(0.35, 0.25) translate(calc(var(--sink-x) * 0.3), calc(var(--sink-y) * 0.3)); border-radius: 50%; }
  80%  { opacity: 0.2; transform: scale(0.12, 0.12) translate(var(--sink-x), var(--sink-y)); border-radius: 50%; }
  100% { opacity: 0; transform: scale(0.05, 0.05) translate(var(--sink-x), var(--sink-y)); border-radius: 50%; }
}
/* Sink destination highlight on Settings button */
.onboarding-sink-target {
  animation: onboarding-absorb var(--onboarding-sink-duration, 0.95s) ease-out;
}
@keyframes onboarding-absorb {
  0%   { box-shadow: none; }
  40%  { box-shadow: none; }
  60%  { box-shadow: 0 0 12px 3px var(--color-accent-text); }
  80%  { box-shadow: 0 0 6px 1px var(--color-accent-text); }
  100% { box-shadow: none; }
}
.onboarding-title {
  font-size: var(--font-md);
  font-weight: bold;
  color: var(--color-text);
  margin-bottom: var(--space-md);
}
.onboarding-body {
  font-size: var(--font-sm);
  color: var(--color-text-secondary);
  line-height: 1.8;
  margin-bottom: var(--space-md);
}
.onboarding-body b {
  color: var(--color-text);
}
.onboarding-hint {
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  opacity: 0.7;
}

/* ── Sheet pages (drill-in navigation) ── */
.sheet-page { /* default visible */ }
.sheet-visible { display: block; }
.sheet-page-hidden { display: none; }
.row-hidden { display: none; }

/* ── React-authoritative components (Milestone D) ── */
/* Mirror ID-based styles so React components match imperative originals */
.react-info {
  position: absolute; top: 12px; left: 12px;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; font-size: var(--font-xs); line-height: 1.7;
  border-radius: var(--radius-sm); z-index: 10;
  border: 1px solid var(--color-border);
}
.react-info .title { display: none; }
.react-info .status-text { color: var(--color-text-secondary); font-size: var(--font-xs); }
.react-info .reconciliation-text { color: var(--color-accent-text); font-size: var(--font-xs); }

/* ── Watch→Lab arrival pill (plan §7.2) ─────────────────────────────
   Lower-left quadrant, well clear of the dock (bottom) and any
   side panels. Entrance: translateX(-12px) + fade, 180 ms in; exit
   handled by unmount (React removes the node). Reduced-motion
   degrades to opacity-only per §9.6.
   ----------------------------------------------------------------- */
.watch-handoff-provenance-pill {
  position: absolute;
  left: 12px;
  bottom: 88px; /* clears the dock row (~60px) + safe inset */
  z-index: 10;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  max-width: min(calc(100vw - 24px), 520px);
  padding: 6px 6px 6px 12px;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  /* Ink uses `--color-text` (primary) for WCAG 1.4.3 AA: muted text
   * over the translucent panel bg drops below 4.5:1 on both themes
   * (§9.1.1 contrast test). Primary ink comfortably clears the
   * threshold under both themes. */
  color: var(--color-text);
  font-size: var(--font-xs);
  line-height: 1.4;
  animation: watch-handoff-provenance-pill__in 180ms ease-out both;
}
.watch-handoff-provenance-pill__copy {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.watch-handoff-provenance-pill__close {
  flex: 0 0 auto;
  /* 44×44 hit area via padding around a 16px glyph (§9.6 touch row). */
  width: 44px;
  height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  background: transparent;
  border: 0;
  color: var(--color-text);
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 16px;
  line-height: 1;
}
.watch-handoff-provenance-pill__close:hover {
  color: var(--color-accent-text);
}
.watch-handoff-provenance-pill__close:focus-visible {
  outline: 2px solid var(--color-accent-text);
  outline-offset: -2px;
}
@keyframes watch-handoff-provenance-pill__in {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}
@media (prefers-reduced-motion: reduce) {
  .watch-handoff-provenance-pill {
    animation: watch-handoff-provenance-pill__in--reduced 60ms ease-out both;
  }
  @keyframes watch-handoff-provenance-pill__in--reduced {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
}
[data-ui-effects="reduced"] .watch-handoff-provenance-pill {
  animation: none;
}
/* Top-right flex container — holds AccountControl + FPSDisplay.
 * One positioning ancestor replaces the previous two independently
 * absolutely-positioned surfaces. Children align to the top so multi-line
 * FPS (compact vs. expanded) does not shift the account chip vertically.
 *
 * z-index escape: must sit ABOVE .bonded-groups-panel (z-index 150)
 * because the AccountControl popover menu is a descendant of this
 * stacking context — without this, the menu opens but is partially
 * occluded by the bonded-groups panel on every viewport (most
 * visible on mobile where both surfaces stretch wide). Stays BELOW
 * the sheet backdrop (200) and dialogs (300) so modal layers still
 * cover the chip when they're up. */
.topbar-right {
  position: absolute; top: 12px; right: 12px; z-index: 170;
  /* `inline-flex` is the directly shrink-to-fit row contract — it
   * IS a content-sized horizontal box, no intrinsic-size negotiation
   * required. The earlier `flex + width: max-content` combo worked
   * for the signed-out trigger but Linux Chromium still
   * under-measured the first flex slot when the chip variant
   * (heavier intrinsic content: avatar disc + label) was the first
   * child. Removing one browser-sensitive intrinsic-sizing path
   * (`max-content` on a flex container) eliminates the residual
   * cross-platform gap. */
  display: inline-flex; align-items: flex-start; gap: 8px;
  /* Visual layout is identical in every browser; the rules here
   * just make the width contract deterministic.
   *
   * `max-width` is the row's only safety against viewport overrun.
   * It caps the row but does NOT define how children compress —
   * each child owns its own width policy.
   *
   * ── Contract for adding a new top-right child ──
   * 1. Define your own width behaviour. Either pin to intrinsic
   *    (`flex: 0 0 auto; width: max-content`, like .account-control)
   *    or be shrink-safe (`min-width: 0` + your own truncation, like
   *    .react-fps).
   * 2. Text-bearing children MUST cap or truncate (max-width +
   *    `overflow: hidden; text-overflow: ellipsis`). Never assume
   *    label length; localized strings can double in width.
   * 3. If a third top-right control lands, prefer collapsing one
   *    of them at narrow viewports (e.g. hide FPS on mobile) over
   *    expecting the row to keep absorbing content.
   * 4. Cover the new child in tests/e2e/topbar-right-layout.spec.ts
   *    with the trigger ⊂ wrapper ⊂ .topbar-right chain so a
   *    future cross-platform drift names the offending boundary.
   */
  max-width: calc(100vw - 24px);
}
.react-fps {
  color: var(--color-fps-text); font-size: var(--font-sm);
  font-variant-numeric: tabular-nums;
  background: var(--color-surface);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  line-height: 1.4; cursor: pointer;
  /* Shrink-safe sibling under .topbar-right's max-width cap. The
   * default `min-width: auto` on a flex item refuses to shrink below
   * the content's intrinsic width — under a narrow viewport that
   * would push .account-control out of the row before the FPS
   * counter gave up any space. `min-width: 0` lets the algorithm
   * compress this side instead, since its content (numeric stats) is
   * truncation-tolerant. .account-control deliberately stays
   * `flex: 0 0 auto` — its label has its own ellipsis cap and we
   * don't want the chip clipped. */
  min-width: 0;
}

/* ── Account control (top-bar, Phase 6 Auth UX) ─────────────────────
 * Compact sign-in affordance positioned to the immediate left of the
 * FPS display (top:12px; right:12px). Two visual modes:
 *   - Signed out: plain text-style "Sign in" button (low prominence).
 *   - Signed in:  pill chip with avatar glyph + display name.
 *
 * The control opens a small popover menu on click. Menu width is clamped
 * to keep it from overrunning narrow viewports. Uses the same glass-panel
 * tokens as the settings sheet for visual consistency. */
.account-control {
  /* Child of .topbar-right flex container — no absolute positioning. The
   * menu below still needs a positioned ancestor so it anchors to the
   * control's right edge; `position: relative` gives it one without
   * coupling to viewport coordinates.
   *
   * `display: flex` (NOT `inline-flex`): .account-control is already a
   * flex item of .topbar-right and doesn't need inline-level outer
   * behaviour. Nested `inline-flex` chains in CI surfaced a Linux-only
   * misalignment where the wrapper's reported left edge sat ~9 px to
   * the right of its sole child trigger (same width, different
   * position). Plain `flex` here removes one inline-formatting path.
   * `flex: 0 0 auto; width: max-content` keeps the wrapper pinned to
   * its trigger's intrinsic width. */
  position: relative;
  display: flex;
  flex: 0 0 auto;
  width: max-content;
  font-size: var(--font-xs);
}
.account-control__trigger {
  /* `appearance: none` removes UA button intrinsic-sizing differences
   * (Linux Chromium vs. macOS Chromium can disagree by several pixels
   * on a native <button>); the trigger is now a pure CSS box.
   *
   * The CI failure presented as equal widths but different left edges
   * (~9 px drift between trigger and its wrapper on Linux Chromium).
   * Switching from `inline-flex` to `flex` and resetting button
   * `margin` removed that drift in practice — recorded here as the
   * observed successful fix, not the only possible lever (browser
   * layout has plenty of other indirect position influences).
   *
   * `flex: 0 0 auto; width: max-content; min-width: max-content;
   * box-sizing: border-box` floors and pins the trigger's
   * contribution. */
  appearance: none;
  -webkit-appearance: none;
  margin: 0;
  display: flex;
  flex: 0 0 auto;
  width: max-content;
  min-width: max-content;
  box-sizing: border-box;
  align-items: center; gap: 6px;
  background: transparent; border: 1px solid transparent;
  color: var(--color-text-secondary);
  /* Geometry tuned to match `.react-fps` exactly so the chip / Sign-in
   * pill / FPS pill render at the same height in the top-bar row.
   * Was `padding: 6px 10px; font-size: inherit (--font-xs=12); line-height: 1.3`
   * — about 4 px shorter than FPS (`6px 12px / --font-sm=14 / 1.4`).
   * `--font-sm` + 1.4 + symmetric 12 px horizontal padding = identical box. */
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: var(--font-sm); line-height: 1.4; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
/* Card surface shared by chip + signin — matches .react-fps +
 * .bonded-groups-panel so all top-bar actors read as one family.
 * Unverified deliberately skips this treatment (see its own rule). */
.account-control__trigger--chip,
.account-control__trigger--signin {
  background: var(--color-surface);
  border-color: var(--color-border);
  color: var(--color-text);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
}
/* Signed-out variant — left-aligned label. Kept as its own rule so
 * the chip and signin paths can diverge independently if one platform
 * regresses in isolation (prior CI drift hit only the signed-in chip). */
.account-control__trigger--signin {
  justify-content: flex-start;
  text-align: left;
}
.account-control__trigger:hover,
.account-control__trigger:focus-visible {
  background: var(--color-surface);
  border-color: var(--color-border);
  color: var(--color-text);
  outline: none;
}
.account-control__trigger--chip {
  /* 6px vertical padding matches .react-fps so chip + FPS heights
   * line up. Left padding stays tight (4px) — the avatar disc
   * already provides breathing room there. */
  padding: 6px 10px 6px 4px;
  /* Chip carries heavier intrinsic content (avatar + label) than the
   * signed-out trigger. `min-width: max-content` floors the chip at
   * its intrinsic width even if a parent ever passes a smaller flex
   * basis — a prior CI drift surfaced specifically on this path. */
  min-width: max-content;
}
/* Unverified variant — subdued tone, italic label, no avatar. Communicates
 * "we don't know" without provoking an unnecessary OAuth round-trip. */
.account-control__trigger--unverified {
  color: var(--color-text-secondary);
  font-style: italic;
  opacity: 0.85;
}
.account-control__avatar {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--color-accent-text); color: var(--color-surface);
  font-size: var(--font-xs); font-weight: 600; line-height: 1;
}
.account-control__label {
  max-width: 120px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
/* AccountControl popover menu — Wikipedia-clean.
 * Smaller radius + sharper directional shadow + theme-token surface
 * keep it consistent with /account, /privacy, /terms. Identity gets
 * a hairline-divided header; Sign-out gets a hairline-divided footer
 * so the visual rhythm reads as: WHO → WHAT YOU CAN DO → SESSION END.
 * Sign-out is intentionally NOT styled as destructive — it doesn't
 * delete data, the user can sign back in any time. The previous
 * green-text "destructive" treatment was the wrong cue for this
 * action; it's now the same neutral tone as Manage uploads. */
.account-control__menu {
  position: absolute; right: 0; top: calc(100% + 6px);
  min-width: 220px; max-width: 280px;
  /* Fully opaque — menu items must NOT show the BondedClusters panel
   * (or anything else) bleeding through. `--color-surface` is the
   * translucent token we use for in-row chrome (chip / FPS pill /
   * BondedGroups panel header) where seeing the canvas through is
   * intentional; here, a popover with text needs solid contrast.
   * `--page-bg` is the always-opaque page-tone token written by
   * applyThemeTokens (light: #f2f2f0, dark: #181820). */
  background: var(--page-bg);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 4px;
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.08),
    0 8px 28px rgba(0, 0, 0, 0.18);
  display: flex; flex-direction: column; gap: 0;
}
.account-control__hint {
  margin: 6px 10px 8px;
  color: var(--color-text-secondary);
  font-size: var(--font-xs); line-height: 1.45;
}
.account-control__identity {
  margin: 0 0 4px;
  padding: 10px 12px 10px;
  color: var(--color-text);
  font-size: var(--font-sm); font-weight: 600;
  letter-spacing: -0.005em;
  border-bottom: 1px solid var(--color-border);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.account-control__menu-item {
  background: transparent; border: none;
  padding: 9px 12px;
  border-radius: 3px;
  margin: 1px 0;
  font-size: var(--font-sm); color: var(--color-text);
  text-align: left; cursor: pointer;
  display: block; text-decoration: none;
  transition: background 120ms ease, color 120ms ease;
  white-space: nowrap;
}
.account-control__menu-item:hover,
.account-control__menu-item:focus-visible {
  background: var(--color-surface-hover);
  color: var(--color-text);
  outline: none;
  text-decoration: none;
}
/* Sign-out lives below a hairline divider — it's not destructive
 * (no data loss, the user can sign back in), so it stays in the
 * neutral text colour. The hairline + secondary tone communicate
 * "session-ending" without shouting "delete". */
.account-control__menu-item--destructive {
  color: var(--color-text-secondary);
  margin-top: 4px;
  padding-top: 12px;
  border-top: 1px solid var(--color-border);
  border-radius: 0;
}
.account-control__menu-item--destructive:hover,
.account-control__menu-item--destructive:focus-visible {
  color: var(--color-text);
}

/* Signed-out provider-picker variant. The default menu has 4 px
 * padding because it frames narrow list-style rows (Manage uploads,
 * Sign out). The provider picker carries copy + CTA buttons + inline
 * status row, so it reads cleaner at 12 px padding with 8 px gaps.
 * The modifier is applied conditionally on the outer menu — only
 * when the signed-out provider-picker branch renders, never when the
 * popup-blocked recovery sub-menu takes over (see AccountControl.tsx).
 * Signed-in / unverified surfaces use a different menu tree entirely. */
.account-control__menu--signin {
  padding: 12px;
  gap: 8px;
  min-width: 260px;
}
/* Narrow-viewport fallback: AccountControl sits to the LEFT of the
 * FPS display inside .topbar-right, so its right edge is ~70–90 px
 * from the viewport right. A 260 px popover anchored `right: 0` to
 * the trigger's right edge therefore overflows the viewport's LEFT
 * edge on sub-360 px phones. Best-practice fix: detach the popover
 * from the trigger and pin it to the viewport with equal 12 px
 * gutters, so the panel can never be cropped regardless of where
 * the trigger lands inside the top-bar row. Click-outside and
 * escape-to-close keep working — both match against DOM ancestry /
 * keypresses, not layout position. */
@media (max-width: 480px) {
  .account-control__menu--signin {
    position: fixed;
    /* 12 px matches .topbar-right's own top inset (line 629); 40 px is
       the trigger's intrinsic height (font-sm · 1.4 + 12 px vertical
       padding + 2 px border ≈ 34 px, with ~6 px slack); 6 px is the
       gap between trigger and popover. No `--topbar-*` token exists
       yet — refactor candidate when one lands. */
    top: calc(12px + 40px + 6px);
    left: 12px;
    right: 12px;
    /* Only min-width is load-bearing (the base rule sets 260 px).
       `width` and `max-width` default to auto/none for a fixed
       element with both insets set. */
    min-width: 0;
  }
}
.account-control__menu--signin .account-control__hint {
  margin: 0;
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  line-height: 1.5;
}
.account-control__auth-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
/* Provider sign-in buttons — mirror the Transfer dialog's auth
 * button shape (bordered, centered, tap-friendly) so both
 * "here's where you sign in" surfaces read as the same component
 * family. The generic `.account-control__menu-item` stays list-style
 * for the signed-in / popup-blocked surfaces. */
.account-control__auth-button {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font: inherit;
  font-size: var(--font-sm);
  cursor: pointer;
  text-align: center;
  transition: background 120ms ease, border-color 120ms ease;
}
.account-control__auth-button:hover:not(:disabled),
.account-control__auth-button:focus-visible {
  border-color: var(--color-accent-text);
  outline: none;
}
.account-control__auth-button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ── Shared 13+ age-gate clickwrap (D120 — supersedes D118) ────────────
 * Single sentence with linked Privacy/Terms anchors, rendered above
 * the provider/Publish buttons in:
 *   - AccountControl signed-out menu      (id="age-clickwrap-account")
 *   - Transfer dialog signed-out panel    (id="age-clickwrap-share")
 *   - Transfer dialog publish-428 fallback (id="age-clickwrap-publish")
 * Each id is referenced via aria-describedby on the gated buttons so
 * screen readers hear the clickwrap as the button's described context.
 *
 * Link styling: inline flow (no inline-block). The paragraph's 1.6
 * line-height gives each line ~21 px of natural vertical space, which
 * is the right tap target for an inline link inside body copy (iOS
 * HIG's 44 px rule targets standalone controls, not anchors inside
 * prose). A tiny padding + negative margin lets the hover/focus
 * background breathe without breaking paragraph rhythm. */
.age-clickwrap {
  margin: 0 0 12px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--color-text-secondary);
}
.age-clickwrap a {
  color: var(--color-accent-text, #0066cc);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  /* 2 px vertical padding keeps the hit area robust for users who
   * override line-height via accessibility reader stylesheets (the
   * line-height: 1 collapse case). Negative y-margin cancels the
   * layout effect so the surrounding lines don't get pushed apart.
   * x-padding gives the hover/focus background a subtle halo. */
  padding: 2px 2px;
  margin: -2px -1px;
  border-radius: 2px;
  transition: background 120ms ease;
}
.age-clickwrap a:hover {
  background: var(--color-surface-hover);
}
.age-clickwrap a:focus-visible {
  outline: 2px solid var(--color-accent-text, #0066cc);
  outline-offset: 2px;
  background: var(--color-surface-hover);
}

/* ── Sign-in attempt status row ────────────────────────────────────────
 * Renders below the provider buttons when authSignInAttempt is set:
 * 'starting' shows a muted "Starting sign-in…" line, 'failed' shows
 * the structured failure message + Retry. */
.auth-attempt-status {
  margin: 6px 0 0;
  font-size: 12px;
  /* `--color-text-secondary` is theme-aware; `--color-muted` is not
   * written by applyThemeTokens and would always render the
   * hard-coded fallback, giving low contrast on the light theme. */
  color: var(--color-text-secondary);
}
.auth-attempt-status--failed {
  color: var(--color-text);
}
.auth-attempt-retry {
  margin-left: 8px;
  background: none;
  border: 1px solid var(--color-border, rgba(255,255,255,0.12));
  color: var(--color-text);
  border-radius: 4px;
  padding: 2px 8px;
  cursor: pointer;
  font: inherit;
}
.auth-attempt-retry:hover {
  background: var(--color-surface-hover, rgba(255,255,255,0.06));
}

/* On narrow viewports, shrink the max-width so long display names don't
 * crowd the FPS display; the flex container handles horizontal placement. */
@media (max-width: 480px) {
  .account-control__label { max-width: 80px; }
}

/* ── Transfer dialog auth prompt (Phase 6 Auth UX) ───────────────────
 * When the user opens the Transfer dialog's Share tab while signed out,
 * the Publish button is replaced with a compact OAuth prompt. The prompt
 * inherits the dialog's glass panel styling and uses the same confirm/
 * cancel button visual rhythm so it feels like a first-class panel state,
 * not a retrofitted modal. */
.timeline-transfer-dialog__auth-prompt {
  display: flex; flex-direction: column;
}
.timeline-transfer-dialog__auth-buttons {
  display: flex; flex-direction: column; gap: 8px;
  margin: 12px 0 4px;
}
.timeline-transfer-dialog__auth-button {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text);
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: var(--font-sm); cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.timeline-transfer-dialog__auth-button:hover:not(:disabled),
.timeline-transfer-dialog__auth-button:focus-visible {
  border-color: var(--color-accent-text);
  outline: none;
}
.timeline-transfer-dialog__auth-button:disabled {
  opacity: 0.5; cursor: not-allowed;
}
/* Subdued variant for the Back action inside the popup-blocked sub-panel.
 * Same layout as the primary auth buttons, lower visual weight so the
 * primary decisions (Retry / Continue) remain the visible call-to-action. */
.timeline-transfer-dialog__auth-button--subtle {
  background: transparent;
  color: var(--color-text-secondary);
  border-color: var(--color-border);
}
.timeline-transfer-dialog__auth-button--subtle:hover:not(:disabled) {
  background: var(--color-surface);
  color: var(--color-text);
}
.timeline-transfer-dialog__auth-checking .timeline-transfer-dialog__description {
  color: var(--color-text-secondary); font-style: italic;
}
/* Inline note for 401 recovery: "Your session expired. Sign in to publish
 * again." Sits above the Continue-with buttons so the user understands
 * why the Publish button disappeared. Neutral, not error-red — the state
 * is recoverable by clicking a sign-in button. */
.timeline-transfer-dialog__auth-note {
  margin: 6px 0 0; padding: 8px 10px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-xs); line-height: 1.4;
}

/* ── Share panel redesign (Guest Quick Share + Save to account) ────
 *
 * Two-tier hierarchy: the Quick Share card sits on a tinted accent
 * surface with a stronger border so it visibly *wins* the scan; the
 * Save-to-account section is typographically de-emphasized beneath.
 * A single clickwrap at the bottom covers both tiers (the previous
 * design repeated it verbatim).
 *
 * Motion: quiet staggered fade-up — 32 ms offsets — on panel entry.
 * Deliberately subtle; this is a tool, not a landing page. */
@keyframes timeline-transfer-enter {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.timeline-transfer-dialog__auth-prompt > *:not(.timeline-transfer-dialog__section-rule) {
  animation: timeline-transfer-enter 260ms cubic-bezier(.2,.8,.2,1) both;
}
.timeline-transfer-dialog__auth-prompt > *:nth-child(1) { animation-delay: 0ms; }
.timeline-transfer-dialog__auth-prompt > *:nth-child(2) { animation-delay: 32ms; }
.timeline-transfer-dialog__auth-prompt > *:nth-child(3) { animation-delay: 64ms; }
.timeline-transfer-dialog__auth-prompt > *:nth-child(4) { animation-delay: 96ms; }
.timeline-transfer-dialog__auth-prompt > *:nth-child(5) { animation-delay: 128ms; }

/* Short scene-setting sentence at the very top of the panel. Sits
 * between the tabs and the Quick Share card; acts as an anchor
 * without taking visual weight. */
.timeline-transfer-dialog__lede {
  margin: 0 0 12px;
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  line-height: 1.45;
}

/* ── Signed-in identity chip ───────────────────────────────────
 *
 * Three-column row above the lede on the signed-in Publish panel:
 *   [ monogram ] [ display name + stat ] [ Profile ↗ link ]
 *
 * Styling language matches the shared "card with a micro-label and
 * a trailing link" pattern from the account surface. The chip is
 * low-contrast so it reads as context, not as a call-to-action that
 * competes with the primary Publish pill below it.
 *
 * Layout: flex with `min-width: 0` on the center column so a long
 * display name ellipsizes instead of pushing the Profile link off
 * the panel. */
.timeline-transfer-dialog__identity {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 14px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  background: color-mix(in oklab, var(--color-text) 4%, var(--panel-bg));
  border: 1px solid var(--color-border);
}
.timeline-transfer-dialog__avatar {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: color-mix(in oklab, var(--color-accent-text) 18%, transparent);
  color: var(--color-accent-text);
  font-family: var(--font-family-display, var(--font-family));
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.02em;
  /* Thin accent ring — echoes the success check + expiry chip
   *  treatments so the three accent-ringed circles in this dialog
   *  belong to a visual family. */
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--color-accent-text) 30%, transparent);
}
.timeline-transfer-dialog__identity-body {
  display: flex; flex-direction: column; gap: 1px;
  min-width: 0;  /* lets the name ellipsize */
  flex: 1;
}
.timeline-transfer-dialog__identity-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
  letter-spacing: -0.005em;
  /* Ellipsize over-long display names (some providers return very
   *  long display_name strings; we don't want them to shove the
   *  Profile link off the right edge). */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.timeline-transfer-dialog__identity-stat {
  font-size: 11.5px;
  color: var(--color-text-secondary);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.005em;
}
.timeline-transfer-dialog__identity-link {
  display: inline-flex; align-items: center; gap: 3px;
  flex-shrink: 0;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  color: var(--color-text-secondary);
  font-size: 11.5px;
  font-weight: 500;
  text-decoration: none;
  transition: color 120ms ease, background 120ms ease;
}
.timeline-transfer-dialog__identity-link:hover {
  color: var(--color-accent-text);
  background: color-mix(in oklab, var(--color-accent-text) 8%, transparent);
}
.timeline-transfer-dialog__identity-link svg {
  transition: transform 140ms cubic-bezier(.2,.8,.2,1);
}
.timeline-transfer-dialog__identity-link:hover svg {
  transform: translate(1px, -1px);
}

@media (prefers-reduced-motion: reduce) {
  .timeline-transfer-dialog__identity-link:hover svg { transform: none; }
}

/* Primary tier — Quick Share card.
 * Tinted accent-surface + 1px accent-hued border. The tint is
 * computed via color-mix so it stays legible in light + dark themes
 * without a hard-coded hex. */
.timeline-transfer-dialog__quick-share {
  position: relative;
  margin: 0 0 14px;
  padding: 14px 14px 12px;
  border-radius: var(--radius-md);
  background: color-mix(in oklab, var(--color-accent-text) 6%, transparent);
  border: 1px solid color-mix(in oklab, var(--color-accent-text) 22%, transparent);
}

/* Header row — heading + inline meta line. Heading carries visual
 * weight; the meta string (72-hour link · no account) sits on the
 * same row at the trailing edge when space permits, collapsing
 * beneath on narrow widths. Replaces the prior two-pill badge bar
 * that stole ~20 px of vertical rhythm for tracked uppercase noise. */
.timeline-transfer-dialog__qs-header {
  display: flex; flex-wrap: wrap; align-items: baseline;
  gap: 4px 10px;
  margin-bottom: 4px;
}
.timeline-transfer-dialog__qs-meta {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--color-accent-text);
  opacity: 0.9;
  font-variant-numeric: tabular-nums;
}

/* Tier heading — display-weight. Uses the display stack when a
 * --font-family-display token is defined; otherwise falls back to
 * the app's body family, preserving cohesion in environments that
 * haven't yet wired a distinct display face. Weight + size are what
 * actually carry the hierarchy, not a specific font choice. */
.timeline-transfer-dialog__tier-heading {
  margin: 0;
  font-family: var(--font-family-display, var(--font-family));
  font-size: 18px;
  line-height: 1.15;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--color-text);
}

.timeline-transfer-dialog__helper {
  margin: 0 0 14px;
  font-size: var(--font-xs);
  line-height: 1.5;
  color: var(--color-text-secondary);
}

/* Turnstile container — zero-footprint by default. The widget is
 * invisible under `appearance: 'interaction-only'`: Cloudflare only
 * renders a visible challenge for suspicious traffic, so reserving
 * permanent vertical space was the inverse of what the captcha was
 * built for. When Cloudflare DOES raise a challenge, the iframe
 * naturally takes space and pushes the CTA down (rare event,
 * acceptable reflow). When silent, this container stays collapsed
 * and the card layout flows heading → helper → CTA. */
.timeline-transfer-dialog__turnstile {
  /* `:empty` keeps the element a layout no-op when Turnstile hasn't
   *  injected an iframe yet; once an iframe mounts the `&:not(:empty)`
   *  branch gives it breathing room. */
  margin: 0;
}
.timeline-transfer-dialog__turnstile:not(:empty) {
  margin: 0 0 12px;
}

/* Primary-pill CTAs — shared silhouette for Continue as Guest and
 * Download. Full-width stadium, accent fill, shadow lift. The
 * `--primary-pill` modifier is the generic name; `--guest` is kept
 * as an alias for back-compat with existing callsites and to let the
 * guest-card-specific hover animation (arrow slides RIGHT, toward
 * the share destination) diverge from Download's own arrow (slides
 * DOWN, toward the file). The union selector below covers both with
 * one rule for the base + hover + disabled states, then each variant
 * owns its arrow-direction micro-interaction. */
.timeline-transfer-dialog__confirm--guest,
.timeline-transfer-dialog__confirm--primary-pill {
  width: 100%;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  box-shadow: 0 1px 0 color-mix(in oklab, var(--color-accent-text) 30%, transparent),
              0 6px 20px -10px color-mix(in oklab, var(--color-accent-text) 55%, transparent);
  transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
}
.timeline-transfer-dialog__confirm--guest:not(:disabled):hover,
.timeline-transfer-dialog__confirm--primary-pill:not(:disabled):hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 color-mix(in oklab, var(--color-accent-text) 40%, transparent),
              0 10px 24px -10px color-mix(in oklab, var(--color-accent-text) 65%, transparent);
}
.timeline-transfer-dialog__confirm--guest:disabled,
.timeline-transfer-dialog__confirm--primary-pill:disabled {
  box-shadow: none;
}
.timeline-transfer-dialog__confirm-arrow {
  opacity: 0.9;
  transition: transform 140ms cubic-bezier(.2,.8,.2,1);
}
/* Guest action is a "send" — arrow pushes RIGHT toward the recipient. */
.timeline-transfer-dialog__confirm--guest:not(:disabled):hover .timeline-transfer-dialog__confirm-arrow {
  transform: translateX(3px);
}
/* Download action is a "pull to disk" — arrow pushes DOWN toward the
 * user's device. Two different directions for two different verbs. */
.timeline-transfer-dialog__confirm--primary-pill:not(:disabled):hover .timeline-transfer-dialog__confirm-arrow {
  transform: translateY(2px);
}

/* Trust attribution — tiny legend below the CTA when Turnstile has
 * mounted. Replaces the old dashed visible slot as the trust signal:
 * users know security exists but nothing pretends to be a pending
 * obligation on them. Sits as its own hairline line under the card,
 * visually detached from the CTA. */
.timeline-transfer-dialog__attribution {
  /* Centered under the CTA it attests to — the attribution visually
   *  pairs with the button above, not the leading edge of the card.
   *  `flex` instead of `inline-flex` so the container centers via
   *  `justify-content`, not via the parent's alignment. */
  display: flex; align-items: center; justify-content: center;
  gap: 4px;
  margin: 10px 0 0;
  font-size: 10.5px;
  letter-spacing: 0.02em;
  color: var(--color-text-secondary);
  opacity: 0.65;
}
.timeline-transfer-dialog__attribution svg {
  opacity: 0.8;
  color: var(--color-accent-text);
}

/* Divider between tiers. The label sits inline on the rule so the
 * reader gets a clear "or" connector instead of an orphan label. */
.timeline-transfer-dialog__section-rule {
  display: flex; align-items: center;
  gap: 10px;
  margin: 4px 0 12px;
  color: var(--color-text-secondary);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.75;
}
.timeline-transfer-dialog__section-rule::before,
.timeline-transfer-dialog__section-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

/* Secondary tier — Save to account.
 *
 * 2026-04-23 v4 refinement: the previous tracked-caps heading
 * (`SAVE TO YOUR ACCOUNT`) was redundant with the `OR · SIGN IN TO
 * SAVE` divider immediately above it — the divider already announces
 * the section. Collapsed to a single centered subtitle on the panel's
 * center spine, paired with a visually-hidden `<h3>` kept for the
 * <section aria-labelledby> landmark contract. */
.timeline-transfer-dialog__account-tier {
  margin: 0 0 10px;
}
.timeline-transfer-dialog__account-subtitle {
  /* Centered subtitle — inhabits the same central axis as the
   *  OR-divider above it and the Cancel link at the bottom of the
   *  panel. Spacing mirrors the divider's 12 px bottom-margin so the
   *  two elements read as a stacked connector block, not two
   *  independent section headers. */
  margin: 0 0 12px;
  text-align: center;
  font-size: var(--font-xs);
  line-height: 1.45;
  color: var(--color-text-secondary);
}

/* Accessibility-only heading — preserves the `aria-labelledby` target
 * for the Save-to-account <section> without rendering a visible
 * duplicate of what the OR-divider already announces. Standard
 * screen-reader-only pattern (WCAG-safe). */
.timeline-transfer-dialog__sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Provider button variant — stadium-shape pill with centered
 * icon + label pair. Matches the Google-style "Continue with"
 * button pattern: generous vertical padding, fully-rounded
 * corners, subtle elevation shadow, icon in authentic brand
 * color (Google 4-color G / GitHub solid octocat), label in a
 * medium-weight type.
 *
 * Alignment rationale (2026-04-23 v4): the icon+text PAIR is
 * centered inside the button, not left-anchored. In this panel
 * the OAuth buttons sit on the visual "center spine" alongside
 * the OR-divider, account subtitle, clickwrap block, and Cancel
 * link — reinforcing that central axis. Both provider labels
 * are near-identical length ("Google" / "GitHub" both 6 chars),
 * so the icon positions remain visually aligned between the two
 * stacked buttons. If a third provider with a drastically
 * different name is added later, consider switching to a shared
 * leading-edge grid so all icons stack on one vertical rule. */
.timeline-transfer-dialog__auth-button--provider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 11px 18px;
  min-height: 44px;
  border-radius: 999px;
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
  box-shadow: 0 1px 0 color-mix(in oklab, var(--color-text) 4%, transparent),
              0 4px 14px -8px color-mix(in oklab, var(--color-text) 12%, transparent);
  transition: background 0.14s, border-color 0.14s, transform 0.14s, box-shadow 0.14s;
}
.timeline-transfer-dialog__auth-button--provider:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 color-mix(in oklab, var(--color-text) 5%, transparent),
              0 8px 18px -8px color-mix(in oklab, var(--color-text) 18%, transparent);
}
.timeline-transfer-dialog__auth-button--provider:active:not(:disabled) {
  transform: translateY(0);
  box-shadow: 0 1px 0 color-mix(in oklab, var(--color-text) 4%, transparent);
}
.timeline-transfer-dialog__provider-glyph {
  flex-shrink: 0;
  display: block;
}
/* GitHub glyph inherits currentColor (theme-aware); Google glyph
 * carries its own 4-color palette and ignores the hover nudge. The
 * shared rule keeps both from scaling on hover so the label remains
 * the obvious interactive zone. */

/* Minor actions — inline Cancel link replacing the old footer bar.
 *
 * 2026-04-23 v4: Centered (was right-aligned). The panel now has a
 * clear central spine running through OR-divider → account-subtitle
 * → clickwrap → Cancel. Centering the dismiss link on that spine
 * gives the bottom of the panel visual closure instead of the
 * lonely-right-corner tension the previous right-align created. */
.timeline-transfer-dialog__minor-actions {
  display: flex; justify-content: center;
  margin-top: 6px;
}

/* Clickwrap — centered block with constrained max-width so the
 * paragraph reads as "contained prose within the panel," not a
 * corner-to-corner legal wrapper.
 *
 * Composition: the BLOCK is centered (auto margins) on the panel's
 * spine; the TEXT inside stays LEFT-ALIGNED because multi-line
 * legal prose is meaningfully harder to scan when every line is
 * center-justified (line lengths jitter, ragged edges break
 * reading rhythm). This follows the principle "center the
 * connector, not the prose."
 *
 * Scoped to the Transfer dialog so account-menu + other
 * `.age-clickwrap` callers are unaffected. */
.timeline-transfer-dialog__auth-prompt .age-clickwrap {
  max-width: 34ch;
  margin-left: auto;
  margin-right: auto;
  margin-bottom: 10px;
  font-size: 12px;
  line-height: 1.55;
}
.timeline-transfer-dialog__text-dismiss {
  background: none;
  border: none;
  padding: 4px 2px;
  color: var(--color-text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-color: color-mix(in oklab, var(--color-text-secondary) 40%, transparent);
}
.timeline-transfer-dialog__text-dismiss:hover:not(:disabled) {
  color: var(--color-text);
  text-decoration-color: var(--color-text);
}
.timeline-transfer-dialog__text-dismiss:disabled {
  opacity: 0.5; cursor: not-allowed;
}

/* Expiry chip — terminal element of the guest-success state.
 *
 * Inline-flex pill with a pulsing accent dot so the ephemerality is
 * visible at a glance, then the relative phrase + absolute date.
 * `title={iso}` on the TSX provides the raw UTC on hover.
 *
 * Since 2026-04-23 v3 the chip is the last element of the success
 * panel (the rhetorical "Need permanent share links…?" question was
 * deleted). The trailing margin collapses to 0 so the chip sits
 * flush at the panel's terminus without a dangling air-gap that
 * would make the panel read as "cut off." */
.timeline-transfer-dialog__expiry-chip {
  display: inline-flex; align-items: center; gap: 8px;
  margin: 6px 0 0;
  padding: 5px 10px;
  border-radius: 999px;
  background: color-mix(in oklab, var(--color-accent-text) 10%, transparent);
  border: 1px solid color-mix(in oklab, var(--color-accent-text) 24%, transparent);
  font-size: var(--font-xs);
  color: var(--color-text);
}
.timeline-transfer-dialog__expiry-chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-accent-text);
  box-shadow: 0 0 0 0 color-mix(in oklab, var(--color-accent-text) 40%, transparent);
  animation: timeline-transfer-chip-pulse 2s ease-in-out infinite;
}
@keyframes timeline-transfer-chip-pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--color-accent-text) 0%, transparent); }
  50%      { box-shadow: 0 0 0 4px color-mix(in oklab, var(--color-accent-text) 18%, transparent); }
}
.timeline-transfer-dialog__expiry-chip-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-accent-text);
}
.timeline-transfer-dialog__expiry-chip-when {
  font-variant-numeric: tabular-nums;
  color: var(--color-text);
  font-weight: 500;
}
/* Absolute timestamp — rendered alongside the relative phrase in the
 * same chip so hover-impaired users (touch, keyboard-only) still see
 * the concrete date without needing to find the `title` tooltip. A
 * thin divider sits between relative and absolute via the ::before. */
.timeline-transfer-dialog__expiry-chip-abs {
  font-variant-numeric: tabular-nums;
  color: var(--color-text-secondary);
  font-size: 10.5px;
  opacity: 0.75;
  padding-left: 8px;
  border-left: 1px solid color-mix(in oklab, var(--color-accent-text) 24%, transparent);
}

@media (prefers-reduced-motion: reduce) {
  .timeline-transfer-dialog__auth-prompt > * { animation: none !important; }
  .timeline-transfer-dialog__expiry-chip-dot { animation: none; }
  .timeline-transfer-dialog__confirm--guest:not(:disabled):hover,
  .timeline-transfer-dialog__confirm--primary-pill:not(:disabled):hover { transform: none; }
  .timeline-transfer-dialog__confirm--guest:not(:disabled):hover .timeline-transfer-dialog__confirm-arrow,
  .timeline-transfer-dialog__confirm--primary-pill:not(:disabled):hover .timeline-transfer-dialog__confirm-arrow { transform: none; }
}

/* ── Timeline bar (inside dock-region, normal flow above dock-bar) ── */
/* ── Timeline bar ──
   Unified timeline shell — all states (off, ready, live, review) share one flex row.
   Slots: left (status) | time | center (track) | right (action).
   Height, track position, and action alignment stay stable across mode transitions. */
.timeline-bar {
  font-family: var(--font-family);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  touch-action: none;
  user-select: none;
}
.timeline-bar + .dock-bar { border-top: none; }
/* ── Timeline layout contract ──
   All timeline dimensions are centralized here. The track width is invariant
   because every column is fixed or 1fr — no auto-sizing anywhere.
   Rail = mode switch. Lane = time + track + action. */
/* --tl-time-width, --tl-shell-height: shared in src/ui/core-tokens.css.
   Lab-specific timeline tokens below. */
.timeline-bar {
  --tl-rail-width: 96px;
  --tl-action-width: 64px;
  --tl-mode-height: 36px;
  min-height: 64px;
  position: relative;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.timeline-shell {
  display: grid;
  grid-template-columns: var(--tl-rail-width) minmax(0, 1fr);
  align-items: center;
  gap: var(--space-sm);
  padding: 6px var(--space-md);
  height: var(--tl-shell-height);
}
/* Rail stretches its child (label or switch) to fill the full column width */
.timeline-shell__left {
  display: flex; align-items: center;
  min-width: 0;
}
.timeline-shell__left > * { width: 100%; }
/* Timeline lane: time (fixed) | track (1fr primary) | action (fixed).
   All three columns are fixed or 1fr so the track width never changes. */
.timeline-shell__center {
  display: grid;
  grid-template-columns: var(--tl-time-width) minmax(0, 1fr) var(--tl-action-width);
  align-items: center;
  column-gap: var(--space-md);
  min-width: 0;
}
@media (max-width: 599px) {
  .timeline-bar {
    --tl-rail-width: 84px;
    /* --tl-time-width, --tl-shell-height: mobile overrides in shared core-tokens.css */
    --tl-mode-height: 32px;
    min-height: 56px;
  }
}
/* ── Timeline mode rail ──
   Off/ready: simple label. Live/review: 2-segment vertical switch.
   Both fill the same rail width; only internal presentation varies. */
.timeline-mode-label {
  display: flex; align-items: center; justify-content: center;
  height: var(--tl-mode-height);
}
.timeline-mode-label__text {
  font-size: var(--font-xs); font-family: var(--font-family); font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.3px;
}
/* Active-state segmented switch (live/review only) */
.timeline-mode-switch {
  display: flex; flex-direction: column;
  background: var(--color-btn);
  border-radius: var(--radius-sm);
  padding: 1px;
  position: relative;
  min-width: 0;
  height: var(--tl-mode-height);
}
.timeline-mode-switch::before {
  content: '';
  position: absolute;
  left: 1px; right: 1px; top: 1px;
  height: calc((100% - 2px) / 2);
  background: var(--color-surface-active);
  border-radius: calc(var(--radius-sm) - 1px);
  transform: translateY(calc(var(--tms-active, 0) * 100%));
  transition: transform var(--duration-normal) var(--ease-spring);
  pointer-events: none;
  z-index: 1;
}
.timeline-mode-switch__seg {
  flex: 1 1 0%;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  font-size: var(--font-xs); font-family: var(--font-family); font-weight: 500;
  color: var(--color-text-secondary);
  cursor: pointer; z-index: 2;
  border: none; background: none;
  white-space: nowrap; min-height: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: color var(--duration-fast);
}
.timeline-mode-switch__seg--active { color: var(--color-text); font-weight: 600; }
/* Hint wrapper must carry the same flex contract as a direct segment child */
.timeline-mode-switch__hint-anchor {
  flex: 1 1 0%; display: flex; min-width: 0; z-index: 2;
}
.timeline-mode-switch__hint-anchor > .timeline-mode-switch__seg { width: 100%; }
.timeline-mode-switch__seg:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.timeline-mode-switch__seg:not(:disabled):hover { color: var(--color-text); }
.timeline-time {
  font-variant-numeric: tabular-nums;
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  white-space: nowrap;
  text-align: right;
  overflow: hidden;
}
.timeline-track {
  position: relative;
  height: 6px; border-radius: 3px;
  background: var(--color-border);
  cursor: pointer;
}
.timeline-track::before {
  content: ''; position: absolute;
  inset: -18px 0;
  cursor: pointer;
}
.timeline-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  border-radius: 3px;
  background: var(--color-accent-text);
  pointer-events: none;
}
.timeline-thumb {
  position: absolute; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-accent-text);
  border: 2px solid var(--panel-bg);
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: transform 0.1s ease;
}
.timeline-track:active .timeline-thumb { transform: translate(-50%, -50%) scale(1.2); }
/* .timeline-actions removed — unified shell handles action placement */
/* .timeline-restart-target removed — review redesign uses .timeline-restart-anchor */
.timeline-action {
  padding: 4px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: none; color: var(--color-text);
  font-family: var(--font-family); font-size: var(--font-xs);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.timeline-action:hover { background: var(--color-border); }
.timeline-shell--disabled { opacity: 0.7; }
.timeline-track--disabled { pointer-events: none; cursor: default; }
/* ── Track zone: overlay zone + track ──
   Overlay zone is absolutely positioned above the track.
   Track zone is the grid's 1fr primary region. */
.timeline-track-zone {
  position: relative;
  min-width: 0;
}
.timeline-overlay-zone {
  position: absolute; bottom: 100%; left: 0; right: 0;
  pointer-events: none;
}
.timeline-overlay-zone > * { pointer-events: auto; }
/* Start overlay positioning — applied to the ActionHint wrapper via anchorClassName */
.timeline-start-anchor {
  display: block;
  position: absolute; bottom: 0; margin-bottom: 4px;
  left: 50%; transform: translateX(-50%);
}
/* Action zone — two-slot layout (clear + unified transfer).
   Width from --tl-action-width (64px). Slot A is clear (nearest to track);
   slot B is the unified transfer trigger (cloud up/down). */
.timeline-action-zone {
  display: flex; align-items: center; justify-content: flex-end; gap: 4px;
}
.timeline-action-slot {
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.timeline-action-spacer {
  width: 28px; height: 28px; flex-shrink: 0;
}
/* Unified transfer trigger — single cloud up/down icon */
.timeline-transfer-trigger {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: none; border: 1px solid var(--color-border);
  color: var(--color-text-secondary); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.timeline-transfer-trigger:hover {
  background: var(--color-surface-hover);
  border-color: var(--color-text-secondary);
  color: var(--color-text);
}
/* Transfer dialog — unified Download + Share. Extends shared .timeline-modal-card */
.timeline-transfer-dialog {
  border-radius: var(--radius-md);
  width: min(360px, calc(100vw - 32px));
  max-height: calc(100dvh - 32px);
  overflow-y: auto;
}
/* Tab bar */
.timeline-transfer-dialog__tabs {
  display: flex; gap: 4px; margin-bottom: 14px;
  border-bottom: 1px solid var(--color-border);
}
.timeline-transfer-dialog__tab {
  flex: 1; padding: 8px 12px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--color-text-secondary); cursor: pointer;
  font-family: var(--font-family); font-size: var(--font-xs); font-weight: 500;
  transition: color 0.15s, border-color 0.15s;
}
.timeline-transfer-dialog__tab:hover:not(:disabled) { color: var(--color-text); }
.timeline-transfer-dialog__tab:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.timeline-transfer-dialog__tab--active {
  color: var(--color-text); border-bottom-color: var(--color-accent-text);
  font-weight: 600;
}
/* Radio options (Download tab) — 2026-04-23 v5 refined to echo the
 * Quick Share tier card's visual weight. The selected card picks up
 * the same tinted-accent surface + accent-hued border the tier card
 * uses, so the two tabs feel like one family: "active choice on
 * tinted accent surface" is the shared language. */
.timeline-transfer-dialog__options {
  display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px;
}
.timeline-transfer-dialog__option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  border: 1px solid var(--color-border);
  background: color-mix(in oklab, var(--color-text) 2%, transparent);
}
.timeline-transfer-dialog__option:hover {
  border-color: color-mix(in oklab, var(--color-accent-text) 18%, var(--color-border));
  background: var(--color-surface-hover);
}
.timeline-transfer-dialog__option:has(input:checked) {
  border-color: color-mix(in oklab, var(--color-accent-text) 30%, transparent);
  background: color-mix(in oklab, var(--color-accent-text) 6%, transparent);
}
.timeline-transfer-dialog__option:has(input:focus-visible) {
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-accent-text) 24%, transparent);
}
.timeline-transfer-dialog__option--disabled {
  opacity: 1; cursor: not-allowed; pointer-events: none;
}
.timeline-transfer-dialog__option--disabled .timeline-transfer-dialog__radio-ui { opacity: 0.4; }
.timeline-transfer-dialog__option--disabled .timeline-transfer-dialog__option-text strong {
  color: var(--color-text-secondary);
}
.timeline-transfer-dialog__option--disabled .timeline-transfer-dialog__option-text span {
  opacity: 0.7;
}
.timeline-transfer-dialog__radio-native {
  position: absolute; opacity: 0; pointer-events: none;
}
.timeline-transfer-dialog__radio-ui {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--color-border);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color 0.15s;
}
.timeline-transfer-dialog__radio-ui::after {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: transparent; transition: background 0.15s;
}
