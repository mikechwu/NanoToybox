<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>atomdojo — Atom Simulation Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Static tokens (theme-independent) ── */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  /* --font-family now in shared src/ui/core-tokens.css */
  /* --font-xs, --font-sm, --font-base: now in shared src/ui/text-size-tokens.css */
  /* --tap-target: now in shared src/ui/core-tokens.css */
  --glass-blur: 8px;
  --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1.0);
  --duration-fast: 0.15s;
  --duration-normal: 0.3s;
  --duration-sheet: 0.45s;
  /* Safe-area insets as readable CSS vars (for JS layout computation) */
  --safe-left: env(safe-area-inset-left, 0px);
  --dock-mode-max-width: 180px;
  /* --dock-slot-action: now in shared src/ui/core-tokens.css */
}
/* Text size: Normal defaults + Large overrides in shared src/ui/text-size-tokens.css.
   Lab-specific override below (dock mode width). */
[data-text-size="large"] {
  --dock-mode-max-width: 200px;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --duration-fast: 0s;
    --duration-normal: 0s;
    --duration-sheet: 0s;
  }
}

/* Performance: reduced effects — disables blur entirely for weak GPUs.
   Activated automatically by FPS gate (hysteresis in frameLoop when glass UI is visible)
   or manually via _setUiEffectsMode('reduced') in console. */
[data-ui-effects="reduced"] {
  --glass-blur: 0px;
}
[data-ui-effects="reduced"] .panel,
[data-ui-effects="reduced"] .react-info,
[data-ui-effects="reduced"] .react-fps,
[data-ui-effects="reduced"] .dock-bar,
[data-ui-effects="reduced"] .sheet {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

html, body {
  height: 100%;
  background: var(--page-bg);
  color: var(--color-text);
  font-family: var(--font-family);
  overflow: hidden;
}
#container {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  position: relative;
}
canvas { display: block; touch-action: none; }

#hint {
  position: absolute; bottom: var(--hint-bottom, 70px); left: 50%; transform: translateX(-50%);
  background: var(--color-hint-bg); color: var(--color-accent-text);
  padding: 8px 20px; border-radius: 20px; font-size: var(--font-sm);
  z-index: 10; pointer-events: none;
  opacity: 1; transition: opacity 1.5s ease-out;
}
#hint.fade { opacity: 0; }

.drawer-item {
  padding: var(--space-sm) 10px; cursor: pointer; color: var(--color-text);
  border-radius: var(--radius-sm);
  margin-bottom: 2px; touch-action: manipulation;
}
.drawer-item:hover { background: var(--color-surface-hover); }
.chooser-recent {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: var(--space-sm) 10px; margin-bottom: var(--space-sm);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer; border-radius: var(--radius-sm);
  color: var(--color-text); touch-action: manipulation;
}
.chooser-recent:hover { background: var(--color-surface-hover); }
.chooser-recent-label {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.chooser-recent-name { font-weight: 500; color: var(--color-accent-text); }

/* ── Panel shared styles (extracted from inline) ── */
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-size: 12px;
}
.panel-heading {
  font-weight: 600; font-size: var(--font-sm);
  color: var(--color-text);
}
.panel-label {
  color: var(--color-text-secondary);
  font-size: var(--font-xs);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.panel-value {
  color: var(--color-accent-text);
  font-size: var(--font-xs);
  font-variant-numeric: tabular-nums;
}
.panel-btn {
  background: var(--color-btn); color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 4px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-xs);
  font-family: inherit;
}
.panel-btn.active {
  background: var(--color-surface-hover);
  color: var(--color-text);
}
.panel-btn-accent {
  background: var(--color-accent-soft); color: var(--color-accent-text);
  border: 1px solid var(--color-accent);
  padding: var(--space-sm) 20px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-sm); font-weight: 600;
  font-family: inherit;
}
.panel-slider {
  width: 100%; accent-color: var(--color-accent); touch-action: auto;
}
.panel-helper {
  color: var(--color-text-secondary); font-size: 9px;
}
/* Atom count in settings sheet Scene section — styled via .group-value */

/* ── Help modal ── */
#help {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 30; max-width: 400px; width: 90%;
  padding: var(--space-xl); line-height: 1.7;
}
.help-section-title {
  margin-top: var(--space-md); margin-bottom: var(--space-sm);
  color: var(--color-accent-text);
  font-size: var(--font-xs); text-transform: uppercase; letter-spacing: 1px;
}

/* ══════════════════════════════════════════════════════════
   Layout primitives: dock, sheet, grouped list, segmented control
   ══════════════════════════════════════════════════════════ */

/* ── Dock region (measurement root for overlay-layout.ts) ── */
.dock-region {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 205; /* Above backdrop (200) so dock stays interactive while sheets are open */
}
/* Dock shell (.dock-bar, .dock-slot, .dock-item, .dock-icon, .dock-label) now in shared src/ui/dock-shell.css.
   Lab-specific override: 4-column grid for simulation controls. */
.dock-bar {
  grid-template-columns: var(--dock-slot-action) 1fr var(--dock-slot-action) var(--dock-slot-action);
}
.review-locked { opacity: 0.35; cursor: not-allowed; }
/* review-locked-trigger uses display:contents so the wrapper does not disrupt
   dock/chooser flex layout. The trigger itself is the interactive hit target for
   ActionHint hover/focus; children are visually dimmed and pointer-events:none.
   Deliberate structural dependency — do not remove without verifying dock layout,
   accessibility tree, and focus-outline behavior across browsers. */
.review-locked-trigger { display: contents; cursor: not-allowed; }
.review-locked-trigger > * { opacity: 0.35; pointer-events: none; }
/* Segmented disabled: dim the label inside the stable wrapper, not the wrapper itself
   (keeps ActionHint tooltips at full contrast). Consolidated here — no other .seg-disabled rules. */
.segmented .seg-item--disabled .seg-label { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
/* Row-safe locked list item — position:relative for tooltip, no display override.
   Content is dimmed via inner .review-locked-content; tooltip stays full-contrast.
   Do not use .timeline-hint-anchor on list rows — it sets display:inline-flex. */
.review-locked-list-item { position: relative; cursor: not-allowed; }
.review-locked-content { opacity: 0.35; pointer-events: none; }

@media (min-width: 768px) {
  .dock-region {
    left: 50%; transform: translateX(-50%);
    /* Fixed-width pill: stable across all timeline states (no shrink-wrap).
       Uses min() so the region never exceeds the viewport on narrow tablets. */
    width: min(var(--bottom-region-width), calc(100vw - 2 * var(--space-lg)));
    bottom: calc(var(--space-lg) + env(safe-area-inset-bottom, 0px));
  }
  .dock-bar {
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    /* Safe-area clearance moved from internal padding to external position,
       so the pill content stays vertically centered. */
    height: calc(var(--tap-target) + var(--space-lg));
    padding-bottom: 0;
  }
}

/* ── Sheet backdrop ── */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  opacity: 0; pointer-events: none;
  transition: opacity var(--duration-sheet) var(--ease-spring);
  z-index: 200;
}
.sheet-backdrop.visible {
  opacity: 1; pointer-events: auto;
}
/* Desktop: no backdrop (non-modal side panel) */
[data-device-mode="desktop"] .sheet-backdrop { display: none; }

/* Sheet shell (.sheet, .sheet-handle, .sheet-header, .group, .group-list, .group-item, .group-value)
   now in shared src/ui/sheet-shell.css.
   Lab-specific additions below. */
.group-item:active { background: var(--color-surface-hover); }
.group-action { color: var(--color-danger); cursor: pointer; }
.group-footer {
  padding: var(--space-xs) var(--space-lg);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
}

/* Segmented control CSS now in shared src/ui/segmented.css.
   Lab-specific overrides below. */
.segmented .seg-label {
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
}
.segmented .seg-label.active { font-weight: 500; }
.segmented .seg-label:has(input:focus-visible) {
  outline: 2px solid var(--color-accent-text);
  outline-offset: -2px;
}

/* ── Dock extras (lab-specific; dock shell in shared src/ui/dock-shell.css) ── */
.dock-mode { max-width: var(--dock-mode-max-width); }
/* Placement surface styling — structure handled by JSX conditional rendering */
.dock-add-btn.dock-placement-accent { color: var(--color-accent-text); }

/* ── Bonded groups side panel ── */
/* Panel width: fixed for compact cluster labels (#N) plus action columns.
   Uses min-width so edge cases (large counts, long text) can still expand.
   --panel-width is the single tuning point for panel sizing. */
.bonded-groups-panel {
  --panel-width: 250px;
  position: fixed;
  /* top set per-side below (secondary slot, offset below primary overlays) */
  z-index: 150;
  pointer-events: auto;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  user-select: none;
  -webkit-user-select: none;
  width: var(--panel-width);
  min-width: var(--panel-width);
  max-height: 60vh;
  overflow-y: auto;
  /* Reserve scrollbar space permanently so content never shifts when scrollbar appears */
  scrollbar-gutter: stable;
  font-size: var(--font-sm);
  color: var(--color-text);
  transition: max-height 0.2s ease;
}
/* Header: two groups — label (title:count) left, toggle pill right.
   Uses justify-content: space-between so layout adapts to content width. */
.bonded-groups-header {
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  font: inherit;
  width: 100%;
  text-align: left;
}
.bonded-groups-header-label {
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bonded-groups-count { font-weight: 400; opacity: 0.7; }
/* Toggle pill — styled as a clickable affordance, not status text */
.bonded-groups-header-toggle {
  font-weight: 500; font-size: var(--font-xs);
  padding: 1px 8px;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  opacity: 0.7;
  white-space: nowrap;
  transition: opacity 0.15s, border-color 0.15s;
}
.bonded-groups-header:hover .bonded-groups-header-toggle {
  opacity: 1; border-color: var(--color-text);
}
.bonded-groups-list {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bonded-groups-row {
  /* Row spans all columns of the parent list grid, then uses subgrid
     to share column tracks — this is the only way to get true cross-row
     column alignment while keeping the row box for hover/selected bg. */
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  align-items: center;
  padding: 2px 0;
  font-size: var(--font-xs);
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
  border-radius: 3px;
}
.bonded-groups-row:hover { background: var(--color-surface-hover); }
.bonded-groups-selected { background: var(--color-accent-soft) !important; }
.bonded-groups-label { opacity: 0.7; }
.bonded-groups-atoms { font-variant-numeric: tabular-nums; }
/* Small-clusters disclosure — matches main header's label + toggle pill pattern.
   Spans all grid columns so it acts as a section divider. */
.bonded-groups-small-toggle {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 4px 0; margin-top: 4px;
  border-top: 1px solid var(--color-border);
  background: none; border-left: none; border-right: none; border-bottom: none;
  color: inherit; font: inherit; font-size: var(--font-xs); font-weight: 500;
  cursor: pointer; width: 100%; text-align: left; opacity: 0.8;
}
.bonded-groups-small-toggle:hover { opacity: 1; }
.bonded-groups-small-toggle:hover .bonded-groups-header-toggle { opacity: 1; border-color: var(--color-text); }
.bonded-groups-small-label { white-space: nowrap; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.bonded-groups-hovered { background: var(--color-surface-hover); }
.bonded-groups-small-row { opacity: 0.7; }
.bonded-groups-clear {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 4px 0;
  background: none;
  border: 1px solid var(--color-border);
  border-radius: 3px;
  color: var(--color-accent-text);
  font: inherit;
  font-size: var(--font-xs);
  cursor: pointer;
}
.bonded-groups-clear:hover { background: var(--color-surface-hover); }
.bonded-groups-follow-indicator {
  display: flex; align-items: center; gap: 4px;
  width: 100%; padding: 4px 8px; margin-bottom: 4px;
  background: var(--color-accent-soft, rgba(100,160,255,0.15));
  border: 1px solid var(--color-accent-text);
  border-radius: 3px;
  color: var(--color-accent-text); font: inherit; font-size: var(--font-xs);
  font-weight: 600; cursor: pointer;
  box-shadow: inset 0 0 0 1px var(--color-accent-text);
}
.bonded-groups-follow-indicator:hover { opacity: 0.8; }
/* Color chip — sits directly in grid cell, plain solid fill with no visible border */
.bonded-groups-color-chip {
  width: 16px; height: 16px; border-radius: 50%; border: none;
  background: var(--atom-base-color, #444); cursor: pointer; padding: 0;
  transition: transform 0.15s;
  justify-self: center;
}
.bonded-groups-color-chip:hover { transform: scale(1.15); }
/* Color popover CSS (swatch, backdrop, popover) in src/ui/bonded-groups-parity.css (shared). */
/* Lab-specific popover state: soften selected-row highlight when color editor is open. */
.bonded-groups-color-open.bonded-groups-selected { background: var(--color-surface-hover) !important; }
/* Bonded-group list is a single 5-column grid. Header and rows all participate
   in the same column tracks via subgrid, so columns align perfectly regardless
   of atom-count digit width.
   Columns: color-chip | label | atoms | center | follow
   Atoms column fixed at 4ch — preallocated for up to 4-digit counts.
   Center/Follow fixed at 3em — fits both header text and icon buttons.
   All non-flex columns are fixed so layout never shifts with content. */
.bonded-groups-list {
  display: grid;
  grid-template-columns: 24px 1fr 4ch 3em 3em;
  column-gap: 6px;
  padding: 0 8px;
}
/* Column header spans all 5 columns, subgrid aligns its children */
.bonded-groups-col-header {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: subgrid;
  align-items: center;
  padding: 0 0 2px;
}
.bonded-groups-col-header > span {
  font-size: 9px; color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6;
  text-align: center; padding: 0 2px;
}
/* "Cluster" header spans both color-chip + index columns when color editing is enabled */
.bonded-groups-col-cluster { grid-column: span 2; text-align: center; }
.bonded-groups-atoms { text-align: right; padding: 0 6px; font-variant-numeric: tabular-nums; }
.bonded-groups-action-btn {
  background: none; border: 1px solid transparent; color: var(--color-accent-text);
  cursor: pointer; padding: 3px; line-height: 1; display: flex; align-items: center; justify-content: center;
  opacity: 0.5; transition: opacity 0.15s, border-color 0.15s;
  border-radius: 3px;
}
.bonded-groups-action-btn:hover { opacity: 1; }
.bonded-groups-action-btn.active {
  opacity: 1;
  background: var(--color-accent-soft, rgba(100,160,255,0.15));
  border-color: var(--color-accent-text);
  box-shadow: inset 0 0 0 1px var(--color-accent-text);
}
/* Top-overlay layout contract:
 *   top-left primary:  .react-info (status)
 *   top-right primary: .topbar-right — flex row containing:
 *       .account-control  (Phase 6 Auth UX; sign-in / account chip)
 *       .react-fps        (FPS + speed display; viewport-right edge)
 *   top-left secondary:  bonded-groups panel (offset below status)
 *   top-right secondary: bonded-groups panel (offset below .topbar-right) */
.bonded-groups-panel.side-left { left: 12px; top: 48px; }
.bonded-groups-panel.side-right { right: 12px; top: 48px; }

/* ── Camera controls overlay (object-view panel below status block) ── */
.camera-controls {
  position: fixed;
  top: var(--cam-ctrl-top, 48px);
  left: var(--cam-ctrl-left, 12px);
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 150;
  pointer-events: auto;
}
.camera-action {
  min-width: 28px;
  min-height: 28px;
  padding: 4px 8px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  color: var(--color-text-secondary);
  font-size: var(--font-sm);
  font-family: var(--font-family);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 4px;
}
.camera-action svg { flex-shrink: 0; }
.camera-action-active {
  color: var(--color-accent-text);
  border-color: var(--color-accent-text);
}
.camera-action-label {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.camera-action-hint {
  font-size: var(--font-xxs, 9px);
  opacity: 0.6;
}
/* Hide secondary hints on desktop (title tooltips handle discoverability) */
@media (hover: hover) and (pointer: fine) {
  .camera-action-hint { display: none; }
}

/* ── Onboarding overlay ── */
/* --onboarding-sink-duration is set from JS (OnboardingOverlay.tsx SINK_DURATION_MS).
   CSS fallback 0.95s is used only if JS hasn't run yet — keep in sync with SINK_DURATION_MS. */

.onboarding-backdrop {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.5);
  opacity: 1;
  transition: opacity 0.3s ease-out;
}
.onboarding-backdrop.onboarding-exit {
  opacity: 0;
  transition: opacity var(--onboarding-sink-duration, 0.95s) ease-out;
}
.onboarding-card {
  max-width: 320px;
  width: 90%;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  text-align: center;
}
/* Two-phase exit: distort/compress (0–50%) then translate/absorb (50–100%) */
.onboarding-card.onboarding-card-exit {
  --sink-x: 0px;
  --sink-y: 100px;
  animation: onboarding-sink var(--onboarding-sink-duration, 0.95s) ease-in forwards;
}
@keyframes onboarding-sink {
  0%   { opacity: 1; transform: scale(1, 1) translate(0, 0); border-radius: var(--radius-md); }
  25%  { opacity: 0.9; transform: scale(0.85, 0.6) translate(0, 0); border-radius: 16px; }
  50%  { opacity: 0.6; transform: scale(0.35, 0.25) translate(calc(var(--sink-x) * 0.3), calc(var(--sink-y) * 0.3)); border-radius: 50%; }
  80%  { opacity: 0.2; transform: scale(0.12, 0.12) translate(var(--sink-x), var(--sink-y)); border-radius: 50%; }
  100% { opacity: 0; transform: scale(0.05, 0.05) translate(var(--sink-x), var(--sink-y)); border-radius: 50%; }
}
/* Sink destination highlight on Settings button */
.onboarding-sink-target {
  animation: onboarding-absorb var(--onboarding-sink-duration, 0.95s) ease-out;
}
@keyframes onboarding-absorb {
  0%   { box-shadow: none; }
  40%  { box-shadow: none; }
  60%  { box-shadow: 0 0 12px 3px var(--color-accent-text); }
  80%  { box-shadow: 0 0 6px 1px var(--color-accent-text); }
  100% { box-shadow: none; }
}
.onboarding-title {
  font-size: var(--font-md);
  font-weight: bold;
  color: var(--color-text);
  margin-bottom: var(--space-md);
}
.onboarding-body {
  font-size: var(--font-sm);
  color: var(--color-text-secondary);
  line-height: 1.8;
  margin-bottom: var(--space-md);
}
.onboarding-body b {
  color: var(--color-text);
}
.onboarding-hint {
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  opacity: 0.7;
}

/* ── Sheet pages (drill-in navigation) ── */
.sheet-page { /* default visible */ }
.sheet-visible { display: block; }
.sheet-page-hidden { display: none; }
.row-hidden { display: none; }

/* ── React-authoritative components (Milestone D) ── */
/* Mirror ID-based styles so React components match imperative originals */
.react-info {
  position: absolute; top: 12px; left: 12px;
  background: var(--panel-bg);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; font-size: var(--font-xs); line-height: 1.7;
  border-radius: var(--radius-sm); z-index: 10;
  border: 1px solid var(--color-border);
}
.react-info .title { display: none; }
.react-info .status-text { color: var(--color-text-secondary); font-size: var(--font-xs); }
.react-info .reconciliation-text { color: var(--color-accent-text); font-size: var(--font-xs); }
/* Top-right flex container — holds AccountControl + FPSDisplay.
 * One positioning ancestor replaces the previous two independently
 * absolutely-positioned surfaces. Children align to the top so multi-line
 * FPS (compact vs. expanded) does not shift the account chip vertically.
 * z-index slightly higher than the default overlay layer so the account
 * menu does not disappear behind side panels. */
.topbar-right {
  position: absolute; top: 12px; right: 12px; z-index: 11;
  display: flex; align-items: flex-start; gap: 8px;
  /* Explicit shrink-to-fit width. Without this Linux Chromium
   * intermittently under-measures the first flex slot inside an
   * absolute-positioned auto-width container, leaving the
   * AccountControl trigger overhanging the container's left edge
   * (CI failure: trigger.left ~9 px left of container.left). The
   * computed visual layout is the same in every browser; this just
   * makes the width contract deterministic.
   *
   * `max-width` is the row's only safety against viewport overrun.
   * It caps the row but does NOT define how children compress —
   * each child owns its own width policy.
   *
   * ── Contract for adding a new top-right child ──
   * 1. Define your own width behaviour. Either pin to intrinsic
   *    (`flex: 0 0 auto; width: max-content`, like .account-control)
   *    or be shrink-safe (`min-width: 0` + your own truncation, like
   *    .react-fps).
   * 2. Text-bearing children MUST cap or truncate (max-width +
   *    `overflow: hidden; text-overflow: ellipsis`). Never assume
   *    label length; localized strings can double in width.
   * 3. If a third top-right control lands, prefer collapsing one
   *    of them at narrow viewports (e.g. hide FPS on mobile) over
   *    expecting the row to keep absorbing content.
   * 4. Cover the new child in tests/e2e/topbar-right-layout.spec.ts
   *    with the trigger ⊂ wrapper ⊂ .topbar-right chain so a
   *    future cross-platform drift names the offending boundary.
   */
  width: max-content;
  max-width: calc(100vw - 24px);
}
.react-fps {
  color: var(--color-fps-text); font-size: var(--font-sm);
  font-variant-numeric: tabular-nums;
  background: var(--color-surface);
  backdrop-filter: blur(var(--glass-blur));
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  line-height: 1.4; cursor: pointer;
  /* Shrink-safe sibling under .topbar-right's max-width cap. The
   * default `min-width: auto` on a flex item refuses to shrink below
   * the content's intrinsic width — under a narrow viewport that
   * would push .account-control out of the row before the FPS
   * counter gave up any space. `min-width: 0` lets the algorithm
   * compress this side instead, since its content (numeric stats) is
   * truncation-tolerant. .account-control deliberately stays
   * `flex: 0 0 auto` — its label has its own ellipsis cap and we
   * don't want the chip clipped. */
  min-width: 0;
}

/* ── Account control (top-bar, Phase 6 Auth UX) ─────────────────────
 * Compact sign-in affordance positioned to the immediate left of the
 * FPS display (top:12px; right:12px). Two visual modes:
 *   - Signed out: plain text-style "Sign in" button (low prominence).
 *   - Signed in:  pill chip with avatar glyph + display name.
 *
 * The control opens a small popover menu on click. Menu width is clamped
 * to keep it from overrunning narrow viewports. Uses the same glass-panel
 * tokens as the settings sheet for visual consistency. */
.account-control {
  /* Child of .topbar-right flex container — no absolute positioning. The
   * menu below still needs a positioned ancestor so it anchors to the
   * control's right edge; `position: relative` gives it one without
   * coupling to viewport coordinates.
   *
   * `display: inline-flex` + `flex: 0 0 auto` + `width: max-content`
   * pins the slot to the trigger's intrinsic width. This pairs with
   * `width: max-content` on .topbar-right above to remove the cross-
   * platform shrink-to-fit ambiguity that produced the CI flake. */
  position: relative;
  display: inline-flex;
  flex: 0 0 auto;
  width: max-content;
  font-size: var(--font-xs);
}
.account-control__trigger {
  /* `appearance: none` removes UA button intrinsic-sizing differences
   * (Linux Chromium vs. macOS Chromium can disagree by several pixels
   * on a native <button>); the trigger is now a pure CSS box. */
  appearance: none;
  -webkit-appearance: none;
  background: transparent; border: 1px solid transparent;
  color: var(--color-text-secondary);
  padding: 6px 10px; border-radius: var(--radius-sm);
  font-size: inherit; line-height: 1.3; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.account-control__trigger:hover,
.account-control__trigger:focus-visible {
  background: var(--color-surface);
  border-color: var(--color-border);
  color: var(--color-text);
  outline: none;
}
.account-control__trigger--chip {
  background: var(--color-surface);
  border-color: var(--color-border);
  color: var(--color-text);
  padding: 4px 10px 4px 4px;
}
/* Unverified variant — subdued tone, italic label, no avatar. Communicates
 * "we don't know" without provoking an unnecessary OAuth round-trip. */
.account-control__trigger--unverified {
  color: var(--color-text-secondary);
  font-style: italic;
  opacity: 0.85;
}
.account-control__avatar {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--color-accent-text); color: var(--color-surface);
  font-size: var(--font-xs); font-weight: 600; line-height: 1;
}
.account-control__label {
  max-width: 120px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.account-control__menu {
  position: absolute; right: 0; top: calc(100% + 4px);
  min-width: 200px; max-width: 260px;
  background: var(--color-surface);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  display: flex; flex-direction: column; gap: 4px;
}
.account-control__hint {
  margin: 4px 6px 8px;
  color: var(--color-text-secondary); font-size: var(--font-xs); line-height: 1.4;
}
.account-control__identity {
  margin: 2px 6px 8px;
  color: var(--color-text); font-size: var(--font-sm); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.account-control__menu-item {
  background: transparent; border: 1px solid transparent;
  padding: 8px 10px; border-radius: var(--radius-sm);
  font-size: var(--font-sm); color: var(--color-text);
  text-align: left; cursor: pointer;
  transition: background 0.12s;
  display: block; text-decoration: none;
}
.account-control__menu-item:hover,
.account-control__menu-item:focus-visible {
  background: var(--color-surface-hover, rgba(128,128,128,0.15));
  outline: none;
}
.account-control__menu-item--destructive {
  color: var(--color-accent-text);
}

/* ── Shared 13+ age-gate checkbox (Phase B) ────────────────────────────
 * Rendered above the provider buttons in BOTH the AccountControl menu
 * and the Transfer dialog's signed-out panel — one component, one
 * sentence, so the two consent points cannot drift. */
.age-gate { margin: 8px 0 10px; font-size: 13px; }
.age-gate--compact { margin: 4px 0 8px; font-size: 12px; }
.age-gate__label {
  display: grid; grid-template-columns: 20px 1fr; gap: 6px 8px;
  align-items: start; cursor: pointer;
}
.age-gate__label input { margin-top: 2px; }
.age-gate__note { color: var(--color-muted, #8792a8); margin: 4px 0 0; font-size: 11px; }
.age-gate__error { color: #ff6b6b; margin: 4px 0 0; font-size: 12px; }

/* On narrow viewports, shrink the max-width so long display names don't
 * crowd the FPS display; the flex container handles horizontal placement. */
@media (max-width: 480px) {
  .account-control__label { max-width: 80px; }
}

/* ── Transfer dialog auth prompt (Phase 6 Auth UX) ───────────────────
 * When the user opens the Transfer dialog's Share tab while signed out,
 * the Publish button is replaced with a compact OAuth prompt. The prompt
 * inherits the dialog's glass panel styling and uses the same confirm/
 * cancel button visual rhythm so it feels like a first-class panel state,
 * not a retrofitted modal. */
.timeline-transfer-dialog__auth-prompt {
  display: flex; flex-direction: column;
}
.timeline-transfer-dialog__auth-buttons {
  display: flex; flex-direction: column; gap: 8px;
  margin: 12px 0 4px;
}
.timeline-transfer-dialog__auth-button {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text);
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: var(--font-sm); cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.timeline-transfer-dialog__auth-button:hover:not(:disabled),
.timeline-transfer-dialog__auth-button:focus-visible {
  border-color: var(--color-accent-text);
  outline: none;
}
.timeline-transfer-dialog__auth-button:disabled {
  opacity: 0.5; cursor: not-allowed;
}
/* Subdued variant for the Back action inside the popup-blocked sub-panel.
 * Same layout as the primary auth buttons, lower visual weight so the
 * primary decisions (Retry / Continue) remain the visible call-to-action. */
.timeline-transfer-dialog__auth-button--subtle {
  background: transparent;
  color: var(--color-text-secondary);
  border-color: var(--color-border);
}
.timeline-transfer-dialog__auth-button--subtle:hover:not(:disabled) {
  background: var(--color-surface);
  color: var(--color-text);
}
.timeline-transfer-dialog__auth-checking .timeline-transfer-dialog__description {
  color: var(--color-text-secondary); font-style: italic;
}
/* Inline note for 401 recovery: "Your session expired. Sign in to publish
 * again." Sits above the Continue-with buttons so the user understands
 * why the Publish button disappeared. Neutral, not error-red — the state
 * is recoverable by clicking a sign-in button. */
.timeline-transfer-dialog__auth-note {
  margin: 6px 0 0; padding: 8px 10px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-xs); line-height: 1.4;
}

/* ── Timeline bar (inside dock-region, normal flow above dock-bar) ── */
/* ── Timeline bar ──
   Unified timeline shell — all states (off, ready, live, review) share one flex row.
   Slots: left (status) | time | center (track) | right (action).
   Height, track position, and action alignment stay stable across mode transitions. */
.timeline-bar {
  font-family: var(--font-family);
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  touch-action: none;
  user-select: none;
}
.timeline-bar + .dock-bar { border-top: none; }
/* ── Timeline layout contract ──
   All timeline dimensions are centralized here. The track width is invariant
   because every column is fixed or 1fr — no auto-sizing anywhere.
   Rail = mode switch. Lane = time + track + action. */
/* --tl-time-width, --tl-shell-height: shared in src/ui/core-tokens.css.
   Lab-specific timeline tokens below. */
.timeline-bar {
  --tl-rail-width: 96px;
  --tl-action-width: 64px;
  --tl-mode-height: 36px;
  min-height: 64px;
  position: relative;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.timeline-shell {
  display: grid;
  grid-template-columns: var(--tl-rail-width) minmax(0, 1fr);
  align-items: center;
  gap: var(--space-sm);
  padding: 6px var(--space-md);
  height: var(--tl-shell-height);
}
/* Rail stretches its child (label or switch) to fill the full column width */
.timeline-shell__left {
  display: flex; align-items: center;
  min-width: 0;
}
.timeline-shell__left > * { width: 100%; }
/* Timeline lane: time (fixed) | track (1fr primary) | action (fixed).
   All three columns are fixed or 1fr so the track width never changes. */
.timeline-shell__center {
  display: grid;
  grid-template-columns: var(--tl-time-width) minmax(0, 1fr) var(--tl-action-width);
  align-items: center;
  column-gap: var(--space-md);
  min-width: 0;
}
@media (max-width: 599px) {
  .timeline-bar {
    --tl-rail-width: 84px;
    /* --tl-time-width, --tl-shell-height: mobile overrides in shared core-tokens.css */
    --tl-mode-height: 32px;
    min-height: 56px;
  }
}
/* ── Timeline mode rail ──
   Off/ready: simple label. Live/review: 2-segment vertical switch.
   Both fill the same rail width; only internal presentation varies. */
.timeline-mode-label {
  display: flex; align-items: center; justify-content: center;
  height: var(--tl-mode-height);
}
.timeline-mode-label__text {
  font-size: var(--font-xs); font-family: var(--font-family); font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: 0.3px;
}
/* Active-state segmented switch (live/review only) */
.timeline-mode-switch {
  display: flex; flex-direction: column;
  background: var(--color-btn);
  border-radius: var(--radius-sm);
  padding: 1px;
  position: relative;
  min-width: 0;
  height: var(--tl-mode-height);
}
.timeline-mode-switch::before {
  content: '';
  position: absolute;
  left: 1px; right: 1px; top: 1px;
  height: calc((100% - 2px) / 2);
  background: var(--color-surface-active);
  border-radius: calc(var(--radius-sm) - 1px);
  transform: translateY(calc(var(--tms-active, 0) * 100%));
  transition: transform var(--duration-normal) var(--ease-spring);
  pointer-events: none;
  z-index: 1;
}
.timeline-mode-switch__seg {
  flex: 1 1 0%;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  font-size: var(--font-xs); font-family: var(--font-family); font-weight: 500;
  color: var(--color-text-secondary);
  cursor: pointer; z-index: 2;
  border: none; background: none;
  white-space: nowrap; min-height: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: color var(--duration-fast);
}
.timeline-mode-switch__seg--active { color: var(--color-text); font-weight: 600; }
/* Hint wrapper must carry the same flex contract as a direct segment child */
.timeline-mode-switch__hint-anchor {
  flex: 1 1 0%; display: flex; min-width: 0; z-index: 2;
}
.timeline-mode-switch__hint-anchor > .timeline-mode-switch__seg { width: 100%; }
.timeline-mode-switch__seg:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.timeline-mode-switch__seg:not(:disabled):hover { color: var(--color-text); }
.timeline-time {
  font-variant-numeric: tabular-nums;
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  white-space: nowrap;
  text-align: right;
  overflow: hidden;
}
.timeline-track {
  position: relative;
  height: 6px; border-radius: 3px;
  background: var(--color-border);
  cursor: pointer;
}
.timeline-track::before {
  content: ''; position: absolute;
  inset: -18px 0;
  cursor: pointer;
}
.timeline-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  border-radius: 3px;
  background: var(--color-accent-text);
  pointer-events: none;
}
.timeline-thumb {
  position: absolute; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-accent-text);
  border: 2px solid var(--panel-bg);
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: transform 0.1s ease;
}
.timeline-track:active .timeline-thumb { transform: translate(-50%, -50%) scale(1.2); }
/* .timeline-actions removed — unified shell handles action placement */
/* .timeline-restart-target removed — review redesign uses .timeline-restart-anchor */
.timeline-action {
  padding: 4px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: none; color: var(--color-text);
  font-family: var(--font-family); font-size: var(--font-xs);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.timeline-action:hover { background: var(--color-border); }
.timeline-shell--disabled { opacity: 0.7; }
.timeline-track--disabled { pointer-events: none; cursor: default; }
/* ── Track zone: overlay zone + track ──
   Overlay zone is absolutely positioned above the track.
   Track zone is the grid's 1fr primary region. */
.timeline-track-zone {
  position: relative;
  min-width: 0;
}
.timeline-overlay-zone {
  position: absolute; bottom: 100%; left: 0; right: 0;
  pointer-events: none;
}
.timeline-overlay-zone > * { pointer-events: auto; }
/* Start overlay positioning — applied to the ActionHint wrapper via anchorClassName */
.timeline-start-anchor {
  display: block;
  position: absolute; bottom: 0; margin-bottom: 4px;
  left: 50%; transform: translateX(-50%);
}
/* Action zone — two-slot layout (clear + unified transfer).
   Width from --tl-action-width (64px). Slot A is clear (nearest to track);
   slot B is the unified transfer trigger (cloud up/down). */
.timeline-action-zone {
  display: flex; align-items: center; justify-content: flex-end; gap: 4px;
}
.timeline-action-slot {
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.timeline-action-spacer {
  width: 28px; height: 28px; flex-shrink: 0;
}
/* Unified transfer trigger — single cloud up/down icon */
.timeline-transfer-trigger {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: none; border: 1px solid var(--color-border);
  color: var(--color-text-secondary); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.timeline-transfer-trigger:hover {
  background: var(--color-surface-hover);
  border-color: var(--color-text-secondary);
  color: var(--color-text);
}
/* Transfer dialog — unified Download + Share. Extends shared .timeline-modal-card */
.timeline-transfer-dialog {
  border-radius: var(--radius-md);
  width: min(360px, calc(100vw - 32px));
  max-height: calc(100dvh - 32px);
  overflow-y: auto;
}
.timeline-transfer-dialog__title {
  font-size: var(--font-sm); font-weight: 600; margin: 0 0 12px;
  padding-bottom: 12px; border-bottom: 1px solid var(--color-border);
}
/* Tab bar */
.timeline-transfer-dialog__tabs {
  display: flex; gap: 4px; margin-bottom: 14px;
  border-bottom: 1px solid var(--color-border);
}
.timeline-transfer-dialog__tab {
  flex: 1; padding: 8px 12px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--color-text-secondary); cursor: pointer;
  font-family: var(--font-family); font-size: var(--font-xs); font-weight: 500;
  transition: color 0.15s, border-color 0.15s;
}
.timeline-transfer-dialog__tab:hover:not(:disabled) { color: var(--color-text); }
.timeline-transfer-dialog__tab:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.timeline-transfer-dialog__tab--active {
  color: var(--color-text); border-bottom-color: var(--color-accent-text);
  font-weight: 600;
}
/* Radio options (Download tab) */
.timeline-transfer-dialog__options {
  display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px;
}
.timeline-transfer-dialog__option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.1s;
  border: 1px solid transparent;
}
.timeline-transfer-dialog__option:hover { background: var(--color-surface-hover); }
.timeline-transfer-dialog__option:has(input:checked) {
  border-color: var(--color-accent-text);
  background: color-mix(in srgb, var(--color-accent-text) 4%, transparent);
}
.timeline-transfer-dialog__option:has(input:focus-visible) {
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-accent-text) 24%, transparent);
}
.timeline-transfer-dialog__option--disabled {
  opacity: 1; cursor: not-allowed; pointer-events: none;
}
.timeline-transfer-dialog__option--disabled .timeline-transfer-dialog__radio-ui { opacity: 0.4; }
.timeline-transfer-dialog__option--disabled .timeline-transfer-dialog__option-text strong {
  color: var(--color-text-secondary);
}
.timeline-transfer-dialog__option--disabled .timeline-transfer-dialog__option-text span {
  opacity: 0.7;
}
.timeline-transfer-dialog__radio-native {
  position: absolute; opacity: 0; pointer-events: none;
}
.timeline-transfer-dialog__radio-ui {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--color-border);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color 0.15s;
}
.timeline-transfer-dialog__radio-ui::after {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: transparent; transition: background 0.15s;
}
.timeline-transfer-dialog__option:has(input:checked) .timeline-transfer-dialog__radio-ui {
  border-color: var(--color-accent-text);
}
.timeline-transfer-dialog__option:has(input:checked) .timeline-transfer-dialog__radio-ui::after {
  background: var(--color-accent-text);
}
.timeline-transfer-dialog__option-text {
  display: flex; flex-direction: column; gap: 1px;
  font-size: var(--font-xs); line-height: 1.35;
}
.timeline-transfer-dialog__option-text strong {
  font-size: var(--font-xs); font-weight: 600;
}
.timeline-transfer-dialog__option-text span { color: var(--color-text-secondary); }
.timeline-transfer-dialog__estimate { font-variant-numeric: tabular-nums; }
.timeline-transfer-dialog__estimate--muted { opacity: 0.5; font-style: italic; }
/* Share tab */
.timeline-transfer-dialog__description {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  margin-bottom: 16px; line-height: 1.4;
}
.timeline-transfer-dialog__success { margin-bottom: 16px; }
.timeline-transfer-dialog__url-label {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  margin-bottom: 6px;
}
.timeline-transfer-dialog__url-row {
  display: flex; gap: 6px; align-items: center;
}
.timeline-transfer-dialog__url-input {
  flex: 1; padding: 6px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border); background: var(--panel-bg);
  color: var(--color-text); font-family: var(--font-family);
  font-size: var(--font-xs); outline: none;
}
.timeline-transfer-dialog__url-input:focus { border-color: var(--color-accent-text); }
.timeline-transfer-dialog__copy {
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border); background: none;
  color: var(--color-text); font-family: var(--font-family);
  font-size: var(--font-xs); cursor: pointer; white-space: nowrap;
}
.timeline-transfer-dialog__copy:hover { background: var(--color-surface-hover); }
.timeline-transfer-dialog__code {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  margin-top: 8px;
}
.timeline-transfer-dialog__code code {
  font-family: var(--font-family); letter-spacing: 0.05em;
}
/* Subtle "Manage uploads" link in the post-publish success state.
 * Low-emphasis on purpose — it's a reinforcement, not a CTA.
 */
.timeline-transfer-dialog__manage {
  font-size: var(--font-xs); margin-top: 8px;
}
.timeline-transfer-dialog__manage a {
  color: var(--color-text-secondary); text-decoration: underline;
}
.timeline-transfer-dialog__manage a:hover {
  color: var(--color-text);
}
/* Non-fatal publish warning — rendered alongside the share URL when the
   server returns warnings[] on a real success (e.g. quota-accounting
   drift). Low-emphasis: no alarming color, no icon, no border. The
   share URL remains the primary visual element.
   Uses --color-text (not --color-text-secondary) so the 11-12px font
   size still passes WCAG AA contrast against the tinted background in
   both light and dark themes — muted-on-muted failed AA in dark mode. */
.timeline-transfer-dialog__warning {
  margin-top: 10px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--color-text-secondary) 12%, transparent);
  color: var(--color-text);
  font-size: var(--font-xs); line-height: 1.4;
}
/* Shared: errors + actions */
.timeline-transfer-dialog__error {
  color: rgba(220, 80, 60, 0.9); font-size: var(--font-xs); margin-bottom: 8px;
}
.timeline-transfer-dialog__actions {
  display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px;
  border-top: 1px solid var(--color-border);
}
.timeline-transfer-dialog__cancel,
.timeline-transfer-dialog__confirm {
  padding: 7px 16px; border-radius: var(--radius-sm);
  font-family: var(--font-family); font-size: var(--font-xs);
  cursor: pointer; border: 1px solid var(--color-border);
  background: none; color: var(--color-text);
}
.timeline-transfer-dialog__confirm {
  background: var(--color-accent-text); color: var(--panel-bg);
  border-color: var(--color-accent-text); font-weight: 600;
}
.timeline-transfer-dialog__confirm:disabled { opacity: 0.5; cursor: default; }
.timeline-transfer-dialog__confirm:not(:disabled):hover { opacity: 0.9; }
/* Restart positioning — applied to the ActionHint wrapper via anchorClassName/anchorStyle */
.timeline-restart-anchor {
  display: block;
  position: absolute; bottom: 0; margin-bottom: 6px;
  transform: translateX(-50%);
}
/* Restart button visual styling (position:relative for ::before/::after pseudo-elements) */
.timeline-restart-button {
  position: relative;
  padding: 5px 12px; border-radius: var(--radius-sm);
  background: var(--color-btn); border: none;
  color: var(--color-accent-text);
  font-family: var(--font-family); font-size: var(--font-xs); font-weight: 500;
  white-space: nowrap; cursor: pointer;
  font-variant-numeric: tabular-nums;
  min-height: 26px; display: flex; align-items: center;
  box-shadow: none;
}
/* Transparent hit-area extension below the chip (covers the gap to the track) */
.timeline-restart-button::before {
  content: ''; position: absolute;
  inset: -6px -8px -10px;
  cursor: pointer;
}
/* Subtle pointer arrow */
.timeline-restart-button::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--color-btn);
}
.timeline-restart-button:hover { background: var(--color-accent-soft); }
/* Old review-return button removed — replaced by timeline mode switch */
/* .timeline-time--review-left removed — time is in the left cluster */
/* Review track — thicker and easier to drag. Width fills the track-zone parent. */
.timeline-track--thick {
  position: relative;
  height: 10px; border-radius: 5px;
  background: var(--color-border); cursor: pointer;
}
.timeline-track--thick::before {
  content: ''; position: absolute; inset: -14px 0; cursor: pointer;
}
.timeline-track--thick .timeline-fill { border-radius: 5px; }
.timeline-track--thick .timeline-thumb {
  width: 18px; height: 18px;
}
.timeline-track--thick:active .timeline-thumb { transform: translate(-50%, -50%) scale(1.15); }
/* Clear icon — compact destructive trigger */
.timeline-clear-trigger {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: none; border: 1px solid rgba(220, 80, 60, 0.4);
  color: rgba(220, 80, 60, 0.8); cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.timeline-clear-trigger:hover {
  background: rgba(220, 80, 60, 0.1); border-color: rgba(220, 80, 60, 0.8);
}
/* Mobile confirmation dialog + backdrop */
/* Shared dialog backdrop + modal card base — used by clear and export dialogs */
.timeline-clear-backdrop, .timeline-dialog-backdrop {
  position: fixed; inset: 0; z-index: 299;
  background: rgba(10, 12, 16, 0.52);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.timeline-modal-card {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 300; padding: 20px 24px;
  background: var(--panel-bg); border: 1px solid var(--color-border);
  box-shadow: 0 16px 48px rgba(0,0,0,0.28);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  font-family: var(--font-family);
}
.timeline-clear-dialog {
  border-radius: var(--radius-sm);
  text-align: center; max-width: 280px;
}
.timeline-clear-dialog__title { font-weight: 600; font-size: var(--font-sm); margin: 0 0 8px; color: var(--color-text); }
.timeline-clear-dialog__body { font-size: var(--font-xs); opacity: 0.7; margin: 0 0 16px; color: var(--color-text); }
.timeline-clear-dialog__actions { display: flex; gap: 8px; justify-content: center; }
.timeline-clear-dialog__cancel {
  padding: 6px 16px; border-radius: var(--radius-sm);
  background: none; border: 1px solid var(--color-border);
  color: var(--color-text); font: inherit; cursor: pointer;
}
.timeline-clear-dialog__confirm {
  padding: 6px 16px; border-radius: var(--radius-sm);
  background: rgba(220, 80, 60, 0.15); border: 1px solid rgba(220, 80, 60, 0.5);
  color: rgba(220, 80, 60, 0.9); font: inherit; font-weight: 600; cursor: pointer;
}
.timeline-clear-dialog__cancel:hover { background: var(--color-surface-hover); }
.timeline-clear-dialog__confirm:hover { background: rgba(220, 80, 60, 0.25); }
/* ── Action hints — shared hover/focus tooltip infrastructure ──
   Used by DockBar, StructureChooser, ReviewLockedControl, Segmented, and other
   components via ActionHint.tsx. Used by DockBar, StructureChooser,
   ReviewLockedControl, Segmented, TimelineBar, and timeline-mode-switch.
   The .timeline-hint-* class prefix is historical; the infra is shared. */
.timeline-hint-anchor { position: relative; display: inline-flex; z-index: 0; }
.timeline-hint-anchor:hover, .timeline-hint-anchor:focus-within { z-index: 50; }
.timeline-hint {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  min-width: 140px;
  max-width: 220px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgb(20, 20, 24);
  color: #fff;
  font-size: 11px;
  line-height: 1.35;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
  opacity: 0;
  pointer-events: none;
  transition: opacity 140ms ease, transform 140ms ease;
  z-index: 40;
  white-space: normal;
}
.timeline-hint--visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.timeline-hint-arrow {
  position: absolute;
  top: 100%;
  left: 50%;
  width: 8px;
  height: 8px;
  transform: translateX(-50%) translateY(-50%) rotate(45deg);
  background: rgb(20, 20, 24);
}
/* Right-aligned placement for rightmost actions near viewport edge */
.timeline-hint--top-end {
  left: auto;
  right: 0;
  transform: translateY(4px);
}
.timeline-hint--top-end.timeline-hint--visible {
  transform: translateY(0);
}
.timeline-hint--top-end .timeline-hint-arrow {
  left: auto;
  right: 12px;
  transform: translateY(-50%) rotate(45deg);
}
/* Right-side placement for left-edge controls (Object View panel) */
.timeline-hint--right {
  bottom: auto;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%) translateX(-4px);
  min-width: 120px;
}
.timeline-hint--right.timeline-hint--visible {
  transform: translateY(-50%) translateX(0);
}
.timeline-hint--right .timeline-hint-arrow {
  top: 50%;
  left: auto;
  right: 100%;
  transform: translateY(-50%) translateX(50%) rotate(45deg);
}
/* Bottom-start placement for settings list rows */
.timeline-hint--bottom-start {
  bottom: auto;
  top: calc(100% + 8px);
  left: 0;
  transform: translateY(-4px);
}
.timeline-hint--bottom-start.timeline-hint--visible {
  transform: translateY(0);
}
.timeline-hint--bottom-start .timeline-hint-arrow {
  top: auto;
  bottom: 100%;
  left: 16px;
  transform: translateY(50%) rotate(45deg);
}
@media (hover: none), (pointer: coarse) {
  .timeline-hint { display: none; }
}
</style>
