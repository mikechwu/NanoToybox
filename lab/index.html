.timeline-transfer-dialog__option:has(input:checked) .timeline-transfer-dialog__radio-ui {
  border-color: var(--color-accent-text);
}
.timeline-transfer-dialog__option:has(input:checked) .timeline-transfer-dialog__radio-ui::after {
  background: var(--color-accent-text);
}
.timeline-transfer-dialog__option-text {
  display: flex; flex-direction: column; gap: 1px;
  font-size: var(--font-xs); line-height: 1.35;
}
.timeline-transfer-dialog__option-text strong {
  font-size: var(--font-xs); font-weight: 600;
}
.timeline-transfer-dialog__option-text span { color: var(--color-text-secondary); }
.timeline-transfer-dialog__estimate { font-variant-numeric: tabular-nums; }
.timeline-transfer-dialog__estimate--muted { opacity: 0.5; font-style: italic; }
/* Share tab */
.timeline-transfer-dialog__description {
  font-size: var(--font-xs); color: var(--color-text-secondary);
  margin-bottom: 16px; line-height: 1.4;
}
/* ── Success state (redesign 2026-04-23) ──────────────────────────
 *
 * Replaces the old three-row layout (url-row / share-actions-row /
 * manage-link-in-actions) with a single "link card" composition:
 *
 *     [✓ Shared]                       ← success header
 *     ┌──────────────────────────────┐
 *     │ SHARE LINK                   │ ← micro label
 *     │ atomdojo.pages.dev/c/ABC123  │ ← read-only URL (mono)
 *     │ [Copy link]   ↗ Open in Watch│ ← primary + tertiary
 *     └──────────────────────────────┘
 *     [● EXPIRES · in 2 days]    ← guest only (chip, relative+abs)
 *     Need permanent share links?   ← guest only (muted question)
 *     ↗ Manage uploads              ← account only
 *
 * No bottom action bar. The dialog's Esc + outside-click handle
 * dismissal; the success panel therefore has no "Close" button —
 * eliminating the old bordered footer that made the panel feel like
 * a form.
 *
 * Motion: one staggered fade-up on entry; a single checkmark
 * "draw-in" SVG animation on the success header. Deliberately quiet. */
.timeline-transfer-dialog__success { margin-bottom: 4px; }
@keyframes transfer-success-enter {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.timeline-transfer-dialog__success > * {
  animation: transfer-success-enter 260ms cubic-bezier(.2,.8,.2,1) both;
}
.timeline-transfer-dialog__success > *:nth-child(1) { animation-delay: 0ms; }
.timeline-transfer-dialog__success > *:nth-child(2) { animation-delay: 40ms; }
.timeline-transfer-dialog__success > *:nth-child(3) { animation-delay: 80ms; }
.timeline-transfer-dialog__success > *:nth-child(4) { animation-delay: 120ms; }

/* Success header — "✓ Shared" with a drawn-in green check. The check
 * sits in a small circular puck so it reads as an iconic confirm
 * rather than just a tick floating in space. */
.timeline-transfer-dialog__success-header {
  display: inline-flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.timeline-transfer-dialog__success-check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: color-mix(in oklab, var(--color-accent-text) 14%, transparent);
  border: 1px solid color-mix(in oklab, var(--color-accent-text) 32%, transparent);
  color: var(--color-accent-text);
}
.timeline-transfer-dialog__success-check svg polyline {
  stroke-dasharray: 20;
  stroke-dashoffset: 20;
  animation: transfer-check-draw 420ms cubic-bezier(.5,0,.2,1) 100ms forwards;
}
@keyframes transfer-check-draw {
  to { stroke-dashoffset: 0; }
}
.timeline-transfer-dialog__success-label {
  font-size: 13px; font-weight: 600; letter-spacing: -0.005em;
  color: var(--color-text);
}

/* Link card — the single primary surface. Subtle surface elevation,
 * mono URL, and a two-action row (Copy = primary, Open in Watch =
 * inline tertiary link). The card hovers gain a 1 px lift + stronger
 * border for scannability. */
.timeline-transfer-dialog__link-card {
  display: flex; flex-direction: column; gap: 10px;
  margin: 0 0 12px;
  padding: 12px 12px 12px;
  border-radius: var(--radius-md);
  background: color-mix(in oklab, var(--color-text) 4%, var(--panel-bg));
  border: 1px solid var(--color-border);
  transition: border-color 150ms ease, transform 150ms ease;
}
.timeline-transfer-dialog__link-card:hover {
  border-color: color-mix(in oklab, var(--color-accent-text) 28%, var(--color-border));
}
.timeline-transfer-dialog__link-card-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-text-secondary);
  opacity: 0.8;
}
.timeline-transfer-dialog__link-card-url {
  width: 100%;
  padding: 0;
  margin: 0;
  border: none;
  background: transparent;
  color: var(--color-text);
  /* Fallback stack — the app does not ship a monospace token by
   * default, so use widely-installed mono families with a final
   * generic. Tabular-numerics keep the share-code portion aligned. */
  font-family: ui-monospace, "SF Mono", "Menlo", "Roboto Mono", monospace;
  font-size: 13px;
  line-height: 1.35;
  letter-spacing: -0.01em;
  outline: none;
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}
.timeline-transfer-dialog__link-card-url:focus {
  /* Faint focus rail — no border-chrome change. */
  box-shadow: inset 0 -2px 0 color-mix(in oklab, var(--color-accent-text) 35%, transparent);
  border-radius: 2px;
}
.timeline-transfer-dialog__link-card-actions {
  display: flex; align-items: center; gap: 12px;
  margin-top: 2px;
}

/* Primary Copy button — accent fill, same silhouette as other primary
 * confirms in this dialog so the UI language stays consistent. The
 * `data-copied` state flips to a check icon + success phrasing and
 * briefly pulses. */
.timeline-transfer-dialog__copy-primary {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--color-accent-text);
  color: var(--panel-bg);
  border: 1px solid var(--color-accent-text);
  font-family: var(--font-family);
  font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
  box-shadow: 0 1px 0 color-mix(in oklab, var(--color-accent-text) 30%, transparent);
}
.timeline-transfer-dialog__copy-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 color-mix(in oklab, var(--color-accent-text) 40%, transparent);
}
.timeline-transfer-dialog__copy-primary[data-copied="true"] {
  animation: transfer-copy-pulse 520ms ease-out;
}
@keyframes transfer-copy-pulse {
  0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--color-accent-text) 40%, transparent); }
  50% { box-shadow: 0 0 0 8px color-mix(in oklab, var(--color-accent-text) 0%, transparent); }
  100% { box-shadow: 0 1px 0 color-mix(in oklab, var(--color-accent-text) 30%, transparent); }
}
.timeline-transfer-dialog__copy-icon {
  display: inline-flex; align-items: center; justify-content: center;
}

/* Open in Watch — inline tertiary, plain text link with an "↗" glyph.
 * Visually de-emphasized so Copy wins the primary read. */
.timeline-transfer-dialog__open-inline {
  display: inline-flex; align-items: center; gap: 5px;
  margin-left: auto;
  color: var(--color-text);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  text-decoration: none;
  opacity: 0.82;
  transition: opacity 120ms ease, color 120ms ease;
}
.timeline-transfer-dialog__open-inline:hover {
  opacity: 1;
  color: var(--color-accent-text);
}
.timeline-transfer-dialog__open-inline svg {
  transition: transform 140ms cubic-bezier(.2,.8,.2,1);
}
.timeline-transfer-dialog__open-inline:hover svg {
  transform: translate(1px, -1px);
}

/* Account branch: "Manage uploads" as a single inline link beneath
 * the link card. Replaces the old leadingLink-in-ShareActions
 * pattern; the whole panel is now one stack, not content + footer. */
.timeline-transfer-dialog__manage-link-inline {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: var(--font-xs);
  color: var(--color-text-secondary);
  text-decoration: none;
}
.timeline-transfer-dialog__manage-link-inline:hover {
  color: var(--color-text);
}
.timeline-transfer-dialog__manage-link-inline svg {
  transition: transform 140ms cubic-bezier(.2,.8,.2,1);
}
.timeline-transfer-dialog__manage-link-inline:hover svg {
  transform: translate(1px, -1px);
}

/* Account-branch footer row — puts Manage uploads on the left and
 * Close on the right without a divider bar. Simple flex-justify-between
 * keeps the panel one surface rather than a content + footer split. */
.timeline-transfer-dialog__account-success-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px;
}

/* The old `.__upsell-question` rule (rhetorical dead-end question
 * below the expiry chip) was deleted in the 2026-04-23 v3 pass —
 * see `GuestSuccessFooter` JSX comment. The expiry chip is now the
 * terminal element of the guest-success state; no rule needed. */

@media (prefers-reduced-motion: reduce) {
  .timeline-transfer-dialog__success > * { animation: none !important; }
  .timeline-transfer-dialog__success-check svg polyline { stroke-dashoffset: 0; animation: none; }
  .timeline-transfer-dialog__copy-primary[data-copied="true"] { animation: none; }
  .timeline-transfer-dialog__copy-primary:hover { transform: none; }
  .timeline-transfer-dialog__open-inline:hover svg,
  .timeline-transfer-dialog__manage-link-inline:hover svg { transform: none; }
}
/* Non-fatal publish warning — rendered alongside the share URL when the
   server returns warnings[] on a real success (e.g. quota-accounting
   drift). Low-emphasis: no alarming color, no icon, no border. The
   share URL remains the primary visual element.
   Uses --color-text (not --color-text-secondary) so the 11-12px font
   size still passes WCAG AA contrast against the tinted background in
   both light and dark themes — muted-on-muted failed AA in dark mode. */
.timeline-transfer-dialog__warning {
  margin-top: 10px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--color-text-secondary) 12%, transparent);
  color: var(--color-text);
  font-size: var(--font-xs); line-height: 1.4;
}
/* Shared: errors + actions */
.timeline-transfer-dialog__error {
  color: rgba(220, 80, 60, 0.9); font-size: var(--font-xs); margin-bottom: 8px;
}
.timeline-transfer-dialog__actions {
  display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px;
  border-top: 1px solid var(--color-border);
}
.timeline-transfer-dialog__cancel,
.timeline-transfer-dialog__confirm {
  padding: 7px 16px; border-radius: var(--radius-sm);
  font-family: var(--font-family); font-size: var(--font-xs);
  cursor: pointer; border: 1px solid var(--color-border);
  background: none; color: var(--color-text);
}
.timeline-transfer-dialog__confirm {
  background: var(--color-accent-text); color: var(--panel-bg);
  border-color: var(--color-accent-text); font-weight: 600;
}
.timeline-transfer-dialog__confirm:disabled { opacity: 0.5; cursor: default; }
.timeline-transfer-dialog__confirm:not(:disabled):hover { opacity: 0.9; }
/* Trim-panel CSS lives in `src/ui/timeline-trim-panel.css` (imported
   from main.ts). That file owns every rule that exists only because
   of the Capsule Publish trim-mode UX: the non-modal floating panel
   variant, the status row / size / pill / caption / reset-link
   pieces, the Publish button's ch-based min-width, and the handle
   attention-pulse keyframe + usage. Keeping those styles in one
   feature-scoped file prevents z-index drift between the panel and
   the timeline surface, and makes it obvious where to look when a
   future contributor needs to polish the trim UI. */
/* ── Restart-here CTA ──────────────────────────────────────────────
   Architecture (IMPORTANT — do not flatten into one element):

     .timeline-restart-anchor   positioning layer. Owns the
                                `left` coord + `translateX(-50%)` that
                                centers the pill over the review
                                marker. Its transform MUST stay free
                                of hover / active mutations so the
                                pointer (.timeline-restart-button::after
                                at `left: 50%`) always sits exactly on
                                the marker.

     .timeline-restart-button   interactive layer. Owns hover /
                                active / focus transforms. Its
                                transforms compose with the anchor's
                                via CSS's transform nesting, so the
                                centering is preserved across every
                                state.

   Root-cause context: a previous revision collapsed both concerns
   onto one element. CSS cannot merge two `transform:` declarations
   from different rules — the `:hover` rule replaced the base
   centering translate, the pill drifted half its width off-center,
   the pointer fell off the marker, and hovering visibly "pushed"
   the button away from the cursor. The split fixes all three. */
.timeline-restart-anchor {
  /* Single-source fill palette lives on the anchor so the pill, the
     pointer ::after, AND the corner-bridge can all read from the same
     "current fill" variable. Hover / active states mutate
     `--restart-current-fill` on the anchor via `:has()`, and the
     transition on each consumer animates the value through smoothly. */
  --restart-fill: color-mix(in oklab, var(--color-accent, #6dc) 62%, black);
  --restart-fill-hover: color-mix(in oklab, var(--color-accent, #6dc) 74%, black);
  --restart-fill-active: color-mix(in oklab, var(--color-accent, #6dc) 52%, black);
  --restart-current-fill: var(--restart-fill);
  --restart-ink: #ffffff;

  /* Pointer geometry — single source of truth for both sides.
     The TS base-offset clamp reads `--restart-pointer-base-w` via
     getComputedStyle so the CSS shape and the math stay in sync. */
  --restart-pointer-h: 9px;
  --restart-pointer-base-w: 18px;

  display: inline-block;
  position: absolute; bottom: 0;
  /* Anchor lifts the entire assembly above the track by a little
     more than the pointer height so the pointer's tip, not the pill's
     bottom edge, aligns with the timeline marker. */
  margin-bottom: calc(var(--restart-pointer-h) + 5px);
  transform: translateX(-50%);
  pointer-events: none;
}
/* Route state-driven fill through `--restart-current-fill`. Any
   consumer that reads this var animates between states via its own
   `transition: background`/`border-top-color` rule. */
.timeline-restart-anchor:has(.timeline-restart-button:hover) {
  --restart-current-fill: var(--restart-fill-hover);
}
.timeline-restart-anchor:has(.timeline-restart-button:active) {
  --restart-current-fill: var(--restart-fill-active);
}

.timeline-restart-button {
  /* Restore pointer-events that the anchor disables (so the pointer
     triangle's drop-shadow overflow stays click-through). */
  pointer-events: auto;
  position: relative;
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 14px 7px 12px;
  border: none; border-radius: 999px;
  background: var(--restart-current-fill);
  color: var(--restart-ink);
  font-family: var(--font-family);
  font-size: var(--font-xs, 12px);
  /* 500 = Medium. Bold on a small-cap CTA reads heavy; medium keeps
     the label feeling light while the fill carries the emphasis. */
  font-weight: 500;
  letter-spacing: 0.015em;
  white-space: nowrap;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
  min-height: 32px;
  box-shadow:
    0 2px 10px -3px color-mix(in oklab, var(--color-accent, #6dc) 55%, transparent),
    0 1px 0 rgba(255, 255, 255, 0.12) inset;
  transition:
    background 140ms ease,
    transform 140ms cubic-bezier(0.22, 0.9, 0.3, 1),
    box-shadow 140ms ease;
}
.timeline-restart-button__icon {
  flex: 0 0 auto;
  display: block;
  transition: transform 280ms cubic-bezier(0.22, 0.9, 0.3, 1);
}
.timeline-restart-button__label {
  line-height: 1;
}

/* Hover: modest lift + gentle icon rotate. Fill is driven by
   `--restart-current-fill` on the anchor (via `:has()`) so the pill,
   the bridge, and the pointer all change color in lockstep. The
   translateY(-1px) composes SAFELY with the anchor's translateX(-50%)
   because they live on different elements. */
.timeline-restart-button:hover {
  transform: translateY(-1px);
  box-shadow:
    0 5px 16px -4px color-mix(in oklab, var(--color-accent, #6dc) 70%, transparent),
    0 1px 0 color-mix(in oklab, white 32%, transparent) inset;
}
.timeline-restart-button:hover .timeline-restart-button__icon {
  transform: rotate(-60deg);
}
.timeline-restart-button:active {
  transform: translateY(0);
  box-shadow:
    0 1px 5px -2px color-mix(in oklab, var(--color-accent, #6dc) 60%, transparent),
    0 1px 0 color-mix(in oklab, white 18%, transparent) inset;
}
.timeline-restart-button:focus-visible {
  outline: 2px solid color-mix(in oklab, var(--color-accent, #6dc) 80%, white);
  outline-offset: 3px;
}

/* Transparent hit-area extension. Covers the pointer + the gap to
   the track below so a finger tapping "between the pill and the
   marker" still lands on the button. Generous on the bottom edge
   (where the pointer lives) so the tip is always easy to hit. */
.timeline-restart-button::before {
  content: ''; position: absolute;
  inset: -8px -10px -16px;
}

/* Downward pointer — a RECTANGLE clipped to a triangle via clip-path.
   This design (vs the earlier border-triangle) enables a SKEWED
   triangle: the two top vertices (base) stay pinned under the pill's
   straight-bottom segment, while the bottom vertex (tip) slides
   horizontally by `--tail-skew`. At rest (skew = 0) the triangle is
   a symmetric isosceles; at track extremes it tilts so the tip
   lands exactly on the marker without the base straddling the pill's
   rounded corner.
   Geometry variables:
     --tail-base-offset  horizontal position of the base center
                         (clamped in TS to the straight segment).
     --tail-skew         tip shift relative to the base center
                         (0 inside the clamp band; grows at extremes).
   Both live on the anchor and are written per-render by TimelineBar. */
.timeline-restart-button::after {
  content: ''; position: absolute;
  top: calc(100% - 1px); /* 1 px overlap hides the anti-aliasing seam between pill & triangle */
  left: calc(50% + var(--tail-base-offset, 0px));
  width: var(--restart-pointer-base-w);
  height: var(--restart-pointer-h);
  transform: translateX(-50%);
  background: var(--restart-current-fill);
  /* Polygon vertices in element-local coords:
       (0, 0)                              ← base-left
       (100%, 0)                           ← base-right
       (calc(50% + --tail-skew), 100%)     ← tip, x-shifted by skew
     No borders, no rotations — the polygon's vertex positions
     express the full geometry, including the asymmetric "lean"
     when the tip must track a marker past the base's clamp band. */
  clip-path: polygon(
    0 0,
    100% 0,
    calc(50% + var(--tail-skew, 0px)) 100%
  );
  filter: drop-shadow(0 2px 3px color-mix(in oklab, var(--color-accent, #6dc) 38%, transparent));
  transition:
    background 140ms ease,
    left 120ms cubic-bezier(0.22, 0.9, 0.3, 1),
    clip-path 120ms cubic-bezier(0.22, 0.9, 0.3, 1);
}

@media (prefers-reduced-motion: reduce) {
  .timeline-restart-button,
  .timeline-restart-button__icon,
  .timeline-restart-button::after {
    transition: none;
  }
  .timeline-restart-button:hover,
  .timeline-restart-button:active {
    transform: none;
  }
  .timeline-restart-button:hover .timeline-restart-button__icon {
    transform: none;
  }
}
/* Old review-return button removed — replaced by timeline mode switch */
/* .timeline-time--review-left removed — time is in the left cluster */
/* Review track — thicker and easier to drag. Width fills the track-zone parent. */
.timeline-track--thick {
  position: relative;
  height: 10px; border-radius: 5px;
  background: var(--color-border); cursor: pointer;
}
.timeline-track--thick::before {
  content: ''; position: absolute; inset: -14px 0; cursor: pointer;
}
.timeline-track--thick .timeline-fill { border-radius: 5px; }
.timeline-track--thick .timeline-thumb {
  width: 18px; height: 18px;
}
.timeline-track--thick:active .timeline-thumb { transform: translate(-50%, -50%) scale(1.15); }
/* Clear icon — compact destructive trigger */
.timeline-clear-trigger {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: none; border: 1px solid rgba(220, 80, 60, 0.4);
  color: rgba(220, 80, 60, 0.8); cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.timeline-clear-trigger:hover {
  background: rgba(220, 80, 60, 0.1); border-color: rgba(220, 80, 60, 0.8);
}
/* Mobile confirmation dialog + backdrop */
/* Shared dialog backdrop + modal card base — used by clear and export dialogs */
.timeline-clear-backdrop, .timeline-dialog-backdrop {
  position: fixed; inset: 0; z-index: 299;
  background: rgba(10, 12, 16, 0.52);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.timeline-modal-card {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 300; padding: 20px 24px;
  background: var(--panel-bg); border: 1px solid var(--color-border);
  box-shadow: 0 16px 48px rgba(0,0,0,0.28);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  font-family: var(--font-family);
}
.timeline-clear-dialog {
  border-radius: var(--radius-sm);
  text-align: center; max-width: 280px;
}
.timeline-clear-dialog__title { font-weight: 600; font-size: var(--font-sm); margin: 0 0 8px; color: var(--color-text); }
.timeline-clear-dialog__body { font-size: var(--font-xs); opacity: 0.7; margin: 0 0 16px; color: var(--color-text); }
.timeline-clear-dialog__actions { display: flex; gap: 8px; justify-content: center; }
.timeline-clear-dialog__cancel {
  padding: 6px 16px; border-radius: var(--radius-sm);
  background: none; border: 1px solid var(--color-border);
  color: var(--color-text); font: inherit; cursor: pointer;
}
.timeline-clear-dialog__confirm {
  padding: 6px 16px; border-radius: var(--radius-sm);
  background: rgba(220, 80, 60, 0.15); border: 1px solid rgba(220, 80, 60, 0.5);
  color: rgba(220, 80, 60, 0.9); font: inherit; font-weight: 600; cursor: pointer;
}
.timeline-clear-dialog__cancel:hover { background: var(--color-surface-hover); }
.timeline-clear-dialog__confirm:hover { background: rgba(220, 80, 60, 0.25); }
/* ── Action hints — shared hover/focus tooltip infrastructure ──
   Used by DockBar, StructureChooser, ReviewLockedControl, Segmented, and other
   components via ActionHint.tsx. Used by DockBar, StructureChooser,
   ReviewLockedControl, Segmented, TimelineBar, and timeline-mode-switch.
   The .timeline-hint-* class prefix is historical; the infra is shared. */
.timeline-hint-anchor { position: relative; display: inline-flex; z-index: 0; }
.timeline-hint-anchor:hover, .timeline-hint-anchor:focus-within { z-index: 50; }

/* Speech-bubble hint used by every ActionHint-wrapped control.
   Color, font-weight, border, shadow and radius intentionally match
   the drag-atom hint (`.atom-hint__bubble`) so the two discoverability
   surfaces read as one design system. Fill is a single token so
   the arrow inherits the bubble's exact surface color. */
.timeline-hint {
  --atom-hint-fill: color-mix(in oklab, var(--color-surface, #14141c) 94%, transparent);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  min-width: 140px;
  max-width: 240px;
  padding: 9px 14px;
  background: var(--atom-hint-fill);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border: 1px solid color-mix(in oklab, var(--color-accent, #6dc) 44%, transparent);
  border-radius: 14px;
  box-shadow:
    0 1px 0 color-mix(in oklab, var(--color-accent, #6dc) 26%, transparent) inset,
    0 10px 24px -14px rgba(0, 0, 0, 0.65),
    0 2px 6px -3px rgba(0, 0, 0, 0.4);
  color: var(--color-text);
  font-family: var(--font-family);
  font-size: var(--font-sm, 13px);
  font-weight: 500;
  letter-spacing: 0.012em;
  line-height: 1.3;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 140ms ease, transform 140ms ease;
  z-index: 40;
  white-space: normal;
}
.timeline-hint--visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
/* Arrow inherits the bubble's surface fill + accent border half-edge
   so it reads as a continuation of the bubble. Rotated-square with
   its bottom-right seam tucked under the bubble. */
.timeline-hint-arrow {
  position: absolute;
  top: 100%;
  left: 50%;
  width: 10px;
  height: 10px;
  background: var(--atom-hint-fill);
  border: inherit;
  border-top: none;
  border-left: none;
  border-radius: 0 0 2px 0;
  transform: translateX(-50%) translateY(-50%) rotate(45deg);
}

/* ── Timed-cue force-visible (trigger B: 5 s after first interaction) ──
   Runs a single 5 s keyframe animation: 1 s fade-in, 3 s stay, 1 s
   fade-out. Device-agnostic — bypasses the `@media (hover: none)`
   touch-hide rule below because the cue is explicitly user-directed
   discoverability (not a hover affordance). The component-side timer
   drops `.timeline-hint--force-visible` after the animation, so the
   tooltip returns to its normal hover-driven state. */
.timeline-hint--force-visible {
  animation: timeline-hint-auto-cue 5s cubic-bezier(0.4, 0, 0.2, 1) both;
  pointer-events: none;
}
@keyframes timeline-hint-auto-cue {
  0%   { opacity: 0; transform: translateX(-50%) translateY(4px); }
  20%  { opacity: 1; transform: translateX(-50%) translateY(0); }   /* 1 s in */
  80%  { opacity: 1; transform: translateX(-50%) translateY(0); }   /* 3 s stay */
  100% { opacity: 0; transform: translateX(-50%) translateY(4px); } /* 1 s out */
}
@media (prefers-reduced-motion: reduce) {
  /* Still surface the discoverability cue, just without the
     translate slide — only the opacity phases remain. */
  .timeline-hint--force-visible {
    animation: timeline-hint-auto-cue-reduced 5s linear both;
  }
}
@keyframes timeline-hint-auto-cue-reduced {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}
/* Right-aligned placement for rightmost actions near viewport edge */
.timeline-hint--top-end {
  left: auto;
  right: 0;
  transform: translateY(4px);
}
.timeline-hint--top-end.timeline-hint--visible {
  transform: translateY(0);
}
.timeline-hint--top-end .timeline-hint-arrow {
  left: auto;
  right: 12px;
  transform: translateY(-50%) rotate(45deg);
}
/* Right-side placement for left-edge controls (Object View panel) */
.timeline-hint--right {
  bottom: auto;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%) translateX(-4px);
  min-width: 120px;
}
.timeline-hint--right.timeline-hint--visible {
  transform: translateY(-50%) translateX(0);
}
.timeline-hint--right .timeline-hint-arrow {
  top: 50%;
  left: auto;
  right: 100%;
  transform: translateY(-50%) translateX(50%) rotate(45deg);
}
/* Bottom-start placement for settings list rows */
.timeline-hint--bottom-start {
  bottom: auto;
  top: calc(100% + 8px);
  left: 0;
  transform: translateY(-4px);
}
.timeline-hint--bottom-start.timeline-hint--visible {
  transform: translateY(0);
}
.timeline-hint--bottom-start .timeline-hint-arrow {
  top: auto;
  bottom: 100%;
  left: 16px;
  transform: translateY(50%) rotate(45deg);
}
@media (hover: none), (pointer: coarse) {
  /* Hide hover-driven tooltips on touch devices — they're not
     discoverable via hover. The timed-cue path (force-visible) is
     exempt because it's explicitly user-actionable discoverability. */
  .timeline-hint:not(.timeline-hint--force-visible) { display: none; }
}
</style>
</head>
<body>
<div id="container">
  <!-- React mount point (Milestone D) — display:contents so children position independently -->
  <div id="react-root" style="display:contents"></div>
  <div id="hint"></div>
  <!-- Atom-interaction hint. Runtime-controlled: the
       `atom-interaction-hint` module injects the `.atom-hint__pill`
       child (with text), toggles `data-visible`, and updates the
       `--atom-hint-x` / `--atom-hint-y` custom properties every frame
       so the bubble tracks a specific atom. Empty by default →
       hidden via `#atom-hint:empty { display: none }`. -->
  <div id="atom-hint"></div>

  <!-- Dock rendered by React Dock component -->
</div>

<script type="module" src="js/main"></script>
</body>
