<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NanoToybox Trajectory Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #181820; color: #e8e8e8; font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; overflow: hidden; }
#container { width: 100vw; height: 100vh; position: relative; }
canvas { display: block; }

#controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(20,20,28,0.92); backdrop-filter: blur(8px);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-size: 12px; z-index: 10;
  border-top: 1px solid rgba(255,255,255,0.08);
}
#controls button {
  background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.12);
  padding: 5px 14px; cursor: pointer; font-family: inherit; font-size: 12px;
  border-radius: 4px; transition: all 0.15s;
}
#controls button:hover { background: rgba(255,255,255,0.15); color: #fff; }
#controls button.active { background: rgba(100,180,140,0.3); color: #8fd8b0; border-color: rgba(100,180,140,0.4); }
#controls input[type=range] { accent-color: #6ab89a; }
#frame-slider { width: 180px; }
#bond-cutoff { width: 90px; }
#controls label { color: #888; font-size: 11px; letter-spacing: 0.3px; text-transform: uppercase; }
#controls select {
  background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.12);
  padding: 4px 8px; font-family: inherit; font-size: 12px;
  border-radius: 4px; cursor: pointer;
}
#controls select:hover { background: rgba(255,255,255,0.12); }
.ctrl-separator { width: 1px; height: 24px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

#info {
  position: absolute; top: 12px; left: 12px;
  background: rgba(20,20,28,0.85); backdrop-filter: blur(8px);
  padding: 10px 16px;
  font-size: 12px; line-height: 1.7; border-radius: 6px; z-index: 10;
  border: 1px solid rgba(255,255,255,0.06);
}
#info .title { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
#status { color: #888; }
#frame-info { color: #aaa; }

#drop-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(100,180,140,0.08); border: 3px dashed rgba(100,180,140,0.4);
  display: none; align-items: center; justify-content: center;
  font-size: 20px; color: #8fd8b0; z-index: 20;
  border-radius: 0;
}
</style>
</head>
<body>
<div id="container">
  <div id="info">
    <div class="title">NanoToybox</div>
    <div id="status">Drop .xyz file or click Load</div>
    <div id="frame-info"></div>
    <div id="atom-info"></div>
  </div>
  <div id="drop-overlay">Drop .xyz trajectory here</div>
  <div id="controls">
    <input type="file" id="file-input" accept=".xyz" style="display:none">
    <button id="btn-load" onclick="document.getElementById('file-input').click()">Load</button>
    <button id="btn-play">Play</button>
    <button id="btn-prev">&#9664;</button>
    <button id="btn-next">&#9654;</button>
    <input type="range" id="frame-slider" min="0" max="0" value="0">
    <span id="frame-label" style="color:#aaa; min-width:60px; font-variant-numeric:tabular-nums;">0/0</span>
    <div class="ctrl-separator"></div>
    <label>Speed</label>
    <select id="speed-select">
      <option value="60">60 fps</option>
      <option value="30" selected>30 fps</option>
      <option value="15">15 fps</option>
      <option value="5">5 fps</option>
      <option value="1">1 fps</option>
    </select>
    <label>Stride</label>
    <select id="stride-select">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="50">50</option>
      <option value="100">100</option>
    </select>
    <div class="ctrl-separator"></div>
    <label>Theme</label>
    <select id="theme-select">
      <option value="dark" selected>Dark</option>
      <option value="light">Light</option>
    </select>
    <label><input type="checkbox" id="bonds-toggle" checked> Bonds</label>
    <label>Cutoff</label>
    <input type="range" id="bond-cutoff" min="1.0" max="2.5" step="0.05" value="1.8">
    <span id="cutoff-label" style="color:#aaa; font-variant-numeric:tabular-nums;">1.80 &#8491;</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
let frames = [];
let currentFrame = 0;
let playing = false;
let playInterval = null;
let atomMeshes = [];
let bondMeshes = [];
let bondCutoff = 1.8;

// --- Scene setup ---
const container = document.getElementById('container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 0, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.insertBefore(renderer.domElement, container.firstChild);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// --- Themes ---
// Lighting follows the camera (attached as children) so that sphere/bond
// shading is consistent regardless of orbit angle — standard practice in
// molecular viewers (VMD, PyMOL, ChimeraX).
//
// "Sunny day" rig:
//   Key:     strong directional (the sun) — 45° right, 30° up
//   Fill:    softer from opposite side (sky bounce) — 60° left, 10° up
//   Rim:     behind-below for edge separation
//   Ambient: moderate (diffuse sky light) — fills shadows naturally
//
// Material design:
//   MeshStandardMaterial with roughness=0.7 (mostly diffuse, soft highlights)
//   and metalness=0 (non-metallic). Gives a smooth lit-to-shadow gradient
//   with gentle specular — like matte plastic under outdoor light.
//   No sharp mirror spots, but enough sheen to read as 3D.

const THEMES = {
  'dark': {
    bg: 0x181820,
    atom: 0x444444,
    bond: 0x909090,
    ambientColor: 0x8090b0, ambientIntensity: 1.2,
    keyColor: 0xffffff, keyIntensity: 3.0,
    fillColor: 0x8098c0, fillIntensity: 1.5,
    rimColor: 0x6070a0, rimIntensity: 0.8,
  },
  'light': {
    bg: 0xf2f2f0,
    atom: 0x3a3a3a,
    bond: 0x808080,
    ambientColor: 0xc0d0e8, ambientIntensity: 1.5,
    keyColor: 0xfff8f0, keyIntensity: 2.8,
    fillColor: 0xa0b8d0, fillIntensity: 1.2,
    rimColor: 0x909098, rimIntensity: 0.6,
  },
};
let currentTheme = 'dark';

// Lighting rig — all directional lights are children of the camera
// so they orbit with the viewer.
const ambientLight = new THREE.AmbientLight(0x8090b0, 1.2);
scene.add(ambientLight);

// Key light (sun): 45° right, 30° up from camera view direction
const keyLight = new THREE.DirectionalLight(0xffffff, 3.0);
keyLight.position.set(1.0, 0.7, 0.6);
camera.add(keyLight);

// Fill light (sky bounce): 60° left, slightly up
const fillLight = new THREE.DirectionalLight(0x8098c0, 1.5);
fillLight.position.set(-1.0, 0.2, 0.4);
camera.add(fillLight);

// Rim light: behind and below for edge separation
const rimLight = new THREE.DirectionalLight(0x6070a0, 0.8);
rimLight.position.set(0.3, -0.6, -1.0);
camera.add(rimLight);

// Camera must be in scene graph for its children (lights) to render
scene.add(camera);

function applyTheme(name) {
  currentTheme = name;
  const t = THEMES[name];

  scene.background = new THREE.Color(t.bg);

  ambientLight.color.set(t.ambientColor);
  ambientLight.intensity = t.ambientIntensity;
  keyLight.color.set(t.keyColor);
  keyLight.intensity = t.keyIntensity;
  fillLight.color.set(t.fillColor);
  fillLight.intensity = t.fillIntensity;
  rimLight.color.set(t.rimColor);
  rimLight.intensity = t.rimIntensity;

  // Update existing meshes
  atomMeshes.forEach(m => { m.material.color.set(t.atom); });
  bondMeshes.forEach(m => { m.material.color.set(t.bond); });

  // UI bar styling
  const ctrlBar = document.getElementById('controls');
  const infoBox = document.getElementById('info');
  if (name === 'light') {
    ctrlBar.style.background = 'rgba(240,240,238,0.92)';
    ctrlBar.style.borderTopColor = 'rgba(0,0,0,0.08)';
    ctrlBar.querySelectorAll('button').forEach(b => { b.style.color = '#444'; b.style.background = 'rgba(0,0,0,0.06)'; b.style.borderColor = 'rgba(0,0,0,0.1)'; });
    ctrlBar.querySelectorAll('select').forEach(s => { s.style.color = '#444'; s.style.background = 'rgba(0,0,0,0.06)'; s.style.borderColor = 'rgba(0,0,0,0.1)'; });
    ctrlBar.querySelectorAll('label').forEach(l => { l.style.color = '#777'; });
    ctrlBar.querySelectorAll('span').forEach(s => { s.style.color = '#666'; });
    ctrlBar.querySelectorAll('.ctrl-separator').forEach(s => { s.style.background = 'rgba(0,0,0,0.1)'; });
    infoBox.style.background = 'rgba(240,240,238,0.88)';
    infoBox.style.borderColor = 'rgba(0,0,0,0.06)';
    infoBox.querySelector('.title').style.color = '#222';
    document.getElementById('status').style.color = '#666';
    document.getElementById('frame-info').style.color = '#555';
  } else {
    ctrlBar.style.background = 'rgba(20,20,28,0.92)';
    ctrlBar.style.borderTopColor = 'rgba(255,255,255,0.08)';
    ctrlBar.querySelectorAll('button').forEach(b => { b.style.color = '#ccc'; b.style.background = 'rgba(255,255,255,0.08)'; b.style.borderColor = 'rgba(255,255,255,0.12)'; });
    ctrlBar.querySelectorAll('select').forEach(s => { s.style.color = '#ccc'; s.style.background = 'rgba(255,255,255,0.08)'; s.style.borderColor = 'rgba(255,255,255,0.12)'; });
    ctrlBar.querySelectorAll('label').forEach(l => { l.style.color = '#888'; });
    ctrlBar.querySelectorAll('span').forEach(s => { s.style.color = '#aaa'; });
    ctrlBar.querySelectorAll('.ctrl-separator').forEach(s => { s.style.background = 'rgba(255,255,255,0.1)'; });
    infoBox.style.background = 'rgba(20,20,28,0.85)';
    infoBox.style.borderColor = 'rgba(255,255,255,0.06)';
    infoBox.querySelector('.title').style.color = '#e8e8e8';
    document.getElementById('status').style.color = '#888';
    document.getElementById('frame-info').style.color = '#aaa';
  }
}

// --- XYZ Parser ---
function parseXYZ(text) {
  const lines = text.split('\n');
  const parsed = [];
  let i = 0;
  while (i < lines.length) {
    const nLine = lines[i].trim();
    if (!nLine) { i++; continue; }
    const nAtoms = parseInt(nLine);
    if (isNaN(nAtoms) || nAtoms <= 0) { i++; continue; }
    const comment = lines[i + 1] || '';
    const atoms = [];
    for (let a = 0; a < nAtoms; a++) {
      const parts = (lines[i + 2 + a] || '').trim().split(/\s+/);
      if (parts.length >= 4) {
        atoms.push({
          element: parts[0],
          x: parseFloat(parts[1]),
          y: parseFloat(parts[2]),
          z: parseFloat(parts[3]),
        });
      }
    }
    if (atoms.length === nAtoms) {
      parsed.push({ nAtoms, comment, atoms });
    }
    i += 2 + nAtoms;
  }
  return parsed;
}

// --- Build scene from frames ---
const atomGeom = new THREE.SphereGeometry(0.35, 24, 16);
const bondGeom = new THREE.CylinderGeometry(0.07, 0.07, 1, 12);

function buildScene() {
  atomMeshes.forEach(m => scene.remove(m));
  bondMeshes.forEach(m => scene.remove(m));
  atomMeshes = [];
  bondMeshes = [];

  if (frames.length === 0) return;
  const frame = frames[currentFrame];
  const t = THEMES[currentTheme];

  const atomMat = new THREE.MeshStandardMaterial({ color: t.atom, roughness: 0.7, metalness: 0.0 });

  // Center of mass
  let cx = 0, cy = 0, cz = 0;
  frame.atoms.forEach(a => { cx += a.x; cy += a.y; cz += a.z; });
  cx /= frame.nAtoms; cy /= frame.nAtoms; cz /= frame.nAtoms;

  frame.atoms.forEach(a => {
    const mesh = new THREE.Mesh(atomGeom, atomMat.clone());
    mesh.position.set(a.x - cx, a.y - cy, a.z - cz);
    scene.add(mesh);
    atomMeshes.push(mesh);
  });

  updateBonds();
  fitCamera();
}

function updatePositions() {
  if (frames.length === 0 || atomMeshes.length === 0) return;
  const frame = frames[currentFrame];
  let cx = 0, cy = 0, cz = 0;
  frame.atoms.forEach(a => { cx += a.x; cy += a.y; cz += a.z; });
  cx /= frame.nAtoms; cy /= frame.nAtoms; cz /= frame.nAtoms;

  frame.atoms.forEach((a, i) => {
    if (atomMeshes[i]) {
      atomMeshes[i].position.set(a.x - cx, a.y - cy, a.z - cz);
    }
  });
  updateBonds();
}

function updateBonds() {
  bondMeshes.forEach(m => scene.remove(m));
  bondMeshes = [];
  if (!document.getElementById('bonds-toggle').checked) return;

  const t = THEMES[currentTheme];
  const bondMat = new THREE.MeshStandardMaterial({ color: t.bond, roughness: 0.7, metalness: 0.0 });
  const n = atomMeshes.length;

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const pi = atomMeshes[i].position;
      const pj = atomMeshes[j].position;
      const dx = pj.x - pi.x, dy = pj.y - pi.y, dz = pj.z - pi.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist < bondCutoff && dist > 0.5) {
        const mid = new THREE.Vector3((pi.x+pj.x)/2, (pi.y+pj.y)/2, (pi.z+pj.z)/2);
        const mesh = new THREE.Mesh(bondGeom, bondMat);
        mesh.position.copy(mid);
        mesh.scale.y = dist;
        const dir = new THREE.Vector3(dx, dy, dz).normalize();
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        scene.add(mesh);
        bondMeshes.push(mesh);
      }
    }
  }
}

function fitCamera() {
  if (atomMeshes.length === 0) return;
  let maxR = 0;
  atomMeshes.forEach(m => {
    const r = m.position.length();
    if (r > maxR) maxR = r;
  });
  const dist = maxR * 2.5 + 5;
  camera.position.set(0, 0, dist);
  controls.target.set(0, 0, 0);
  controls.update();
}

// --- Playback ---
function setFrame(f) {
  currentFrame = Math.max(0, Math.min(f, frames.length - 1));
  updatePositions();
  document.getElementById('frame-slider').value = currentFrame;
  document.getElementById('frame-label').textContent = `${currentFrame + 1}/${frames.length}`;
  document.getElementById('frame-info').textContent = `Frame ${currentFrame + 1} of ${frames.length} \u00b7 ${frames[currentFrame].atoms.length} atoms`;
}

function getStride() {
  return parseInt(document.getElementById('stride-select').value) || 1;
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? 'Pause' : 'Play';
  btn.classList.toggle('active', playing);
  if (playing) {
    const fps = parseInt(document.getElementById('speed-select').value);
    const stride = getStride();
    playInterval = setInterval(() => {
      const next = currentFrame + stride;
      if (next < frames.length) {
        setFrame(next);
      } else {
        setFrame(0);
      }
    }, 1000 / fps);
  } else {
    clearInterval(playInterval);
  }
}

// --- File loading ---
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    frames = parseXYZ(e.target.result);
    if (frames.length === 0) {
      document.getElementById('status').textContent = 'Error: no valid frames found';
      return;
    }
    document.getElementById('status').textContent = `${file.name} \u00b7 ${frames.length} frames \u00b7 ${frames[0].nAtoms} atoms`;
    document.getElementById('frame-slider').max = frames.length - 1;
    currentFrame = 0;
    buildScene();
    setFrame(0);
    applyTheme(currentTheme);
  };
  reader.readAsText(file);
}

// --- Event handlers ---
document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-prev').addEventListener('click', () => setFrame(currentFrame - getStride()));
document.getElementById('btn-next').addEventListener('click', () => setFrame(currentFrame + getStride()));
document.getElementById('frame-slider').addEventListener('input', (e) => setFrame(parseInt(e.target.value)));

document.getElementById('speed-select').addEventListener('change', () => {
  if (playing) { togglePlay(); togglePlay(); }
});

document.getElementById('stride-select').addEventListener('change', () => {
  if (playing) { togglePlay(); togglePlay(); }
});

document.getElementById('theme-select').addEventListener('change', (e) => applyTheme(e.target.value));

document.getElementById('bonds-toggle').addEventListener('change', updateBonds);

document.getElementById('bond-cutoff').addEventListener('input', (e) => {
  bondCutoff = parseFloat(e.target.value);
  document.getElementById('cutoff-label').textContent = bondCutoff.toFixed(2) + ' \u212B';
  updateBonds();
});

// Drag and drop
const overlay = document.getElementById('drop-overlay');
document.addEventListener('dragover', (e) => { e.preventDefault(); overlay.style.display = 'flex'; });
document.addEventListener('dragleave', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
document.addEventListener('drop', (e) => {
  e.preventDefault();
  overlay.style.display = 'none';
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowLeft') setFrame(currentFrame - getStride());
  if (e.key === 'ArrowRight') setFrame(currentFrame + getStride());
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Render loop ---
applyTheme('dark');
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// --- Load example if available ---
async function tryLoadExample() {
  const paths = [
    '../outputs/scaling_research/collision_c60_c60.xyz',
    '../outputs/test4_c60/trajectory.xyz',
    '../outputs/test3_graphene/trajectory.xyz',
    '../outputs/test1_dimer/trajectory.xyz',
  ];
  for (const p of paths) {
    try {
      const resp = await fetch(p);
      if (resp.ok) {
        const text = await resp.text();
        frames = parseXYZ(text);
        if (frames.length > 0) {
          document.getElementById('status').textContent = `${p.split('/').pop()} \u00b7 ${frames.length} frames \u00b7 ${frames[0].nAtoms} atoms`;
          document.getElementById('frame-slider').max = frames.length - 1;
          buildScene();
          setFrame(0);
          applyTheme(currentTheme);
          return;
        }
      }
    } catch (e) { /* continue */ }
  }
}
tryLoadExample();
</script>
</body>
</html>
