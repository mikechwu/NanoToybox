<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>atomdojo — Watch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    :root {
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-md: 10px;
      --radius-sm: 6px;
    }
    body {
      font-family: var(--font-family);
      background: var(--page-bg, #181820);
      color: var(--color-text, #ccc);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Landing ── */
    .watch-landing {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .watch-landing h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .watch-landing p { opacity: 0.6; margin-bottom: 24px; font-size: 0.9rem; }
    .watch-drop-zone {
      border: 2px dashed var(--color-border, rgba(255,255,255,0.12));
      border-radius: var(--radius-md); padding: 48px 32px;
      margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      min-width: 280px;
    }
    .watch-drop-zone:hover, .watch-drop-active {
      border-color: var(--color-accent, #6dc); background: rgba(100,180,140,0.06);
    }
    .watch-drop-zone p { opacity: 0.5; font-size: 0.85rem; margin-top: 8px; }
    .watch-btn {
      background: var(--color-accent, #6dc); color: #111; border: none; border-radius: var(--radius-sm);
      padding: 10px 24px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .watch-btn:hover { filter: brightness(1.1); }
    .watch-support-note { font-size: 0.8rem; opacity: 0.4; margin-top: 16px; }

    /* ── Error ── */
    .watch-error {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(220,60,60,0.15); border: 1px solid rgba(220,60,60,0.3);
      border-radius: var(--radius-sm); padding: 12px 16px;
      max-width: 500px; width: calc(100vw - 32px); font-size: 0.85rem; color: #e88;
    }

    /* ── Workspace ── */
    .watch-workspace {
      display: grid; grid-template-rows: auto 1fr auto;
      height: 100vh; width: 100vw;
    }
    .watch-topbar {
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      background: var(--panel-bg, rgba(20,20,28,0.92));
      border-bottom: 1px solid var(--color-border, rgba(255,255,255,0.12));
    }
    .watch-badge {
      background: var(--color-accent-soft, rgba(100,180,140,0.15));
      color: var(--color-accent-text, #6dc);
      padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 600;
    }
    .watch-canvas-area {
      position: relative; overflow: hidden;
    }
    .watch-canvas-area canvas {
      width: 100% !important; height: 100% !important; display: block;
    }

    /* ── Analysis panel (overlaid on canvas) ── */
    .watch-analysis {
      position: absolute; top: 12px; right: 12px;
      background: var(--panel-bg, rgba(20,20,28,0.92));
      border-radius: var(--radius-sm); padding: 12px 16px;
      font-size: 0.8rem; min-width: 140px;
      border: 1px solid var(--color-border, rgba(255,255,255,0.12));
    }
    .watch-analysis h3 { font-size: 0.75rem; opacity: 0.6; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .watch-analysis dl { display: grid; grid-template-columns: auto 1fr; gap: 2px 8px; }
    .watch-analysis dt { opacity: 0.6; }
    .watch-analysis dd { text-align: right; font-variant-numeric: tabular-nums; }
    .watch-group-list {
      list-style: none; margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--color-border, rgba(255,255,255,0.12));
      max-height: 120px; overflow-y: auto; font-size: 0.75rem;
    }
    .watch-group-list li { padding: 1px 0; opacity: 0.7; }

    /* ── Playback bar ── */
    .watch-playbar {
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      background: var(--panel-bg, rgba(20,20,28,0.92));
      border-top: 1px solid var(--color-border, rgba(255,255,255,0.12));
    }
    .watch-playbar button {
      background: none; border: none; color: inherit; font-size: 1.2rem;
      cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm);
    }
    .watch-playbar button:hover { background: var(--color-surface-hover, rgba(255,255,255,0.06)); }
    .watch-scrubber {
      flex: 1; height: 4px; accent-color: var(--color-accent, #6dc);
    }
    .watch-time { font-size: 0.8rem; font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 56px; }
    .watch-open-another {
      background: none; border: 1px solid var(--color-border, rgba(255,255,255,0.12));
      color: var(--color-text, #ccc); font-size: 0.75rem; padding: 4px 10px;
      border-radius: var(--radius-sm); cursor: pointer; margin-left: auto;
    }
    .watch-open-another:hover { background: var(--color-surface-hover, rgba(255,255,255,0.06)); }
  </style>
</head>
<body>
  <!-- Landing state -->
  <div id="watch-landing" class="watch-landing">
    <h1>Watch History</h1>
    <p>Open a .atomdojo history file exported from Lab</p>
    <div id="watch-drop-zone" class="watch-drop-zone">
      <button id="watch-open-btn" class="watch-btn">Open File</button>
      <p>or drag and drop here</p>
    </div>
    <p class="watch-support-note">Supports Full History now &middot; Replay support coming next</p>
  </div>

  <!-- Global error banner (visible in both landing and workspace states) -->
  <div id="watch-error" class="watch-error" hidden>
    <span id="watch-error-text"></span>
  </div>

  <!-- Workspace (hidden until file loaded) -->
  <div id="watch-workspace" class="watch-workspace" hidden>
    <div class="watch-topbar">
      <span id="watch-badge" class="watch-badge">Full History</span>
      <span style="opacity:0.5;font-size:0.85rem">atomdojo — Watch</span>
    </div>
    <div class="watch-canvas-area">
      <div id="watch-canvas" style="width:100%;height:100%"></div>
      <div class="watch-analysis">
        <h3>Analysis</h3>
        <dl>
          <dt>Atoms</dt><dd id="watch-atoms">—</dd>
          <dt>Frames</dt><dd id="watch-frames">—</dd>
          <dt>Groups</dt><dd id="watch-groups">—</dd>
        </dl>
        <ul id="watch-group-list" class="watch-group-list"><li>No groups</li></ul>
      </div>
    </div>
    <div class="watch-playbar">
      <button id="watch-play" title="Play/Pause">▶</button>
      <span id="watch-time" class="watch-time">0 fs</span>
      <input id="watch-scrubber" class="watch-scrubber" type="range" min="0" max="100" value="0" step="any">
      <span id="watch-duration" class="watch-time">0 fs</span>
      <button id="watch-open-another" class="watch-open-another">Open File</button>
    </div>
  </div>

  <script type="module" src="./js/main.ts"></script>
</body>
</html>
